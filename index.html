<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Login</title>
<style>
/* Manteniamo lo stile dei bottoni e della pagina come prima */
body {
    background: linear-gradient(180deg,#1c102b,#2a1b3f);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
}
button {
    padding:10px 20px;
    background:#5865F2;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    margin-top:20px;
    transition:0.2s;
}
button:hover {transform:scale(1.05);}
h1 {margin-bottom:20px;}
</style>
</head>
<body>

<h1>Benvenuto su Italia RP</h1>
<button id="login-btn">Accedi con Discord</button>

<script type="module">
// ==== FIREBASE INIT ====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
    authDomain: "sito-rp.firebaseapp.com",
    projectId: "sito-rp",
    storageBucket: "sito-rp.appspot.com",
    messagingSenderId: "234781749995",
    appId: "1:234781749995:web:6954473363659fe38b04ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ==== DISCORD LOGIN ====
const clientId = "1282387399623839744";
const redirectUri = "https://scorpion2109.github.io/italiarp/index.html"; // il tuo URL esatto GitHub Pages
const scope = "identify email";

document.getElementById("login-btn").onclick = () => {
    window.location.href =
        `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${scope}`;
};

// ==== PRENDI TOKEN DAL REDIRECT ====
window.onload = async () => {
    const hash = window.location.hash;
    if(hash.includes("access_token")){
        const params = new URLSearchParams(hash.substring(1));
        const accessToken = params.get("access_token");

        try {
            // Chiama API Discord per avere info utente
            const res = await fetch("https://discord.com/api/users/@me", {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            const user = await res.json();
            console.log("Discord user:", user);

            // Salva ID su Firebase
            await setDoc(doc(db, "utenti_discord", user.id), {
                username: user.username,
                discriminator: user.discriminator,
                email: user.email || "",
                id: user.id
            });

            alert(`Login riuscito! Benvenuto ${user.username}#${user.discriminator}`);
            
            // Reindirizza alla lista-personaggi
            window.location.href = "lista-personaggi.html";
        } catch(e) {
            console.error("Errore login Discord:", e);
            alert("Errore nel login Discord. Controlla console.");
        }
    }
};
</script>

</body>
</html>
