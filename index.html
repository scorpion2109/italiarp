<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Login</title>
<style>
body {
    background: linear-gradient(180deg,#1c102b,#2a1b3f);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
}
button {
    padding:10px 20px;
    background:#5865F2;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    margin-top:20px;
    transition:0.2s;
}
button:hover {transform:scale(1.05);}
h1 {margin-bottom:20px;}
</style>
</head>
<body>

<h1>Benvenuto su Italia RP</h1>
<button id="login-btn">Accedi con Discord</button>

<script>
// ==== DISCORD LOGIN ====
const clientId = "1475512122330054737";
const redirectUri = "https://scorpion2109.github.io/italiarp/"; // tuo URL GitHub Pages
const scope = "identify email";

document.getElementById("login-btn").onclick = () => {
    window.location.href =
        `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${scope}`;
};

// ==== PRENDI TOKEN DAL REDIRECT ====
window.onload = async () => {
    const hash = window.location.hash;
    if(hash.includes("access_token")){
        const params = new URLSearchParams(hash.substring(1));
        const accessToken = params.get("access_token");

        try {
            const res = await fetch("https://discord.com/api/users/@me", {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            const user = await res.json();
            console.log("Discord user:", user);

            // Salva ID utente in sessionStorage
            sessionStorage.setItem("discord_uid", user.id);

            // Vai a lista-personaggi
            window.location.href = "lista-personaggi.html";
        } catch(e) {
            console.error("Errore login Discord:", e);
            alert("Errore nel login Discord. Controlla console.");
        }
    }
};
</script>

</body>
</html>
