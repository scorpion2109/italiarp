<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Login Discord</title>
<style>
body {font-family:'Segoe UI',sans-serif; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; background:#1c102b; color:white;}
h1 {margin-bottom:30px;}
button {padding:15px 30px; background:#5865F2; border:none; border-radius:10px; font-size:18px; cursor:pointer;}
button:hover {transform:scale(1.05);}
</style>
</head>
<body>

<h1>Accedi con Discord</h1>
<button id="login-btn">Accedi con Discord</button>

<script type="module">
// ===== FIREBASE =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.16.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.16.0/firebase-firestore.js";

// Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
  authDomain: "sito-rp.firebaseapp.com",
  projectId: "sito-rp",
  storageBucket: "sito-rp.firebasestorage.app",
  messagingSenderId: "234781749995",
  appId: "1:234781749995:web:6954473363659fe38b04ae",
  measurementId: "G-R23N60PBYY"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== LOGIN DISCORD =====
const clientId = "1475512122330054737";
const redirectUri = "https://scorpion2109.github.io/italiarp/index.html";
const scope = "identify";

document.getElementById("login-btn").onclick = () => {
  const url = `https://discord.com/api/oauth2/authorize` +
    `?client_id=${clientId}` +
    `&redirect_uri=${encodeURIComponent(redirectUri)}` +
    `&response_type=token` +
    `&scope=${scope}`;
  window.location.href = url;
};

// DOPO REDIRECT DISCORD
if (window.location.hash) {
  const params = new URLSearchParams(window.location.hash.substring(1));
  const token = params.get("access_token");

  if (token) {
    // Recupera ID Discord
    fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: `Bearer ${token}` }
    })
    .then(res => res.json())
    .then(async user => {
      const discordId = user.id;

      // SALVA ID SU FIRESTORE
      const userRef = doc(db, "utenti", discordId);
      const docSnap = await getDoc(userRef);
      if (!docSnap.exists()) {
        // Crea documento se non esiste
        await setDoc(userRef, { discord_id: discordId, createdAt: new Date() });
      }

      // Reindirizza alla lista personaggi
      window.location.href = "lista-personaggi.html";
    })
    .catch(err => {
      console.error("Errore accesso Discord:", err);
      alert("Errore durante il login con Discord");
    });
  }
}
</script>

</body>
</html>
