<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Login</title>

<style>
body {
    background: linear-gradient(180deg,#1c102b,#2a1b3f);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
}

button {
    padding:10px 20px;
    background:#5865F2;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    margin-top:20px;
    transition:0.2s;
}

button:hover {
    transform:scale(1.05);
}

h1 {
    margin-bottom:20px;
}
</style>
</head>

<body>

<h1>Benvenuto su Italia RP</h1>

<button id="login-btn">Accedi con Discord</button>

<script>

// CONFIG
const clientId = "1475512122330054737";
const redirectUri = "https://scorpion2109.github.io/italiarp/";
const scope = "identify";

// LOGIN BUTTON
document.getElementById("login-btn").onclick = () => {

const url =
`https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${scope}`;

window.location.href = url;

};

// CONTROLLO LOGIN
window.onload = async () => {

const hash = window.location.hash;

if(!hash.includes("access_token")) return;

const params = new URLSearchParams(hash.substring(1));
const accessToken = params.get("access_token");

try{

const res = await fetch("https://discord.com/api/users/@me",{
headers:{
Authorization:`Bearer ${accessToken}`
}
});

const user = await res.json();

console.log("Discord user:",user);

localStorage.setItem("discord_username", user.username);

/* AVATAR DISCORD */
const avatarUrl = user.avatar
? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
: `https://cdn.discordapp.com/embed/avatars/0.png`;

localStorage.setItem("discord_avatar", avatarUrl);

// pulisce url
history.replaceState(null,null," ");

// REDIRECT
window.location.href="lista-personaggi.html";

}catch(err){

console.error("Errore login Discord:",err);
alert("Errore nel login Discord");

}

};

</script>

</body>
</html>
