<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listino</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
color:white;
background-image:url("assets/sfondo.webp");
background-size:cover;
background-position:center;
background-attachment:fixed;
padding:15px;
}

/* overlay */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h2{
font-size:22px;
}

/* SEARCH */
.search{
width:100%;
padding:12px;
border-radius:15px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
backdrop-filter:blur(10px);
margin-bottom:15px;
}

/* FILTRI */
.filtri{
display:flex;
gap:10px;
overflow-x:auto;
margin-bottom:20px;
}

.filtri button{
padding:8px 14px;
border:none;
border-radius:20px;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
backdrop-filter:blur(10px);
transition:0.2s;
}

.filtri button:hover{
background:#00ff88;
color:black;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

/* CARD */
.card{
position:relative;
border-radius:20px;
padding:10px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
overflow:hidden;
transition:0.25s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 0 20px rgba(0,255,136,0.4);
}

/* IMG */
.card img{
width:100%;
height:110px;
object-fit:contain;
}

/* NOME */
.nome{
font-size:14px;
margin-top:5px;
}

/* PREZZO */
.prezzo{
color:#00ff88;
font-weight:bold;
}

/* BADGE */
.badge{
position:absolute;
top:8px;
left:8px;
background:#00ff88;
color:black;
font-size:10px;
padding:3px 8px;
border-radius:10px;
}

/* CLICK */
.card:active{
transform:scale(0.95);
}

</style>

</head>

<body>

<div class="header">
<h2>Listino</h2>
<span onclick="window.location.href='home.html'">⬅</span>
</div>

<input type="text" id="search" class="search" placeholder="Cerca item...">

<div class="filtri">
<button onclick="filtra('tutti')">Tutti</button>
<button onclick="filtra('arma')">Armi</button>
<button onclick="filtra('veicolo')">Veicoli</button>
<button onclick="filtra('cibo')">Cibo</button>
<button onclick="filtra('oggetto')">Oggetti</button>
</div>

<div class="grid" id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain: "sito-rp.firebaseapp.com",
projectId: "sito-rp"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let items = [];
let filtro = "tutti";

/* LOAD */
const snap = await getDocs(collection(db,"items"));

snap.forEach(doc=>{
items.push(doc.data());
});

render();

/* RENDER */
function render(){

const lista = document.getElementById("lista");
const search = document.getElementById("search").value.toLowerCase();

lista.innerHTML="";

items.forEach(item=>{

if(filtro !== "tutti" && item.tipo !== filtro) return;
if(!item.nome.toLowerCase().includes(search)) return;

lista.innerHTML += `
<div class="card">
<div class="badge">${item.tipo}</div>
<img src="${item.immagine || 'assets/default.png'}">
<div class="nome">${item.nome}</div>
<div class="prezzo">€ ${item.prezzo}</div>
</div>
`;

});

}

/* FILTRO */
window.filtra = (t)=>{
filtro = t;
render();
};

/* SEARCH */
document.getElementById("search").oninput = render;

</script>

</body>
</html>
