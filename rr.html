<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Documento Ufficiale</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at 50% 20%,#2a1b3f,#0f0818);
  font-family:'Segoe UI',sans-serif;
}

/* WRAPPER 3D */
.wrapper{ perspective:2500px; }

.card{
  width:540px;
  height:340px;
  position:relative;
  transform-style:preserve-3d;
  transition:1.2s cubic-bezier(.2,.8,.2,1);
  cursor:pointer;
}

.card.flipped{ transform:rotateY(180deg); }

.face{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:18px;
  backface-visibility:hidden;
  overflow:hidden;
  box-shadow:0 40px 80px rgba(0,0,0,0.8);
}

/* ===== FRONTE ===== */
.front{
  background:
    radial-gradient(circle at 20% 30%,rgba(0,120,255,0.05),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(0,200,180,0.05),transparent 40%),
    linear-gradient(135deg,#fdfdfd,#f1f1f1);
  padding:30px;
  position:relative;
}

/* Microtesto sicurezza */
.front::before{
  content:"ITALIA RP • REPUBBLICA ROLEPLAY • ITALIA RP • REPUBBLICA ROLEPLAY • ";
  position:absolute;
  top:0;
  left:0;
  width:200%;
  font-size:18px;
  color:rgba(0,0,0,0.025);
  transform:rotate(-25deg);
  white-space:nowrap;
}

/* Guilloche pattern */
.front::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-radial-gradient(circle at center, rgba(0,0,0,0.02) 0px, transparent 4px),
    repeating-linear-gradient(45deg, rgba(0,0,0,0.02) 0px, transparent 5px);
  pointer-events:none;
}

/* Riflesso plastica */
.gloss{
  position:absolute;
  top:0;
  left:-120%;
  width:60%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
  transform:skewX(-25deg);
  transition:1s;
}

.card:hover .gloss{ left:150%; }

/* Tricolore laterale */
.flag{
  position:absolute;
  left:0;
  top:0;
  width:14px;
  height:100%;
  background:linear-gradient(#008C45 33%,#ffffff 33% 66%,#CD212A 66%);
}

.header{
  display:flex;
  justify-content:space-between;
}

.title{
  font-size:22px;
  font-weight:800;
  letter-spacing:2px;
}

.subtitle{
  font-size:12px;
  color:#555;
}

.logo{ width:85px; }

.content{
  display:flex;
  margin-top:25px;
  gap:30px;
}

.photo{
  width:150px;
  height:190px;
  border-radius:10px;
  border:2px solid #aaa;
  overflow:hidden;
  background:#ddd;
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.info{ flex:1; font-size:15px; }

.row{ margin-bottom:10px; }

.label{ font-weight:700; }

.signature{
  margin-top:18px;
  font-family:"Brush Script MT",cursive;
  font-size:28px;
  border-top:1px solid #333;
  width:260px;
}

/* Ologramma */
.hologram{
  position:absolute;
  right:25px;
  bottom:25px;
  width:110px;
  height:110px;
  border-radius:50%;
  background:conic-gradient(from 0deg,
    rgba(0,255,255,0.6),
    rgba(255,0,255,0.6),
    rgba(255,255,0,0.6),
    rgba(0,255,255,0.6));
  animation:spin 8s linear infinite;
  opacity:0.45;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* ===== RETRO ===== */
.back{
  transform:rotateY(180deg);
  background:
    linear-gradient(180deg,#cfe3e6,#e8f1f3);
  padding:30px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  font-size:14px;
  border:1px solid rgba(0,0,0,0.2);
  position:relative;
}

.back::before{
  content:"REPUBBLICA ROLEPLAY ITALIA RP REPUBBLICA ROLEPLAY ITALIA RP";
  position:absolute;
  top:0;
  left:0;
  width:200%;
  font-size:18px;
  color:rgba(0,0,0,0.03);
  transform:rotate(-20deg);
  white-space:nowrap;
}

.field{ margin-bottom:10px; }

.field span{ font-weight:bold; }

.big-barcode{
  height:90px;
  background:repeating-linear-gradient(
    90deg,
    #000 0px,#000 2px,
    #fff 2px,#fff 4px,
    #000 4px,#000 7px,
    #fff 7px,#fff 9px
  );
  border-radius:4px;
}

.barcode-number{
  font-family:monospace;
  text-align:center;
  margin-top:5px;
  font-size:14px;
}

.mrz{
  font-family:monospace;
  font-size:15px;
  letter-spacing:2px;
  margin-top:8px;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="card" id="card">

    <!-- FRONTE -->
    <div class="face front">
      <div class="flag"></div>
      <div class="gloss"></div>

      <div class="header">
        <div>
          <div class="title">ITALIA RP</div>
          <div class="subtitle">Documento Ufficiale Roleplay</div>
        </div>
        <img src="assets/logo.png" class="logo">
      </div>

      <div class="content">
        <div class="photo"></div>

        <div class="info">
          <div class="row"><span class="label">Nome:</span> Damiano</div>
          <div class="row"><span class="label">Cognome:</span> Rossi</div>
          <div class="row"><span class="label">Data Nascita:</span> 12/03/1998</div>
          <div class="row"><span class="label">Occhi:</span> Marroni</div>
          <div class="row"><span class="label">Capelli:</span> Neri</div>

          <div class="signature">Damiano Rossi</div>
        </div>
      </div>

      <div class="hologram"></div>
    </div>

    <!-- RETRO -->
    <div class="face back">

      <div>
        <div class="field">
          <span>Codice Fiscale:</span> RSSDMI98C12H501Z
        </div>
        <div class="field">
          <span>Residenza:</span> Via Roma 12, Milano
        </div>
        <div class="field">
          <span>Estremi Atto di Nascita:</span> 00000.0.A00
        </div>
      </div>

      <div>
        <div class="big-barcode"></div>
        <div class="barcode-number">ITA-4821-9374</div>

        <div class="mrz">IDITAROSSI<<DAMIANO<<<<<<<<<<<<<<</div>
        <div class="mrz">48219374ITA120398<<<<<<<<<<<<<<<</div>
      </div>

    </div>

  </div>
</div>

<script>
card.onclick=()=>card.classList.toggle("flipped");
</script>

</body>
</html>
