<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attività</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
color:white;
background-image:url("assets/sfondo.webp");
background-size:cover;
background-position:center;
padding:15px;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* MENU */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(0,255,136,0.5);
}

/* INPUT */
input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
}

/* UTENTI */
.user{
display:flex;
align-items:center;
gap:10px;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:15px;
margin-bottom:10px;
cursor:pointer;
transition:0.2s;
}

.user:hover{
transform:scale(1.02);
background:rgba(0,255,136,0.2);
}

.user img{
width:40px;
height:40px;
border-radius:50%;
}

/* ITEM */
.item{
background:rgba(255,255,255,0.08);
border-radius:15px;
padding:10px;
margin-bottom:10px;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
transition:0.2s;
}

.item:hover{
transform:scale(1.03);
box-shadow:0 0 15px rgba(0,255,136,0.5);
}

.item img{
width:60px;
height:60px;
object-fit:contain;
}

.prezzo{
color:#00ff88;
font-weight:bold;
}

.badge{
font-size:10px;
background:#00ff88;
color:black;
padding:3px 6px;
border-radius:10px;
margin-left:auto;
}

/* BUTTON */
button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#00aa44;
color:white;
}

/* SUCCESS */
.success-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.4s;
z-index:9999;
}

.success-overlay.active{
opacity:1;
pointer-events:auto;
}

.success-box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
text-align:center;
animation:scaleIn 0.4s ease;
}

.check{
font-size:50px;
color:#00ff88;
margin-bottom:10px;
animation:pop 0.5s ease;
}

@keyframes scaleIn{
0%{transform:scale(0.6); opacity:0;}
100%{transform:scale(1); opacity:1;}
}

@keyframes pop{
0%{transform:scale(0);}
80%{transform:scale(1.2);}
100%{transform:scale(1);}
}

.hidden{
display:none;
}

</style>

</head>

<body>

<h2>Attività</h2>

<div id="menu" class="grid"></div>

<!-- UTENTI -->
<div id="utentiStep" class="hidden">
<input id="searchUser" placeholder="Cerca utente...">
<div id="listaUtenti"></div>
</div>

<!-- ITEM -->
<div id="itemStep" class="hidden">
<input id="searchItem" placeholder="Cerca...">
<div id="listaItem"></div>
</div>

<!-- COMPRA -->
<div id="compraStep" class="hidden">
<h3 id="nomeItem"></h3>
<input id="colore" placeholder="Colore">
<input id="targa" placeholder="Targa">
<button id="compra">Compra</button>
</div>

<button onclick="tornaMenu()" id="backBtn" class="hidden">⬅ Torna</button>

<!-- SUCCESS -->
<div id="successOverlay" class="success-overlay">
<div class="success-box">
<div class="check">✔</div>
<h2>Acquisto completato</h2>
<p id="successText"></p>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSy...",
projectId: "sito-rp"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = localStorage.getItem("discord_uid");

const snap = await getDoc(doc(db,"users",uid));
const data = snap.data();

const index = parseInt(localStorage.getItem("personaggioIndex"));
const personaggio = data.personaggi[index];

const ruolo = personaggio.lavoro;

const menu = document.getElementById("menu");

let utenti = [];
let items = [];
let utenteSelezionato = null;
let itemSelezionato = null;
let filtroTipo = "";

/* MENU */
if(ruolo === "concessionario"){
menu.innerHTML += card("Veicoli","veicolo");
}
if(ruolo === "armaiolo"){
menu.innerHTML += card("Armi","arma");
}

function card(nome,tipo){
return `<div class="card" onclick="entra('${tipo}')">${nome}</div>`;
}

/* ENTRA */
window.entra = async (tipo)=>{
filtroTipo = tipo;

menu.classList.add("hidden");
utentiStep.classList.remove("hidden");
backBtn.classList.remove("hidden");

const snapUsers = await getDocs(collection(db,"users"));
utenti = [];

snapUsers.forEach(doc=>{
utenti.push({id:doc.id, ...doc.data()});
});

renderUtenti();
};

/* UTENTI */
function renderUtenti(){

listaUtenti.innerHTML="";
const search = searchUser.value.toLowerCase();

utenti.forEach(u=>{
const nome = u.personaggi?.[0]?.nome || "User";

if(!nome.toLowerCase().includes(search)) return;

listaUtenti.innerHTML += `
<div class="user" onclick="scegliUtente('${u.id}')">
<img src="https://cdn.discordapp.com/embed/avatars/0.png">
<span>${nome}</span>
</div>
`;
});

}

searchUser.oninput = renderUtenti;

window.scegliUtente = async (id)=>{
utenteSelezionato = utenti.find(u=>u.id===id);

utentiStep.classList.add("hidden");
itemStep.classList.remove("hidden");

const snapItems = await getDocs(collection(db,"items"));

items = [];
snapItems.forEach(doc=>{
const d = doc.data();
if(d.tipo === filtroTipo) items.push(d);
});

renderItems();
};

/* ITEMS */
function renderItems(){

listaItem.innerHTML="";
const search = searchItem.value.toLowerCase();

items.forEach(i=>{
if(!i.nome.toLowerCase().includes(search)) return;

listaItem.innerHTML += `
<div class="item" onclick="scegliItem('${i.nome}')">
<img src="${i.immagine || 'assets/default.png'}">
<div>
<div>${i.nome}</div>
<div class="prezzo">€ ${i.prezzo}</div>
</div>
<div class="badge">${i.tipo}</div>
</div>
`;
});

}

searchItem.oninput = renderItems;

window.scegliItem = (nome)=>{
itemSelezionato = items.find(i=>i.nome===nome);

itemStep.classList.add("hidden");
compraStep.classList.remove("hidden");

nomeItem.innerText = nome;
};

/* COMPRA */
compra.onclick = async ()=>{

const prezzo = itemSelezionato.prezzo;

if(utenteSelezionato.banca < prezzo){
alert("Soldi insufficienti");
return;
}

await updateDoc(doc(db,"users",utenteSelezionato.id),{
banca: utenteSelezionato.banca - prezzo
});

let nuovoItem = {
tipo:itemSelezionato.tipo,
nome:itemSelezionato.nome
};

if(itemSelezionato.tipo === "veicolo"){
nuovoItem.targa = targa.value;
nuovoItem.colore = colore.value;
}

await updateDoc(doc(db,"users",utenteSelezionato.id),{
"personaggi.0.inventario": arrayUnion(nuovoItem)
});

/* ANIMAZIONE */
const audio = new Audio("assets/success.mp3");
audio.play();

successText.innerText = itemSelezionato.nome + " acquistato!";
successOverlay.classList.add("active");

setTimeout(()=>{
successOverlay.classList.remove("active");
location.reload();
},2000);

};

/* TORNA */
window.tornaMenu = ()=> location.reload();

</script>

</body>
</html>
