<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    color:white;

    /* SFONDO NITIDO */
    background-image:url("assets/sfondo.webp");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* Overlay leggero per leggibilità (NON sfoca) */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:-1;
}

/* ===== HEADER GLASS ===== */
.header{
    height:75px;
    backdrop-filter:blur(8px);
    background:rgba(15,15,15,0.55);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    border-bottom:1px solid rgba(255,255,255,0.15);
}

.logo img{
    width:55px;
}

/* Orologio centro */
.clock{
    font-size:22px;
    font-weight:600;
    letter-spacing:2px;
}

/* Icone destra */
.top-icons{
    display:flex;
    gap:20px;
}

.top-icons img{
    width:26px;
    cursor:pointer;
    transition:0.2s ease;
}

.top-icons img:hover{
    transform:scale(1.15);
}

/* ===== GRID APP ===== */
.grid{
    flex:1;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:70px;
    padding:80px 60px;
    justify-items:center;
}

@media(max-width:900px){
    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

.app{
    display:flex;
    flex-direction:column;   /* TESTO SOTTO */
    align-items:center;
    cursor:pointer;
    transition:0.3s ease;
}

.app img{
    width:85px;
    height:85px;
    object-fit:contain;
    margin-bottom:12px;
}

.app span{
    font-size:15px;
    font-weight:500;
    text-align:center;
}

.app:hover{
    transform:scale(1.12);
    filter:drop-shadow(0 0 15px rgba(0,255,0,0.7));
}

/* ===== FOOTER ===== */
.footer{
    height:50px;
    backdrop-filter:blur(6px);
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    border-top:1px solid rgba(255,255,255,0.15);
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">
        <img src="assets/logo.png" alt="Logo">
    </div>

    <div class="clock" id="clock"></div>

    <div class="top-icons">
        <img src="assets/logo-documento.png" alt="Documenti" id="btnDocumenti">
        <img src="assets/logo-impostazioni.png" alt="Impostazioni" id="btnImpostazioni">
    </div>
</div>

<div class="grid">

    <div class="app" data-app="Comune">
        <img src="assets/comune.png">
        <span>Comune</span>
    </div>

    <div class="app" data-app="Banca">
        <img src="assets/banca.png">
        <span>Banca</span>
    </div>

    <div class="app" data-app="Whatsapp">
        <img src="assets/whatsapp.png">
        <span>Whatsapp</span>
    </div>

    <div class="app" data-app="Instagram">
        <img src="assets/instagram.png">
        <span>Instagram</span>
    </div>

    <div class="app" data-app="Bitcoin">
        <img src="assets/bitcoin.png">
        <span>Bitcoin</span>
    </div>

    <div class="app" data-app="Inventario">
        <img src="assets/inventario.png">
        <span>Inventario</span>
    </div>

    <div class="app" data-app="Dark Web">
        <img src="assets/darkweb.png">
        <span>Dark Web</span>
    </div>

    <div class="app" data-app="Listini">
        <img src="assets/listini.png">
        <span>Listini</span>
    </div>

</div>

<div class="footer">
    © 2025 Italia RP - Tutti i diritti riservati
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
  authDomain: "sito-rp.firebaseapp.com",
  projectId: "sito-rp",
  storageBucket: "sito-rp.firebasestorage.app",
  messagingSenderId: "234781749995",
  appId: "1:234781749995:web:6954473363659fe38b04ae",
  measurementId: "G-R23N60PBYY"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = sessionStorage.getItem("discord_uid");
if(!uid){
    window.location.href="index.html";
}

/* OROLOGIO */
function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerText =
        now.getHours().toString().padStart(2,"0")+":"+
        now.getMinutes().toString().padStart(2,"0")+":"+
        now.getSeconds().toString().padStart(2,"0");
}
setInterval(updateClock,1000);
updateClock();

/* DOCUMENTI */
document.getElementById("btnDocumenti").onclick = ()=>{
    window.location.href="lista-personaggi.html";
};

/* IMPOSTAZIONI */
document.getElementById("btnImpostazioni").onclick = ()=>{
    alert("Impostazioni in arrivo...");
};

/* LOG APERTURA APP */
document.querySelectorAll(".app").forEach(app=>{
    app.onclick = async ()=>{
        const nomeApp = app.dataset.app;

        await addDoc(collection(db,"users",uid,"logs"),{
            app:nomeApp,
            timestamp:serverTimestamp()
        });

        alert("Aperto: " + nomeApp);
    };
});
</script>

</body>
</html>
