<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Home</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
color:white;
background-image:url("assets/sfondo.webp");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
z-index:-1;
}

.header{
height:75px;
backdrop-filter:blur(8px);
background:rgba(15,15,15,0.55);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
border-bottom:1px solid rgba(255,255,255,0.15);
}

.logo img{
width:55px;
}

.clock{
font-size:22px;
font-weight:600;
letter-spacing:2px;
}

/* GRID SISTEMATA */
.grid{
flex:1;
display:grid;
grid-template-columns:repeat(auto-fit, minmax(100px, 1fr));
gap:30px;
padding:60px 30px;
justify-items:center;
max-width:800px;
margin:0 auto;
}

/* APP */
.app{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
transition:transform 0.15s ease, filter 0.2s ease;
}

.app img{
width:70px;
height:70px;
object-fit:contain;
margin-bottom:10px;
}

.app span{
font-size:14px;
text-align:center;
}

/* HOVER SOLO PC */
@media (hover: hover) {
.app:hover{
transform:scale(1.1);
filter:drop-shadow(0 0 10px rgba(0,255,0,0.6));
}
}

/* CLICK MOBILE */
.app:active{
transform:scale(0.9);
}

.footer{
height:50px;
background:rgba(0,0,0,0.5);
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">
<div class="logo">
<img src="assets/logo.png">
</div>
<div class="clock" id="clock"></div>
</div>

<div class="grid">

<div class="app" data-app="Comune">
<img src="assets/comune.png" onerror="this.src='assets/default.png'">
<span>Comune</span>
</div>

<div class="app" data-app="Banca">
<img src="assets/banca.png" onerror="this.src='assets/default.png'">
<span>Banca</span>
</div>

<div class="app" data-app="Whatsapp">
<img src="assets/whatsapp.png" onerror="this.src='assets/default.png'">
<span>Whatsapp</span>
</div>

<div class="app" data-app="Instagram">
<img src="assets/instagram.png" onerror="this.src='assets/default.png'">
<span>Instagram</span>
</div>

<!-- STAFF -->
<div class="app" id="dashboardStaff" data-app="DashboardStaff" style="display:none;">
<img src="assets/logo-staff.png" onerror="this.src='assets/default.png'">
<span>Dashboard Staff</span>
</div>

</div>

<div class="footer">
© 2025 Italia RP
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain: "sito-rp.firebaseapp.com",
projectId: "sito-rp"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = localStorage.getItem("discord_uid");
const personaggioIndex = parseInt(localStorage.getItem("personaggioIndex"));

if(!uid || isNaN(personaggioIndex)){
window.location.href="index.html";
}

/* OROLOGIO */
function updateClock(){
const now = new Date();
document.getElementById("clock").innerText =
now.getHours().toString().padStart(2,"0")+":"+
now.getMinutes().toString().padStart(2,"0")+":"+
now.getSeconds().toString().padStart(2,"0");
}
setInterval(updateClock,1000);
updateClock();

/* CONTROLLO STAFF */
const snap = await getDoc(doc(db,"users",uid));
if(snap.exists()){
const data = snap.data();

let ruolo = data.gradoStaff;

if(!ruolo){
const lista = data.personaggi || [];
const p = lista[personaggioIndex];
ruolo = p?.gradoStaff;
}

if(ruolo === "staff" || ruolo === "admin" || ruolo === "founder"){
document.getElementById("dashboardStaff").style.display = "flex";
}
}

/* APERTURA APP */
document.querySelectorAll(".app").forEach(appEl=>{

appEl.onclick = async ()=>{

appEl.style.transform = "scale(1.2)";
appEl.style.opacity = "0.5";

setTimeout(async ()=>{

const nomeApp = appEl.dataset.app;

// LOG
await addDoc(collection(db,"users",uid,"logs"),{
app:nomeApp,
timestamp:serverTimestamp()
});

// LINK
switch(nomeApp){

case "Banca":
window.location.href="banca.html";
break;

case "DashboardStaff":
window.location.href="staff.html";
break;

case "Comune":
window.location.href="comune.html";
break;

case "Whatsapp":
window.location.href="whatsapp.html";
break;

case "Instagram":
window.location.href="instagram.html";
break;

default:
alert("Aperto: "+nomeApp);
}

},200);

};

});

</script>

</body>
</html>
