<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    color:white;

    /* ===== SFONDO (CAMBIA QUI IL FILE) ===== */
    background-image:url("assets/sfondo.webp");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* ===== HEADER GLASS ===== */
.header{
    height:75px;
    backdrop-filter:blur(12px);
    background:rgba(15,15,15,0.6);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* Logo */
.logo img{
    width:55px;
}

/* Orologio */
.clock{
    font-size:22px;
    font-weight:bold;
    letter-spacing:2px;
}

/* Icone destra */
.top-icons{
    display:flex;
    gap:20px;
}

.top-icons img{
    width:26px;
    cursor:pointer;
    transition:0.2s;
}

.top-icons img:hover{
    transform:scale(1.15);
}

/* ===== GRID APP ===== */
.grid{
    flex:1;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:60px;
    padding:60px 40px;
    justify-items:center;
}

@media(max-width:900px){
    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

.app{
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.app img{
    width:80px;
    height:80px;
    object-fit:contain;
    margin-bottom:10px;
}

.app span{
    font-size:16px;
    color:#fff;
}

.app:hover{
    transform:scale(1.1);
    filter:drop-shadow(0 0 12px rgba(0,255,0,0.6));
}

/* ===== FOOTER ===== */
.footer{
    height:50px;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    border-top:1px solid rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">
        <img src="assets/logo.png" alt="Logo">
    </div>

    <div class="clock" id="clock"></div>

    <div class="top-icons">
        <img src="assets/documenti.png" alt="Documenti" id="btnDocumenti">
        <img src="assets/impostazioni.png" alt="Impostazioni" id="btnImpostazioni">
    </div>
</div>

<!-- APP GRID -->
<div class="grid">

    <div class="app" data-app="Comune">
        <img src="assets/comune.png">
        <span>Comune</span>
    </div>

    <div class="app" data-app="Banca">
        <img src="assets/banca.png">
        <span>Banca</span>
    </div>

    <div class="app" data-app="Whatsapp">
        <img src="assets/whatsapp.png">
        <span>Whatsapp</span>
    </div>

    <div class="app" data-app="Instagram">
        <img src="assets/instagram.png">
        <span>Instagram</span>
    </div>

    <div class="app" data-app="Bitcoin">
        <img src="assets/bitcoin.png">
        <span>Bitcoin</span>
    </div>

    <div class="app" data-app="Inventario">
        <img src="assets/inventario.png">
        <span>Inventario</span>
    </div>

    <div class="app" data-app="Dark Web">
        <img src="assets/darkweb.png">
        <span>Dark Web</span>
    </div>

    <div class="app" data-app="Listini">
        <img src="assets/listini.png">
        <span>Listini</span>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    © 2025 Italia RP - Tutti i diritti riservati
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
  authDomain: "sito-rp.firebaseapp.com",
  projectId: "sito-rp",
  storageBucket: "sito-rp.firebasestorage.app",
  messagingSenderId: "234781749995",
  appId: "1:234781749995:web:6954473363659fe38b04ae",
  measurementId: "G-R23N60PBYY"
};
    
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* CONTROLLO LOGIN */
const uid = sessionStorage.getItem("discord_uid");
if(!uid){
    window.location.href="index.html";
}

/* OROLOGIO */
function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerText =
        now.getHours().toString().padStart(2,"0")+":"+
        now.getMinutes().toString().padStart(2,"0")+":"+
        now.getSeconds().toString().padStart(2,"0");
}
setInterval(updateClock,1000);
updateClock();

/* CLICK DOCUMENTI */
document.getElementById("btnDocumenti").onclick = ()=>{
    window.location.href="lista-personaggi.html";
};

/* CLICK IMPOSTAZIONI */
document.getElementById("btnImpostazioni").onclick = ()=>{
    alert("Sezione impostazioni in arrivo...");
};

/* LOG APERTURA APP */
document.querySelectorAll(".app").forEach(app=>{
    app.onclick = async ()=>{
        const nomeApp = app.dataset.app;

        await addDoc(collection(db,"users",uid,"logs"),{
            app:nomeApp,
            timestamp:serverTimestamp()
        });

        alert("Aperto: " + nomeApp);
    };
});
</script>

</body>
</html>
