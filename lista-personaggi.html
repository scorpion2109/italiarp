<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personaggi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#1c102b;color:white;padding:20px;}
h2{margin-bottom:15px;}
/* CARD PERSONAGGIO */
.pg-card{display:flex;align-items:center;gap:15px;background:rgba(255,255,255,0.08);padding:12px;border-radius:15px;margin-bottom:10px;transition:0.2s;}
.pg-card:hover{transform:scale(1.02);box-shadow:0 0 15px #00ff88;}
.avatar{width:60px;height:60px;border-radius:50%;cursor:pointer;transition:0.2s;}
.avatar:hover{transform:scale(1.1);box-shadow:0 0 10px #00ff88;}
.nome{font-size:18px;font-weight:600;cursor:pointer;}
.nome:hover{color:#00ff88;}
.lavoro{font-size:12px;opacity:0.7;}
/* DOCUMENTO */
.doc-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:9999;}
.doc-box{width:350px;background:linear-gradient(135deg,#e6f0ff,#ffffff);color:black;border-radius:15px;padding:15px;box-shadow:0 0 20px rgba(0,0,0,0.5);font-family:Arial;}
.doc-header{text-align:center;font-weight:bold;color:#004aad;margin-bottom:10px;}
.doc-body{display:flex;gap:10px;}
.doc-left img{width:90px;height:110px;object-fit:cover;border:1px solid #000;}
.doc-right p{font-size:13px;margin:4px 0;}
.doc-box button{margin-top:10px;width:100%;padding:8px;border:none;background:#004aad;color:white;border-radius:8px;cursor:pointer;}
</style>
</head>
<body>

<h2>I tuoi personaggi</h2>

<!-- FORM CREAZIONE -->
<div style="margin-bottom:20px;">
<input type="text" id="nomeInput" placeholder="Nome">
<input type="text" id="cognomeInput" placeholder="Cognome">
<input type="file" id="avatarInput">
<button onclick="creaPersonaggio()">Crea Personaggio</button>
</div>

<div id="lista"></div>

<!-- DOCUMENTO -->
<div id="docOverlay" class="doc-overlay">
<div class="doc-box">
<div class="doc-header">REPUBBLICA ITALIANA</div>
<div class="doc-body">
<div class="doc-left">
<img src="assets/avatar.png" id="docAvatar">
</div>
<div class="doc-right">
<p><strong>Nome:</strong> <span id="docNome"></span></p>
<p><strong>Cognome:</strong> <span id="docCognome"></span></p>
<p><strong>Lavoro:</strong> <span id="docLavoro"></span></p>
<p><strong>Città:</strong> Roma</p>
<p><strong>ID:</strong> <span id="docID"></span></p>
</div>
</div>
<button onclick="chiudiDoc()">Chiudi</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSy...", // Metti la tua API key
authDomain: "sito-rp.firebaseapp.com",
projectId: "sito-rp",
storageBucket: "sito-rp.appspot.com",
messagingSenderId: "123456789",
appId: "1:123456789:web:abcdef"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const uid = localStorage.getItem("discord_uid");

if(!uid){ window.location.href="index.html"; }

const ref = doc(db,"users",uid);
const snap = await getDoc(ref);

let personaggi = snap.exists() ? snap.data().personaggi || [] : [];
const lista = document.getElementById("lista");

/* RENDER PERSONAGGI */
function renderLista(){
    lista.innerHTML = "";
    personaggi.forEach((pg,index)=>{
        lista.innerHTML += `
        <div class="pg-card">
            <img src="${pg.avatar || 'assets/avatar.png'}" class="avatar" onclick="apriDocumento(${index})">
            <div>
                <div class="nome" onclick="entra(${index})">${pg.nome} ${pg.cognome}</div>
                <div class="lavoro">${pg.lavoro || "Disoccupato"}</div>
            </div>
        </div>`;
    });
}
renderLista();

/* CREA PERSONAGGIO */
window.creaPersonaggio = async ()=>{
    const nome = document.getElementById("nomeInput").value;
    const cognome = document.getElementById("cognomeInput").value;
    const file = document.getElementById("avatarInput").files[0];
    if(!nome || !cognome){ alert("Inserisci nome e cognome"); return; }

    let avatarBase64 = "";
    if(file){
        const reader = new FileReader();
        await new Promise(resolve=>{
            reader.onload = ()=>{
                avatarBase64 = reader.result;
                resolve();
            };
            reader.readAsDataURL(file);
        });
    }

    personaggi.push({nome,cognome,lavoro:null,inventario:[],avatar:avatarBase64});
    await setDoc(ref,{personaggi:personaggi},{merge:true});
    alert("Personaggio creato!");
    renderLista();
};

/* ENTRA PERSONAGGIO */
window.entra = (i)=>{
    localStorage.setItem("personaggioIndex",i);
    window.location.href="home.html";
};

/* DOCUMENTO */
const docOverlay = document.getElementById("docOverlay");
const docNome = document.getElementById("docNome");
const docCognome = document.getElementById("docCognome");
const docLavoro = document.getElementById("docLavoro");
const docID = document.getElementById("docID");
const docAvatar = document.getElementById("docAvatar");

window.apriDocumento = (i)=>{
    const pg = personaggi[i];
    docNome.innerText = pg.nome;
    docCognome.innerText = pg.cognome;
    docLavoro.innerText = pg.lavoro || "Disoccupato";
    docID.innerText = i + "-" + uid.substring(0,5);
    docAvatar.src = pg.avatar || "assets/avatar.png";
    docOverlay.style.display="flex";
};

window.chiudiDoc = ()=>{ docOverlay.style.display="none"; };
</script>

</body>
</html>
