<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{
  background:radial-gradient(circle at 50% 20%,#2a1b3f,#0f0818);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}
.container{margin-top:20px;width:90%;max-width:700px;}
button{padding:10px 20px;background:#5865F2;border:none;border-radius:10px;color:white;cursor:pointer;margin:10px 0;}
.personaggio{background:rgba(255,255,255,0.1);padding:10px;border-radius:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.personaggio-info{display:flex;align-items:center;gap:10px;cursor:pointer;}
.personaggio img{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid white;}
.actions{display:flex;gap:10px;font-size:20px;cursor:pointer;}
form{display:none;flex-direction:column;gap:10px;margin-top:15px;}
input{padding:8px;border-radius:8px;border:none;}
.wrapper{perspective:2500px;margin-top:30px;display:none;}
.card{width:540px;height:340px;position:relative;transform-style:preserve-3d;transition:1.2s cubic-bezier(.2,.8,.2,1);cursor:pointer;}
.card.flipped{transform:rotateY(180deg);}
.face{position:absolute;width:100%;height:100%;border-radius:18px;backface-visibility:hidden;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,0.8);}
.front{background:radial-gradient(circle at 20% 30%,rgba(0,120,255,0.05),transparent 40%),radial-gradient(circle at 80% 70%,rgba(0,200,180,0.05),transparent 40%),linear-gradient(135deg,#fdfdfd,#f1f1f1);padding:30px;position:relative;color:black;}
.flag{position:absolute;left:0;top:0;width:14px;height:100%;background:linear-gradient(#008C45 33%,#ffffff 33% 66%,#CD212A 66%);}
.logo{position:absolute;top:20px;right:25px;width:90px;}
.content{display:flex;margin-top:60px;gap:30px;}
.photo{width:150px;height:190px;border-radius:10px;border:2px solid #aaa;overflow:hidden;background:#ddd;}
.photo img{width:100%;height:100%;object-fit:cover;}
.info{flex:1;font-size:15px;}
.row{margin-bottom:10px;}
.label{font-weight:700;}
.signature{margin-top:18px;font-family:"Brush Script MT",cursive;font-size:28px;border-top:1px solid #333;width:260px;}
.hologram{position:absolute;right:25px;bottom:25px;width:110px;height:110px;border-radius:50%;background:conic-gradient(rgba(0,255,255,0.6),rgba(255,0,255,0.6),rgba(255,255,0,0.6),rgba(0,255,255,0.6));animation:spin 8s linear infinite;opacity:0.45;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.back{transform:rotateY(180deg);background:linear-gradient(180deg,#cfe3e6,#e8f1f3);padding:30px;display:flex;flex-direction:column;justify-content:space-between;font-size:14px;border:1px solid rgba(0,0,0,0.2);color:black;}
</style>
</head>
<body>

<div class="container">
<h2>Selezione Personaggio</h2>

<div id="lista"></div>
<button id="btnCrea">Crea Personaggio</button>

<form id="form">
<input type="text" id="nome" placeholder="Nome" required>
<input type="text" id="cognome" placeholder="Cognome" required>
<input type="text" id="data" placeholder="Data nascita" required>
<input type="text" id="occhi" placeholder="Occhi" required>
<input type="text" id="capelli" placeholder="Capelli" required>
<input type="text" id="residenza" placeholder="Residenza" required>
<input type="file" id="fotoInput" accept="image/*" required>
<button type="submit">Conferma</button>
</form>
</div>

<div class="wrapper">
<div class="card" id="card">

<div class="face front">
<div class="flag"></div>
<img src="assets/logo.png" class="logo">
<div class="content">
<div class="photo"><img id="c_foto"></div>
<div class="info">
<div class="row"><span class="label">Nome:</span> <span id="c_nome"></span></div>
<div class="row"><span class="label">Cognome:</span> <span id="c_cognome"></span></div>
<div class="row"><span class="label">Data Nascita:</span> <span id="c_data"></span></div>
<div class="row"><span class="label">Occhi:</span> <span id="c_occhi"></span></div>
<div class="row"><span class="label">Capelli:</span> <span id="c_capelli"></span></div>
<div class="signature" id="c_firma"></div>
</div>
</div>
<div class="hologram"></div>
</div>

<div class="face back">
<div>
<p><b>Codice Fiscale:</b> <span id="c_cf"></span></p>
<p><b>Residenza:</b> <span id="c_res"></span></p>
</div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
  authDomain: "sito-rp.firebaseapp.com",
  projectId: "sito-rp",
  storageBucket: "sito-rp.appspot.com",
  messagingSenderId: "234781749995",
  appId: "1:234781749995:web:6954473363659fe38b04ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const MAX=2;
const CODICE="ITALIARP2025";
let listaPers = [];
const uid = sessionStorage.getItem("discord_uid");

if(!uid){
    alert("Utente non loggato!");
    window.location.href="index.html";
}

const lista=document.getElementById("lista");
const form=document.getElementById("form");
const btn=document.getElementById("btnCrea");
const wrapper=document.querySelector(".wrapper");
const card=document.getElementById("card");

// CARICA PERSONAGGI FIRESTORE
async function caricaLista(){
    const docRef = doc(db, "users", uid);
    const docSnap = await getDoc(docRef);
    if(docSnap.exists()){
        listaPers = docSnap.data().personaggi || [];
        aggiornaLista();
    }
}
caricaLista();

function salvaFirestore(){
    setDoc(doc(db,"users",uid),{personaggi: listaPers});
}

function aggiornaLista(){
lista.innerHTML="";
listaPers.forEach((p,index)=>{
let div=document.createElement("div");
div.className="personaggio";

let info=document.createElement("div");
info.className="personaggio-info";
info.onclick=()=>mostraCarta(p);

let img=document.createElement("img");
img.src=p.foto;

let nome=document.createElement("div");
nome.textContent=p.nome+" "+p.cognome;

info.appendChild(img);
info.appendChild(nome);

div.appendChild(info);
lista.appendChild(div);
});
}

btn.onclick=()=>{
if(listaPers.length>=MAX){alert("Massimo 2 personaggi");return;}
if(listaPers.length===1){
let c=prompt("Inserisci codice:");
if(c!==CODICE){alert("Codice errato");return;}
}
form.style.display="flex";
};

function generaCF(p){
return p.cognome.substring(0,3).toUpperCase()+p.nome.substring(0,3).toUpperCase()+"25X0";
}

form.onsubmit=e=>{
e.preventDefault();
let reader=new FileReader();
reader.onload=function(){
let p={
nome:nome.value,
cognome:cognome.value,
data:data.value,
occhi:occhi.value,
capelli:capelli.value,
residenza:residenza.value,
foto:reader.result,
barcode: Math.floor(Math.random()*1000000000),
firma: nome.value+" "+cognome.value
};
listaPers.push(p);
salvaFirestore();
aggiornaLista();
mostraCarta(p);
form.reset();
form.style.display="none";
};
reader.readAsDataURL(fotoInput.files[0]);
};

function mostraCarta(p){
wrapper.style.display="block";
card.classList.remove("flipped");

c_nome.textContent=p.nome;
c_cognome.textContent=p.cognome;
c_data.textContent=p.data;
c_occhi.textContent=p.occhi;
c_capelli.textContent=p.capelli;
c_res.textContent=p.residenza;
c_firma.textContent=p.firma;
c_cf.textContent=generaCF(p);
c_foto.src=p.foto;

card.onclick=()=>card.classList.toggle("flipped");
}
</script>

</body>
</html>
