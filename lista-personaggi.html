<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Selezione Personaggi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background: linear-gradient(180deg,#1c102b,#2a1b3f);
color:white;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.container{
margin-top:30px;
width:90%;
max-width:700px;
}

button{
padding:10px 20px;
background:#5865F2;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px 0;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.personaggio{
background: rgba(255,255,255,0.1);
padding:10px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.personaggio-info{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.personaggio img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:2px solid white;
}

.wrapper{
perspective:2500px;
margin-top:30px;
display:none;
}

.card{
width:540px;
height:340px;
position:relative;
transform-style:preserve-3d;
transition:1.2s;
cursor:pointer;
}

.card.flipped{
transform:rotateY(180deg);
}

.face{
position:absolute;
width:100%;
height:100%;
border-radius:18px;
backface-visibility:hidden;
overflow:hidden;
background:white;
color:black;
padding:25px;
}

.back{
transform:rotateY(180deg);
background:#e8f1f3;
}

.photo{
width:120px;
height:160px;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

form{
display:none;
flex-direction:column;
gap:10px;
margin-top:15px;
}

input{
padding:8px;
border-radius:8px;
border:none;
}

.actions{
display:flex;
gap:10px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Selezione Personaggio</h2>

<div id="lista"></div>

<button id="btnCrea">Crea Personaggio</button>

<form id="form">

<input type="text" id="nome" placeholder="Nome" required>
<input type="text" id="cognome" placeholder="Cognome" required>
<input type="text" id="data" placeholder="Data nascita" required>
<input type="text" id="occhi" placeholder="Occhi" required>
<input type="text" id="capelli" placeholder="Capelli" required>
<input type="text" id="residenza" placeholder="Residenza" required>
<input type="file" id="fotoInput" accept="image/*" required>

<button type="submit">Conferma</button>

</form>

</div>


<div class="wrapper">

<div class="card" id="card">

<div class="face front">

<div class="photo">
<img id="c_foto">
</div>

<p><b>Nome:</b> <span id="c_nome"></span></p>
<p><b>Cognome:</b> <span id="c_cognome"></span></p>
<p><b>Data:</b> <span id="c_data"></span></p>
<p><b>Occhi:</b> <span id="c_occhi"></span></p>
<p><b>Capelli:</b> <span id="c_capelli"></span></p>

</div>

<div class="face back">

<p><b>Codice Fiscale:</b> <span id="c_cf"></span></p>
<p><b>Residenza:</b> <span id="c_res"></span></p>

</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain: "sito-rp.firebaseapp.com",
projectId: "sito-rp",
storageBucket: "sito-rp.appspot.com",
messagingSenderId: "234781749995",
appId: "1:234781749995:web:6954473363659fe38b04ae"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = sessionStorage.getItem("discord_uid");

if(!uid){

alert("Utente non loggato");
window.location.href="index.html";

}

const lista = document.getElementById("lista");
const form = document.getElementById("form");
const btn = document.getElementById("btnCrea");

const wrapper = document.querySelector(".wrapper");
const card = document.getElementById("card");

let listaPers = [];

const MAX = 2;

let editingIndex = null;

async function inizializzaUtente(){

const ref = doc(db,"users",uid);
const snap = await getDoc(ref);

if(snap.exists()){

listaPers = snap.data().personaggi || [];

}else{

await setDoc(ref,{personaggi:[]});
listaPers = [];

}

aggiornaLista();

}

inizializzaUtente();

function salva(){

setDoc(doc(db,"users",uid),{personaggi:listaPers},{merge:true});

}

function aggiornaLista(){

lista.innerHTML="";

listaPers.forEach((p,index)=>{

let div=document.createElement("div");
div.className="personaggio";

let info=document.createElement("div");
info.className="personaggio-info";

info.onclick=()=>mostraCarta(p);

let img=document.createElement("img");
img.src=p.foto;

let nome=document.createElement("div");
nome.innerText=p.nome+" "+p.cognome;

nome.onclick=()=>{

sessionStorage.setItem("personaggio_index",index);
window.location.href="home.html";

};

info.appendChild(img);
info.appendChild(nome);

let actions=document.createElement("div");
actions.className="actions";

let edit=document.createElement("span");
edit.innerText="✏️";
edit.onclick=()=>modifica(index);

let del=document.createElement("span");
del.innerText="🗑️";
del.onclick=()=>{

if(confirm("Eliminare personaggio?")){

listaPers.splice(index,1);
salva();
aggiornaLista();

}

};

actions.appendChild(edit);
actions.appendChild(del);

div.appendChild(info);
div.appendChild(actions);

lista.appendChild(div);

});

}

btn.onclick=()=>{

if(listaPers.length>=MAX){

alert("Massimo 2 personaggi");
return;

}

form.style.display="flex";
editingIndex=null;

};

form.onsubmit=e=>{

e.preventDefault();

let reader=new FileReader();

reader.onload=function(){

let p={

nome:nome.value,
cognome:cognome.value,
data:data.value,
occhi:occhi.value,
capelli:capelli.value,
residenza:residenza.value,
foto:reader.result

};

if(editingIndex!==null){

listaPers[editingIndex]=p;

}else{

listaPers.push(p);

}

salva();
aggiornaLista();
mostraCarta(p);

form.reset();
form.style.display="none";

};

reader.readAsDataURL(fotoInput.files[0]);

};

function modifica(index){

let p=listaPers[index];

nome.value=p.nome;
cognome.value=p.cognome;
data.value=p.data;
occhi.value=p.occhi;
capelli.value=p.capelli;
residenza.value=p.residenza;

editingIndex=index;
form.style.display="flex";

}

function generaCF(p){

return p.cognome.substring(0,3).toUpperCase()+
p.nome.substring(0,3).toUpperCase()+"25X0";

}

function mostraCarta(p){

wrapper.style.display="block";

c_nome.innerText=p.nome;
c_cognome.innerText=p.cognome;
c_data.innerText=p.data;
c_occhi.innerText=p.occhi;
c_capelli.innerText=p.capelli;
c_res.innerText=p.residenza;
c_cf.innerText=generaCF(p);
c_foto.src=p.foto;

card.onclick=()=>card.classList.toggle("flipped");

}

</script>

</body>
  </html>
