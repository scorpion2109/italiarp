<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Selezione Personaggi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(180deg,#1c102b,#2a1b3f);
color:white;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.container{
margin-top:30px;
width:90%;
max-width:700px;
}

button{
padding:10px 20px;
background:#5865F2;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px 0;
}

.personaggio{
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.personaggio-info{
display:flex;
align-items:center;
gap:10px;
}

.personaggio img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:2px solid white;
cursor:pointer;
}

.nome{
cursor:pointer;
font-weight:bold;
}

.actions{
display:flex;
gap:10px;
font-size:18px;
cursor:pointer;
}

form{
display:none;
flex-direction:column;
gap:10px;
margin-top:15px;
}

input{
padding:8px;
border-radius:8px;
border:none;
}

#documento{
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Selezione Personaggio</h2>

<div id="lista"></div>

<div id="documento"></div>

<button id="btnCrea">Crea Personaggio</button>

<form id="form">

<input type="text" id="nome" placeholder="Nome" required>
<input type="text" id="cognome" placeholder="Cognome" required>
<input type="text" id="data" placeholder="Data nascita" required>
<input type="text" id="occhi" placeholder="Occhi" required>
<input type="text" id="capelli" placeholder="Capelli" required>
<input type="text" id="residenza" placeholder="Residenza" required>
<input type="file" id="fotoInput" accept="image/*" required>

<button type="submit">Conferma</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain: "sito-rp.firebaseapp.com",
projectId: "sito-rp",
storageBucket: "sito-rp.appspot.com",
messagingSenderId: "234781749995",
appId: "1:234781749995:web:6954473363659fe38b04ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = sessionStorage.getItem("discord_uid");

if(!uid){
alert("Utente non loggato");
window.location.href="index.html";
}

const lista=document.getElementById("lista");
const form=document.getElementById("form");
const btn=document.getElementById("btnCrea");

let listaPers=[];
let editingIndex=null;

const MAX=2;

/* CARICA PERSONAGGI */

async function carica(){

const ref=doc(db,"users",uid);
const snap=await getDoc(ref);

if(snap.exists()){
listaPers=snap.data().personaggi || [];
}else{
await setDoc(ref,{personaggi:[]});
listaPers=[];
}

aggiornaLista();

}

carica();

/* SALVA */

async function salva(){

await setDoc(doc(db,"users",uid),{
personaggi:listaPers
},{merge:true});

}

/* LISTA */

function aggiornaLista(){

lista.innerHTML="";

listaPers.forEach((p,index)=>{

let div=document.createElement("div");
div.className="personaggio";

let info=document.createElement("div");
info.className="personaggio-info";

let img=document.createElement("img");
img.src=p.foto;

img.onclick=()=>mostraDocumento(p);

let nome=document.createElement("div");
nome.className="nome";
nome.innerText=p.nome+" "+p.cognome;

nome.onclick=()=>{
sessionStorage.setItem("personaggio_index",index);
window.location.href="home.html";
};

info.appendChild(img);
info.appendChild(nome);

let actions=document.createElement("div");
actions.className="actions";

let edit=document.createElement("span");
edit.innerText="✏️";
edit.onclick=()=>modifica(index);

let del=document.createElement("span");
del.innerText="🗑️";

del.onclick=async ()=>{

if(confirm("Eliminare personaggio?")){

listaPers.splice(index,1);
await salva();
aggiornaLista();

}

};

actions.appendChild(edit);
actions.appendChild(del);

div.appendChild(info);
div.appendChild(actions);

lista.appendChild(div);

});

}

/* CREA PERSONAGGIO */

btn.onclick=()=>{

if(listaPers.length>=MAX){
alert("Massimo 2 personaggi");
return;
}

form.style.display="flex";
editingIndex=null;

};

/* SALVA PERSONAGGIO */

form.onsubmit=async e=>{

e.preventDefault();

const nome=document.getElementById("nome").value.trim().toLowerCase();
const cognome=document.getElementById("cognome").value.trim().toLowerCase();

/* BLOCCO NOMI DUPLICATI */

let duplicato=listaPers.find(p =>
p.nome.toLowerCase()===nome &&
p.cognome.toLowerCase()===cognome
);

if(duplicato && editingIndex===null){
alert("Nome già esistente");
return;
}

const reader=new FileReader();

reader.onload=async function(){

let p={

nome:document.getElementById("nome").value,
cognome:document.getElementById("cognome").value,
data:document.getElementById("data").value,
occhi:document.getElementById("occhi").value,
capelli:document.getElementById("capelli").value,
residenza:document.getElementById("residenza").value,
foto:reader.result,

contanti:5000,
banca:20000,
debito:0,
storico:[]

};

if(editingIndex!==null){
listaPers[editingIndex]=p;
}else{
listaPers.push(p);
}

await salva();

aggiornaLista();

form.reset();
form.style.display="none";

};

reader.readAsDataURL(document.getElementById("fotoInput").files[0]);

};

/* MODIFICA */

function modifica(index){

let p=listaPers[index];

document.getElementById("nome").value=p.nome;
document.getElementById("cognome").value=p.cognome;
document.getElementById("data").value=p.data;
document.getElementById("occhi").value=p.occhi;
document.getElementById("capelli").value=p.capelli;
document.getElementById("residenza").value=p.residenza;

editingIndex=index;

form.style.display="flex";

}

/* DOCUMENTO IDENTITA */

function mostraDocumento(p){

document.getElementById("documento").innerHTML=`

<div style="background:white;color:black;padding:20px;border-radius:10px;width:500px">

<h3>Carta Identità</h3>

<img src="${p.foto}" style="width:120px;border-radius:10px"><br><br>

Nome: ${p.nome}<br>
Cognome: ${p.cognome}<br>
Data nascita: ${p.data}<br>
Occhi: ${p.occhi}<br>
Capelli: ${p.capelli}<br>
Residenza: ${p.residenza}

</div>

`;

}

</script>

</body>
</html>
