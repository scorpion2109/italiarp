<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Selezione Personaggi</title>
<style>
/* CSS originale rimane invariato */
</style>
</head>
<body>

<div class="container">
  <h1>Selezione Personaggio</h1>
  <div id="lista-personaggi"></div>
  <button id="crea-personaggio">Crea Personaggio</button>

  <form id="form-personaggio" style="display:none;">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="text" id="cognome" placeholder="Cognome" required>
    <input type="text" id="dataNascita" placeholder="Data di nascita" required>
    <input type="text" id="occhi" placeholder="Colore occhi" required>
    <input type="text" id="capelli" placeholder="Colore capelli" required>
    <input type="file" id="foto-upload" accept="image/*">
    <button type="submit">Conferma</button>
  </form>

  <div class="loading" id="loading">Creazione carta...</div>

  <div class="carta-container">
    <!-- Carta ID originale -->
  </div>
</div>

<script>
/* Script originale per gestione personaggi rimane invariato */
</script>

<!-- Firebase SDK + gestione slot Discord -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.16.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.16.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
  authDomain: "sito-rp.firebaseapp.com",
  projectId: "sito-rp",
  storageBucket: "sito-rp.firebasestorage.app",
  messagingSenderId: "234781749995",
  appId: "1:234781749995:web:6954473363659fe38b04ae",
  measurementId: "G-R23N60PBYY"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.db = db;
window.doc = doc;
window.setDoc = setDoc;

// UID reale Discord
window.uid = sessionStorage.getItem("discord_uid") || "test_user_123";

// Sovrascrive salvaPersonaggio per salvare anche su Firebase
const originaleSalvaPersonaggio = window.salvaPersonaggio || (()=>{});
window.salvaPersonaggio = function(p){
  // salva locale originale
  originaleSalvaPersonaggio(p);
  // scegli slot: 1 o 2
  const slot = (JSON.parse(localStorage.getItem("italia_rp_personaggi"))?.length <= 1) ? "1" : "2";
  setDoc(doc(db, "users", window.uid), { [`personaggi.${slot}`]: p }, { merge:true });
}
</script>

</body>
</html>
