<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Italia RP - Personaggi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(180deg,#1c102b,#2a1b3f);
color:white;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:700px;
margin-top:40px;
}

button{
padding:10px 20px;
background:#5865F2;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
margin-top:10px;
}

.personaggio{
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.personaggio-info{
display:flex;
align-items:center;
gap:10px;
}

.personaggio img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:2px solid white;
cursor:pointer;
}

.nome{
cursor:pointer;
}

.actions{
display:flex;
gap:10px;
font-size:18px;
cursor:pointer;
}

form{
display:none;
flex-direction:column;
gap:10px;
margin-top:15px;
}

input{
padding:8px;
border-radius:8px;
border:none;
}

#documento{
margin-top:30px;
display:flex;
justify-content:center;
}

/* CARTA IDENTITA */

.wrapper{ perspective:2500px; }

.card{
width:540px;
height:340px;
position:relative;
transform-style:preserve-3d;
transition:1.2s cubic-bezier(.2,.8,.2,1);
cursor:pointer;
}

.card.flipped{ transform:rotateY(180deg); }

.face{
position:absolute;
width:100%;
height:100%;
border-radius:18px;
backface-visibility:hidden;
overflow:hidden;
box-shadow:0 40px 80px rgba(0,0,0,0.8);
}

.front{
background:
radial-gradient(circle at 20% 30%,rgba(0,120,255,0.05),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,200,180,0.05),transparent 40%),
linear-gradient(135deg,#fdfdfd,#f1f1f1);
padding:30px;
position:relative;
color:black;
}

.front::before{
content:"ITALIA RP • REPUBBLICA ROLEPLAY • ";
position:absolute;
top:0;
left:0;
width:200%;
font-size:18px;
color:rgba(0,0,0,0.03);
transform:rotate(-25deg);
white-space:nowrap;
}

.flag{
position:absolute;
left:0;
top:0;
width:14px;
height:100%;
background:linear-gradient(#008C45 33%,#ffffff 33% 66%,#CD212A 66%);
}

.header{
display:flex;
justify-content:space-between;
}

.title{
font-size:22px;
font-weight:800;
letter-spacing:2px;
}

.subtitle{
font-size:12px;
color:#555;
}

.logo{ width:85px; }

.content{
display:flex;
margin-top:25px;
gap:30px;
}

.photo{
width:150px;
height:190px;
border-radius:10px;
border:2px solid #aaa;
overflow:hidden;
background:#ddd;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.info{ flex:1; font-size:15px; }

.row{ margin-bottom:10px; }

.label{ font-weight:700; }

.signature{
margin-top:18px;
font-family:"Brush Script MT",cursive;
font-size:28px;
border-top:1px solid #333;
width:260px;
}

.hologram{
position:absolute;
right:25px;
bottom:25px;
width:110px;
height:110px;
border-radius:50%;
background:conic-gradient(
rgba(0,255,255,0.6),
rgba(255,0,255,0.6),
rgba(255,255,0,0.6),
rgba(0,255,255,0.6)
);
animation:spin 8s linear infinite;
opacity:0.45;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.back{
transform:rotateY(180deg);
background:linear-gradient(180deg,#cfe3e6,#e8f1f3);
padding:30px;
display:flex;
flex-direction:column;
justify-content:space-between;
font-size:14px;
color:black;
}

.field{ margin-bottom:10px; }

.big-barcode{
height:90px;
background:repeating-linear-gradient(
90deg,
#000 0px,#000 2px,
#fff 2px,#fff 4px,
#000 4px,#000 7px,
#fff 7px,#fff 9px
);
}

.barcode-number{
font-family:monospace;
text-align:center;
margin-top:5px;
}

.mrz{
font-family:monospace;
letter-spacing:2px;
margin-top:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>Selezione Personaggio</h2>

<div id="lista"></div>

<div id="documento"></div>

<button id="btnCrea">Crea Personaggio</button>

<form id="form">

<input id="nome" placeholder="Nome" required>
<input id="cognome" placeholder="Cognome" required>
<input id="data" placeholder="Data nascita" required>
<input id="occhi" placeholder="Occhi" required>
<input id="capelli" placeholder="Capelli" required>
<input id="residenza" placeholder="Residenza" required>
<input type="file" id="fotoInput" required>

<button type="submit">Conferma</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain:"sito-rp.firebaseapp.com",
projectId:"sito-rp"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const uid=sessionStorage.getItem("discord_uid");

const lista=document.getElementById("lista");
const form=document.getElementById("form");

let listaPers=[];
let editingIndex=null;

const MAX=2;

async function carica(){

const ref=doc(db,"users",uid);
const snap=await getDoc(ref);

if(snap.exists()){
listaPers=snap.data().personaggi||[];
}else{
await setDoc(ref,{personaggi:[]});
}

aggiornaLista();

}

carica();

async function salva(){

await setDoc(doc(db,"users",uid),{
personaggi:listaPers
},{merge:true});

}

function aggiornaLista(){

lista.innerHTML="";

listaPers.forEach((p,index)=>{

let div=document.createElement("div");
div.className="personaggio";

let info=document.createElement("div");
info.className="personaggio-info";

let img=document.createElement("img");
img.src=p.foto;
img.onclick=()=>mostraDocumento(p);

let nome=document.createElement("div");
nome.className="nome";
nome.innerText=p.nome+" "+p.cognome;
nome.onclick=()=>{
sessionStorage.setItem("personaggio_index",index);
window.location.href="home.html";
};

info.appendChild(img);
info.appendChild(nome);

let actions=document.createElement("div");

let edit=document.createElement("span");
edit.innerText="✏️";
edit.onclick=()=>modifica(index);

let del=document.createElement("span");
del.innerText="🗑️";
del.onclick=async()=>{
if(confirm("Eliminare personaggio?")){
listaPers.splice(index,1);
await salva();
aggiornaLista();
}
};

actions.appendChild(edit);
actions.appendChild(del);

div.appendChild(info);
div.appendChild(actions);

lista.appendChild(div);

});

}

function mostraDocumento(p){

document.getElementById("documento").innerHTML=`
<div class="wrapper">
<div class="card" id="card">

<div class="face front">

<div class="flag"></div>

<div class="header">
<div>
<div class="title">ITALIA RP</div>
<div class="subtitle">Documento Ufficiale Roleplay</div>
</div>
<img src="assets/logo.png" class="logo">
</div>

<div class="content">

<div class="photo">
<img src="${p.foto}">
</div>

<div class="info">

<div class="row"><span class="label">Nome:</span> ${p.nome}</div>
<div class="row"><span class="label">Cognome:</span> ${p.cognome}</div>
<div class="row"><span class="label">Data Nascita:</span> ${p.data}</div>
<div class="row"><span class="label">Occhi:</span> ${p.occhi}</div>
<div class="row"><span class="label">Capelli:</span> ${p.capelli}</div>

<div class="signature">${p.nome} ${p.cognome}</div>

</div>
</div>

<div class="hologram"></div>

</div>

<div class="face back">

<div>
<div class="field"><b>Residenza:</b> ${p.residenza}</div>
</div>

<div>
<div class="big-barcode"></div>
<div class="barcode-number">ITA-${Math.floor(Math.random()*9999)}</div>
<div class="mrz">IDITA${p.cognome.toUpperCase()}<<${p.nome.toUpperCase()}</div>
</div>

</div>

</div>
</div>
`;

document.getElementById("card").onclick=()=>{
document.getElementById("card").classList.toggle("flipped");
}

}

</script>

</body>
</html>
