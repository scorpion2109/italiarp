<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Italia RP - Personaggi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:linear-gradient(180deg,#1c102b,#2a1b3f);
color:white;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:700px;
margin-top:40px;
}

button{
padding:10px 20px;
background:#5865F2;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
margin-top:10px;
}

.personaggio{
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.personaggio-info{
display:flex;
align-items:center;
gap:10px;
}

.personaggio img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:2px solid white;
cursor:pointer;
}

.nome{
cursor:pointer;
}

.actions{
display:flex;
gap:10px;
font-size:18px;
cursor:pointer;
}

form{
display:none;
flex-direction:column;
gap:10px;
margin-top:15px;
}

input{
padding:8px;
border-radius:8px;
border:none;
}

#documento{
margin-top:30px;
display:flex;
justify-content:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Selezione Personaggio</h2>

<div id="lista"></div>

<div id="documento"></div>

<button id="btnCrea">Crea Personaggio</button>

<form id="form">

<input id="nome" placeholder="Nome" required>
<input id="cognome" placeholder="Cognome" required>
<input id="data" placeholder="Data nascita" required>
<input id="occhi" placeholder="Occhi" required>
<input id="capelli" placeholder="Capelli" required>
<input id="residenza" placeholder="Residenza" required>
<input type="file" id="fotoInput" accept="image/*" required>

<button type="submit">Conferma</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain:"sito-rp.firebaseapp.com",
projectId:"sito-rp",
storageBucket:"sito-rp.appspot.com",
messagingSenderId:"234781749995",
appId:"1:234781749995:web:6954473363659fe38b04ae"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const uid=sessionStorage.getItem("discord_uid");

if(!uid){
alert("Login richiesto");
window.location.href="index.html";
}

const lista=document.getElementById("lista");
const form=document.getElementById("form");
const btn=document.getElementById("btnCrea");

let listaPers=[];
let editingIndex=null;

const MAX=2;

async function carica(){

const ref=doc(db,"users",uid);
const snap=await getDoc(ref);

if(snap.exists()){
listaPers=snap.data().personaggi||[];
}else{
await setDoc(ref,{personaggi:[]});
}

aggiornaLista();

}

carica();

async function salva(){

await setDoc(doc(db,"users",uid),{
personaggi:listaPers
},{merge:true});

}

function aggiornaLista(){

lista.innerHTML="";

listaPers.forEach((p,index)=>{

let div=document.createElement("div");
div.className="personaggio";

let info=document.createElement("div");
info.className="personaggio-info";

let img=document.createElement("img");
img.src=p.foto;

/* CLICK FOTO → DOCUMENTO */

img.onclick=()=>mostraDocumento(p);

let nome=document.createElement("div");
nome.className="nome";
nome.innerText=p.nome+" "+p.cognome;

/* CLICK NOME → HOME */

nome.onclick=()=>{

sessionStorage.setItem("personaggio_index",index);
window.location.href="home.html";

};

info.appendChild(img);
info.appendChild(nome);

let actions=document.createElement("div");
actions.className="actions";

let edit=document.createElement("span");
edit.innerText="✏️";
edit.onclick=()=>modifica(index);

let del=document.createElement("span");
del.innerText="🗑️";

del.onclick=async ()=>{

if(confirm("Eliminare personaggio?")){
listaPers.splice(index,1);
await salva();
aggiornaLista();
}

};

actions.appendChild(edit);
actions.appendChild(del);

div.appendChild(info);
div.appendChild(actions);

lista.appendChild(div);

});

}

btn.onclick=()=>{

if(listaPers.length>=MAX){
alert("Massimo 2 personaggi");
return;
}

form.style.display="flex";
editingIndex=null;

};

form.onsubmit=async e=>{

e.preventDefault();

let nome=document.getElementById("nome").value.trim();
let cognome=document.getElementById("cognome").value.trim();

let duplicato=listaPers.find(p=>
p.nome.toLowerCase()==nome.toLowerCase() &&
p.cognome.toLowerCase()==cognome.toLowerCase()
);

if(duplicato && editingIndex===null){
alert("Nome già esistente");
return;
}

const reader=new FileReader();

reader.onload=async ()=>{

let p={

nome:nome,
cognome:cognome,
data:document.getElementById("data").value,
occhi:document.getElementById("occhi").value,
capelli:document.getElementById("capelli").value,
residenza:document.getElementById("residenza").value,
foto:reader.result,

contanti:5000,
banca:10000

};

if(editingIndex!==null){
listaPers[editingIndex]=p;
}else{
listaPers.push(p);
}

await salva();

form.reset();
form.style.display="none";

aggiornaLista();

};

reader.readAsDataURL(document.getElementById("fotoInput").files[0]);

};

function modifica(index){

let p=listaPers[index];

nome.value=p.nome;
cognome.value=p.cognome;
data.value=p.data;
occhi.value=p.occhi;
capelli.value=p.capelli;
residenza.value=p.residenza;

editingIndex=index;

form.style.display="flex";

}

/* DOCUMENTO */

function mostraDocumento(p){

document.getElementById("documento").innerHTML=`

<div style="background:white;color:black;padding:20px;border-radius:10px;width:500px">

<h3>Documento</h3>

<img src="${p.foto}" style="width:120px;border-radius:10px"><br><br>

<b>Nome:</b> ${p.nome}<br>
<b>Cognome:</b> ${p.cognome}<br>
<b>Data nascita:</b> ${p.data}<br>
<b>Occhi:</b> ${p.occhi}<br>
<b>Capelli:</b> ${p.capelli}<br>
<b>Residenza:</b> ${p.residenza}

</div>

`;

}

</script>

</body>
</html>
