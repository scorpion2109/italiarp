<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Personaggi</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
min-height:100vh;
background:linear-gradient(180deg,#1c102b,#2a1b3f);
color:white;
}

/* HEADER */
.header{
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
}

.logo img{width:50px;}

.clock{font-size:20px;font-weight:600;}

.avatar-top{
width:45px;
height:45px;
border-radius:50%;
}

/* CONTENUTO */
.container{
padding:20px;
}

/* ADD BUTTON */
.add-card{
height:120px;
border-radius:20px;
background:rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
transition:0.2s;
}

.add-card:hover{
transform:scale(1.05);
background:rgba(0,255,136,0.2);
}

/* FORM */
.form{
display:none;
margin-top:20px;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:8px;
border:none;
border-radius:10px;
}

button{
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:#00aa44;
color:white;
}

/* CARD */
.pg-card{
display:flex;
align-items:center;
gap:15px;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:15px;
margin-top:10px;
}

.pg-card img{
width:55px;
height:55px;
border-radius:50%;
cursor:pointer;
}

.nome{
font-weight:600;
cursor:pointer;
}

/* DOCUMENTO */
.doc-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.doc-box{
width:380px;
background:#fff;
color:black;
border-radius:15px;
padding:15px;
}

.doc-box h3{
text-align:center;
color:#004aad;
margin-bottom:10px;
}

.doc-box p{
font-size:13px;
margin:4px 0;
}

</style>

</head>

<body>

<div class="header">
<div class="logo">
<img src="assets/logo.png">
</div>

<div class="clock" id="clock"></div>

<img id="avatarDiscord" class="avatar-top">
</div>

<div class="container">

<div id="lista"></div>

<div id="addCard" class="add-card">+</div>

<div id="form" class="form">

<input id="nome" placeholder="Nome">
<input id="cognome" placeholder="Cognome">
<input id="data" placeholder="Data di nascita (gg/mm/aaaa)">
<input id="capelli" placeholder="Capelli">
<input id="occhi" placeholder="Colore occhi">
<input id="residenza" placeholder="Residenza">
<input type="file" id="avatarInput">

<button onclick="crea()">Crea Personaggio</button>

</div>

</div>

<!-- DOCUMENTO -->
<div id="docOverlay" class="doc-overlay">
<div class="doc-box">
<h3>REPUBBLICA ITALIANA</h3>

<p><b>Nome:</b> <span id="dNome"></span></p>
<p><b>Cognome:</b> <span id="dCognome"></span></p>
<p><b>Data nascita:</b> <span id="dData"></span></p>
<p><b>Capelli:</b> <span id="dCapelli"></span></p>
<p><b>Occhi:</b> <span id="dOcchi"></span></p>
<p><b>Residenza:</b> <span id="dResidenza"></span></p>
<p><b>Lavoro:</b> <span id="dLavoro"></span></p>
<p><b>Ruolo:</b> Cittadino</p>
<p><b>Carta:</b> <span id="dCarta"></span></p>
<p><b>Firma:</b> <span id="dFirma"></span></p>

<button onclick="docOverlay.style.display='none'">Chiudi</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const app = initializeApp({projectId:"sito-rp"});
const db = getFirestore(app);

const uid = localStorage.getItem("discord_uid");

/* CLOCK */
function updateClock(){
const now = new Date();
clock.innerText =
now.getHours().toString().padStart(2,"0")+":"+
now.getMinutes().toString().padStart(2,"0");
}
setInterval(updateClock,1000);
updateClock();

/* AVATAR DISCORD */
avatarDiscord.src = "https://cdn.discordapp.com/embed/avatars/0.png";

/* DATA */
const ref = doc(db,"users",uid);
const snap = await getDoc(ref);

let personaggi = snap.exists() ? snap.data().personaggi || [] : [];

const lista = document.getElementById("lista");

/* RENDER */
function render(){

lista.innerHTML="";

if(personaggi.length === 0){
addCard.style.display="flex";
}else{
addCard.style.display="none";

personaggi.forEach((pg,i)=>{
lista.innerHTML += `
<div class="pg-card">
<img src="${pg.avatar || 'assets/avatar.png'}" onclick="apriDoc(${i})">
<div class="nome" onclick="entra(${i})">${pg.nome} ${pg.cognome}</div>
</div>
`;
});

}

}

render();

/* MOSTRA FORM */
addCard.onclick = ()=>{
form.style.display="block";
};

/* CREA */
window.crea = async ()=>{

let avatar = "";
const file = avatarInput.files[0];

if(file){
const reader = new FileReader();
await new Promise(res=>{
reader.onload=()=>{avatar=reader.result;res();}
reader.readAsDataURL(file);
});
}

/* GENERAZIONI */
const carta = "IT" + Math.floor(Math.random()*9999999999);
const firma = nome.value + " " + cognome.value;

personaggi.push({
nome:nome.value,
cognome:cognome.value,
data:data.value,
capelli:capelli.value,
occhi:occhi.value,
residenza:residenza.value,
lavoro:null,
ruolo:"cittadino",
carta:carta,
firma:firma,
avatar:avatar
});

await setDoc(ref,{personaggi},{merge:true});

location.reload();

};

/* ENTRA */
window.entra = (i)=>{
localStorage.setItem("personaggioIndex",i);
window.location.href="home.html";
};

/* DOCUMENTO */
window.apriDoc = (i)=>{

const pg = personaggi[i];

dNome.innerText = pg.nome;
dCognome.innerText = pg.cognome;
dData.innerText = pg.data;
dCapelli.innerText = pg.capelli;
dOcchi.innerText = pg.occhi;
dResidenza.innerText = pg.residenza;
dLavoro.innerText = pg.lavoro || "Nessuno";
dCarta.innerText = pg.carta;
dFirma.innerText = pg.firma;

docOverlay.style.display="flex";

};

</script>

</body>
</html>
