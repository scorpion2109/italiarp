<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ===== FIREBASE CONFIG ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
  authDomain: "sito-rp.firebaseapp.com",
  projectId: "sito-rp",
  storageBucket: "sito-rp.firebasestorage.app",
  messagingSenderId: "234781749995",
  appId: "1:234781749995:web:6954473363659fe38b04ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== DISCORD LOGIN ===== */
const hash = window.location.hash;
if(!hash.includes("access_token")){
  alert("Devi prima accedere con Discord.");
  window.location.href="index.html";
}

const params = new URLSearchParams(hash.substring(1));
const accessToken = params.get("access_token");

let userId = null;

async function getUser(){
  const res = await fetch("https://discord.com/api/users/@me",{
    headers:{Authorization:`Bearer ${accessToken}`}
  });
  const user = await res.json();
  userId = user.id;
  await caricaPersonaggi();
}

getUser();

/* ===== CONFIG ===== */
const MAX=2;
const CODICE="ITALIARP2025";
const DELETE_PASSWORD="admin123";

let listaPers=[];

const lista=document.getElementById("lista");
const form=document.getElementById("form");
const btn=document.getElementById("btnCrea");
const wrapper=document.querySelector(".wrapper");
const card=document.getElementById("card");

/* ===== FIRESTORE LOAD ===== */
async function caricaPersonaggi(){
  const ref=doc(db,"utenti",userId);
  const snap=await getDoc(ref);
  if(snap.exists()){
    listaPers=snap.data().personaggi||[];
  }
  aggiornaLista();
}

/* ===== FIRESTORE SAVE ===== */
async function salva(){
  await setDoc(doc(db,"utenti",userId),{
    personaggi:listaPers
  },{merge:true});
}

/* ===== UI ===== */
function aggiornaLista(){
  lista.innerHTML="";
  listaPers.forEach((p,index)=>{
    let div=document.createElement("div");
    div.className="personaggio";

    let info=document.createElement("div");
    info.className="personaggio-info";
    info.onclick=()=>mostraCarta(p,index);

    let img=document.createElement("img");
    img.src=p.foto;

    let nome=document.createElement("div");
    nome.textContent=p.nome+" "+p.cognome;

    info.appendChild(img);
    info.appendChild(nome);

    let actions=document.createElement("div");
    actions.className="actions";

    let edit=document.createElement("span");
    edit.textContent="✏️";
    edit.onclick=()=>modifica(index);

    let del=document.createElement("span");
    del.textContent="🗑️";
    del.onclick=async()=>{
      let pass=prompt("Inserisci password per eliminare:");
      if(pass===DELETE_PASSWORD){
        listaPers.splice(index,1);
        await salva();
        aggiornaLista();
        wrapper.style.display="none";
      }else{
        alert("Password errata");
      }
    };

    actions.appendChild(edit);
    actions.appendChild(del);

    div.appendChild(info);
    div.appendChild(actions);
    lista.appendChild(div);
  });
}

btn.onclick=()=>{
  if(listaPers.length>=MAX){
    alert("Massimo 2 personaggi");
    return;
  }

  if(listaPers.length===1){
    let c=prompt("Inserisci codice:");
    if(c!==CODICE){
      alert("Codice errato");
      return;
    }
  }

  form.style.display="flex";
};

function generaCF(p){
  return p.cognome.substring(0,3).toUpperCase()+
  p.nome.substring(0,3).toUpperCase()+"25X0";
}

form.onsubmit=async e=>{
  e.preventDefault();

  let reader=new FileReader();
  reader.onload=async function(){

    let p={
      nome:nome.value,
      cognome:cognome.value,
      data:data.value,
      occhi:occhi.value,
      capelli:capelli.value,
      residenza:residenza.value,
      foto:reader.result
    };

    listaPers.push(p);
    await salva();
    aggiornaLista();
    mostraCarta(p,listaPers.length-1);

    form.reset();
    form.style.display="none";
  };

  reader.readAsDataURL(fotoInput.files[0]);
};

function modifica(index){
  let p=listaPers[index];

  nome.value=p.nome;
  cognome.value=p.cognome;
  data.value=p.data;
  occhi.value=p.occhi;
  capelli.value=p.capelli;
  residenza.value=p.residenza;

  form.style.display="flex";

  listaPers.splice(index,1);
  salva();
  aggiornaLista();
}

function mostraCarta(p,index){
  wrapper.style.display="block";
  card.classList.remove("flipped");

  c_nome.textContent=p.nome;
  c_cognome.textContent=p.cognome;
  c_data.textContent=p.data;
  c_occhi.textContent=p.occhi;
  c_capelli.textContent=p.capelli;
  c_res.textContent=p.residenza;
  c_firma.textContent=p.nome+" "+p.cognome;
  c_cf.textContent=generaCF(p);
  c_foto.src=p.foto;

  /* SALVA PERSONAGGIO ATTIVO */
  localStorage.setItem("personaggio_attivo",index);

  card.onclick=()=>card.classList.toggle("flipped");
}
</script>
