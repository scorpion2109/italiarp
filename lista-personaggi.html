<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Home Test Personalizzabile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', sans-serif;}
body{background:linear-gradient(180deg,#1c102b,#2a1b3f);color:white;min-height:100vh;}

/* ===== TOPBAR ===== */
.topbar{
  height:70px;
  background:linear-gradient(90deg,#008C45,#ffffff,#CD212A);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
}
.logo-small{width:50px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%{transform:translateY(0);}50%{transform:translateY(-5px);}100%{transform:translateY(0);}}
.left{display:flex;align-items:center;gap:10px;}
.clock-box{background:#000000bb;padding:6px 12px;border-radius:8px;font-weight:bold;font-size:14px;}
.center{font-size:20px;font-weight:900;letter-spacing:2px;color:black;}
.center span{color:#CD212A;}
.right{display:flex;gap:15px;}
.icon-btn{width:32px;height:32px;cursor:pointer;transition:0.15s ease;}
.icon-btn:hover{transform:scale(1.2);}
.icon-btn:active{transform:scale(0.85);}

/* ===== GRID APP QUADRATA ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:20px;
  padding:30px 20px 80px 20px;
}
.app{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:20px;
  aspect-ratio:1/1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition:0.2s ease, box-shadow 0.2s;
  box-shadow:0 6px 15px rgba(0,0,0,0.3);
  cursor:pointer;
}
.app:hover{transform:scale(1.05);box-shadow:0 10px 25px rgba(0,0,0,0.5);}
.app:active{transform:scale(0.93);}
.icon{width:50%;height:50%;object-fit:contain;}
.app span{text-align:center;margin-top:10px;font-size:14px;font-weight:bold;color:white;}

/* Footer */
.footer{text-align:center;padding:20px;color:#aaa;font-size:13px;}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="topbar">
  <div class="left">
    <img src="assets/logo.jpg" class="logo-small" alt="Italia RP">
    <div class="clock-box"><span id="clock"></span></div>
  </div>
  <div class="center">ITALIA <span>RP</span></div>
  <div class="right" id="top-icons"></div>
</div>

<!-- ===== GRID APP ===== -->
<div class="grid" id="grid-apps"></div>

<div class="footer">Italia RP © 2026 - Home Test Personalizzabile</div>

<script type="module">
window.addEventListener("DOMContentLoaded", async()=>{

// ===== CLOCK =====
function updateClock(){
  const now=new Date();
  document.getElementById("clock").innerText=
    now.getHours().toString().padStart(2,"0")+":"+
    now.getMinutes().toString().padStart(2,"0")+":"+
    now.getSeconds().toString().padStart(2,"0");
}
setInterval(updateClock,1000);
updateClock();

// ===== FIREBASE =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
  authDomain: "sito-rp.firebaseapp.com",
  projectId: "sito-rp",
  storageBucket: "sito-rp.firebasestorage.app",
  messagingSenderId: "234781749995",
  appId: "1:234781749995:web:6954473363659fe38b04ae"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== LOGIN DISCORD =====
const hash = window.location.hash;
if(!hash.includes("access_token")){
  alert("Devi prima accedere con Discord.");
  window.location.href="index.html";
}
const params = new URLSearchParams(hash.substring(1));
const accessToken = params.get("access_token");

const response = await fetch("https://discord.com/api/users/@me", {
  headers:{Authorization:`Bearer ${accessToken}`}
});
const user = await response.json();
const userId = user.id;

// ===== RECUPERA PERSONAGGIO ATTIVO =====
const userRef = doc(db,"utenti",userId);
const snap = await getDoc(userRef);

let personaggioAttivo = null;
let personaggi = [];
if(snap.exists()){
  personaggi = snap.data().personaggi || [];
  const indexAttivo = localStorage.getItem("personaggio_attivo");
  if(indexAttivo!==null && personaggi[indexAttivo]) personaggioAttivo = personaggi[indexAttivo];
  else if(personaggi[0]) personaggioAttivo = personaggi[0]; // fallback primo personaggio
}

// ===== TOPBAR ICONS =====
const topIcons = [
  {src:"assets/logo-profilo.png", alt:"Profilo", onclick:()=>alert("Profilo cliccato")},
  {src:"assets/logo-documento.jpeg", alt:"Documenti", onclick:()=>alert("Documenti cliccato")},
];

const topContainer = document.getElementById("top-icons");
topIcons.forEach(ic=>{
  const img = document.createElement("img");
  img.src = ic.src;
  img.alt = ic.alt;
  img.className="icon-btn";
  img.onclick = ic.onclick;
  topContainer.appendChild(img);
});

// ===== APPS GRID =====
const userRole = {
  polizia: personaggioAttivo?.role==="polizia" || false,
  medico: personaggioAttivo?.role==="medico" || false,
  meccanico: personaggioAttivo?.role==="meccanico" || false,
  direttore: personaggioAttivo?.role==="direttore" || false
};

const apps = [
  {name:"Governo", icon:"assets/governo.png", role:null},
  {name:"Banca", icon:"assets/banca.png", role:null},
  {name:"Inventario", icon:"assets/inventario.png", role:null},
  {name:"Database Polizia", icon:"assets/database_polizia.png", role:"polizia"},
  {name:"Gestione Azienda", icon:"assets/gestione_azienda.png", role:"direttore"},
  {name:"Armeria", icon:"assets/armeria.png", role:null},
  {name:"Ospedale", icon:"assets/ospedale.png", role:"medico"},
  {name:"Concessionario", icon:"assets/concessionario.png", role:null},
  {name:"Assicurazioni", icon:"assets/assicurazioni.png", role:null},
  {name:"Meccanico", icon:"assets/meccanico.png", role:"meccanico"},
  {name:"Import", icon:"assets/import.png", role:null},
  {name:"Benzinaio", icon:"assets/benzinaio.png", role:null},
  {name:"Immobiliare.it", icon:"assets/immobiliare.png", role:null},
  {name:"Amazon", icon:"assets/amazon.png", role:null},
  {name:"Instagram", icon:"assets/instagram.png", role:null},
  {name:"Dark Market", icon:"assets/darkmarket.png", role:null},
  {name:"Farm", icon:"assets/farm.png", role:null}
];

const grid=document.getElementById("grid-apps");
apps.forEach(app=>{
  if(app.role===null || userRole[app.role]){
    const div=document.createElement("div");
    div.className="app";
    div.onclick=()=>{div.style.transform="scale(0.9)"; setTimeout(()=>{div.style.transform="scale(1.05)"; setTimeout(()=>{div.style.transform="scale(1)";},100)},100)};
    div.innerHTML=`<img src="${app.icon}" class="icon" alt="${app.name}"><span>${app.name}</span>`;
    grid.appendChild(div);
  }
});

});
</script>
</body>
</html>
