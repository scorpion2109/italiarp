<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selezione Personaggi</title><style>
body{
margin:0;
font-family:Segoe UI;
background:#1c102b;
color:white;
}

/* NAVBAR */
.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
background:#140a22;
border-bottom:2px solid #2a1b3f;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
border-radius:50%;
}

.title{
font-size:20px;
font-weight:bold;
}

.profile{
cursor:pointer;
}

/* LAYOUT */
.main{
display:flex;
height:calc(100vh - 60px);
}

.left, .right{
flex:1;
padding:20px;
}

.left{
border-right:2px solid #2a1b3f;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#5865F2;
color:white;
cursor:pointer;
}

/* CARD */
.card{
background:white;
color:black;
padding:20px;
border-radius:10px;
width:300px;
}

.card img{
width:100px;
border-radius:10px;
margin-bottom:10px;
}

</style></head><body><!-- NAVBAR --><div class="navbar"><div class="logo">
<img src="https://via.placeholder.com/40">
<div class="title">Selezione Personaggi</div>
</div><div class="profile">👤 Profilo</div></div><!-- MAIN --><div class="main"><!-- SINISTRA FORM --><div class="left"><input id="nome" placeholder="Nome">
<input id="cognome" placeholder="Cognome">
<input id="data" placeholder="Data nascita">
<input id="occhi" placeholder="Occhi">
<input id="capelli" placeholder="Capelli">
<input id="residenza" placeholder="Residenza">
<input type="file" id="foto"><button onclick="salva()">Crea Personaggio</button>

</div><!-- DESTRA CARD LIVE --><div class="right"><div class="card" id="preview">
<img id="imgPreview" src="https://via.placeholder.com/100"><div id="p_nome">Nome: -</div>
<div id="p_cognome">Cognome: -</div>
<div id="p_data">Data: -</div>
<div id="p_occhi">Occhi: -</div>
<div id="p_capelli">Capelli: -</div>
<div id="p_residenza">Residenza: -</div></div></div></div><script>

const inputs = ["nome","cognome","data","occhi","capelli","residenza"];

inputs.forEach(id=>{
document.getElementById(id).addEventListener("input", aggiornaPreview);
});

function aggiornaPreview(){

document.getElementById("p_nome").innerText = "Nome: " + (nome.value || "-");
document.getElementById("p_cognome").innerText = "Cognome: " + (cognome.value || "-");
document.getElementById("p_data").innerText = "Data: " + (data.value || "-");
document.getElementById("p_occhi").innerText = "Occhi: " + (occhi.value || "-");
document.getElementById("p_capelli").innerText = "Capelli: " + (capelli.value || "-");
document.getElementById("p_residenza").innerText = "Residenza: " + (residenza.value || "-");

}

// FOTO LIVE
foto.addEventListener("change", ()=>{
const reader = new FileReader();
reader.onload = e=>{
document.getElementById("imgPreview").src = e.target.result;
};
reader.readAsDataURL(foto.files[0]);
});

function salva(){
alert("Qui colleghi Firebase come già hai fatto");
}

</script></body>
</html>
