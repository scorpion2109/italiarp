<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selezione Personaggi</title><style>
body{
margin:0;
font-family:Segoe UI;
background:#1c102b;
color:white;
overflow:hidden;
}

/* NAVBAR */
.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
background:#140a22;
border-bottom:2px solid #2a1b3f;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
border-radius:50%;
}

.title{
font-size:20px;
font-weight:bold;
}

.profile{
cursor:pointer;
}

/* LAYOUT */
.main{
display:flex;
height:calc(100vh - 60px);
}

.left, .right{
flex:1;
padding:20px;
}

.left{
border-right:2px solid #2a1b3f;
overflow:auto;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#5865F2;
color:white;
cursor:pointer;
}

/* ===== CARD 3D ===== */
.wrapper{ perspective:2500px; display:flex; justify-content:center; align-items:center; height:100%; }

.card{
width:540px;
height:340px;
position:relative;
transform-style:preserve-3d;
transition:1.2s cubic-bezier(.2,.8,.2,1);
cursor:pointer;
}

.card.flipped{ transform:rotateY(180deg); }

.face{
position:absolute;
width:100%;
height:100%;
border-radius:18px;
backface-visibility:hidden;
overflow:hidden;
box-shadow:0 40px 80px rgba(0,0,0,0.8);
}

.front{
background:linear-gradient(135deg,#fdfdfd,#f1f1f1);
padding:20px;
color:black;
}

.back{
transform:rotateY(180deg);
background:#e8f1f3;
padding:20px;
color:black;
}

.photo{
width:120px;
height:150px;
background:#ccc;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

.photo img{ width:100%; height:100%; object-fit:cover; }

.row{ margin-bottom:8px; }

.signature{
margin-top:10px;
font-family:cursive;
font-size:20px;
}

</style></head><body><div class="navbar">
<div class="logo">
<img src="https://via.placeholder.com/40">
<div class="title">Selezione Personaggi</div>
</div>
<div class="profile">👤 Profilo</div>
</div><div class="main"><div class="left">
<input id="nome" placeholder="Nome">
<input id="cognome" placeholder="Cognome">
<input id="data" placeholder="Data nascita">
<input id="occhi" placeholder="Occhi">
<input id="capelli" placeholder="Capelli">
<input id="residenza" placeholder="Residenza">
<input type="file" id="foto"><button onclick="salva()">Crea Personaggio</button>

</div><div class="right">
<div class="wrapper"><div class="card" id="card"><div class="face front"><div class="photo"><img id="imgPreview"></div><div class="row"><b>Nome:</b> <span id="p_nome"></span></div>
<div class="row"><b>Cognome:</b> <span id="p_cognome"></span></div>
<div class="row"><b>Data:</b> <span id="p_data"></span></div>
<div class="row"><b>Occhi:</b> <span id="p_occhi"></span></div>
<div class="row"><b>Capelli:</b> <span id="p_capelli"></span></div><div class="signature" id="firma"></div></div><div class="face back"><div class="row"><b>Residenza:</b> <span id="p_residenza"></span></div></div></div></div>
</div></div><script>

card.onclick=()=>card.classList.toggle("flipped");

const inputs=["nome","cognome","data","occhi","capelli","residenza"];

inputs.forEach(id=>{
document.getElementById(id).addEventListener("input", aggiorna);
});

function aggiorna(){
p_nome.innerText=nome.value;
p_cognome.innerText=cognome.value;
p_data.innerText=data.value;
p_occhi.innerText=occhi.value;
p_capelli.innerText=capelli.value;
p_residenza.innerText=residenza.value;
firma.innerText=nome.value+" "+cognome.value;
}

foto.addEventListener("change",()=>{
const reader=new FileReader();
reader.onload=e=>imgPreview.src=e.target.result;
reader.readAsDataURL(foto.files[0]);
});

function salva(){
alert("Collega qui Firebase");
}

</script></body>
  </html>
