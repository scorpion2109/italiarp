```html
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Carta Bancaria</title>

<style>

body{
margin:0;
background:#161832;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
padding-top:60px;
color:white;
}

/* CARTA */

.card-container{
width:420px;
height:260px;
perspective:1000px;
}

.card{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 0.8s;
cursor:pointer;
}

.card.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
backface-visibility:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

.front{
background:linear-gradient(135deg,#6c6c6c,#bcbcbc,#6c6c6c);
}

.back{
transform:rotateY(180deg);
background:linear-gradient(135deg,#6c6c6c,#bcbcbc,#6c6c6c);
}

/* SALDO */

.balance-box{
width:420px;
background:#1f1f1f;
border-radius:14px;
padding:20px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.balance-row{
display:flex;
justify-content:space-between;
padding:10px 0;
font-size:18px;
}

.label{
font-weight:bold;
}

.amount{
color:#ffd700;
font-weight:bold;
}

/* OPERAZIONI */

.operations-line{
width:420px;
border-top:3px solid black;
margin-top:30px;
}

.operations-title{
margin-top:10px;
margin-bottom:20px;
font-weight:bold;
letter-spacing:2px;
}

.operations{
width:420px;
display:flex;
gap:20px;
}

.operation-box{
flex:1;
background:#222;
border-radius:12px;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

select,input{
padding:8px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#ffd700;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#e6c200;
}

</style>
</head>

<body>

<!-- CARTA -->

<div class="card-container">
<div class="card" onclick="this.classList.toggle('flip')">

<div class="front"></div>
<div class="back"></div>

</div>
</div>

<!-- SALDO -->

<div class="balance-box">

<div class="balance-row">
<span class="label">BANCA:</span>
<span id="banca" class="amount">€1000</span>
</div>

<div class="balance-row">
<span class="label">CASH:</span>
<span id="cash" class="amount">€200</span>
</div>

</div>

<!-- OPERAZIONI -->

<div class="operations-line"></div>

<div class="operations-title">OPERAZIONI</div>

<div class="operations">

<!-- DEPOSITO PRELIEVO -->

<div class="operation-box">

<select id="tipo">
<option value="deposito">Deposito</option>
<option value="prelievo">Prelievo</option>
</select>

<input id="importo1" type="number" placeholder="Quantità">

<button onclick="operazione()">Conferma</button>

</div>

<!-- BONIFICO -->

<div class="operation-box">

<select>
<option>Mario Rossi</option>
<option>Luca Bianchi</option>
<option>Giulia Verdi</option>
</select>

<input type="number" placeholder="Quantità">

<button>Conferma</button>

</div>

</div>

<script>

let banca = 1000
let cash = 200

function operazione(){

let tipo = document.getElementById("tipo").value
let importo = parseInt(document.getElementById("importo1").value)

if(!importo) return

if(tipo === "deposito"){

if(cash >= importo){
cash -= importo
banca += importo
}

}

if(tipo === "prelievo"){

if(banca >= importo){
banca -= importo
cash += importo
}

}

document.getElementById("banca").innerText = "€" + banca
document.getElementById("cash").innerText = "€" + cash

}

</script>

</body>
</html>
