<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poste Italiane - Italia RP</title>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#111;color:white;}

/* ===== HEADER ===== */
.header{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 20px;background:rgba(20,20,20,0.6);backdrop-filter:blur(8px);
}
.header .logo img{width:50px;cursor:pointer;}
.header .clock{font-weight:bold;font-size:18px;}
.header .right-icons{display:flex;gap:15px;}
.header .right-icons img{width:35px;cursor:pointer;}

/* ===== CARTA ===== */
.card-container{width:380px;margin:20px auto;perspective:2000px;}
.carta{width:100%;height:220px;border-radius:18px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:1s;}
.carta.flipped{transform:rotateY(180deg);}
.carta .fronte,.carta .retro{
  position:absolute;width:100%;height:100%;border-radius:18px;backface-visibility:hidden;padding:20px;box-sizing:border-box;
}
.carta .fronte{
  background:linear-gradient(135deg,#0073cf,#004a9f);
  color:white;display:flex;flex-direction:column;justify-content:space-between;
  box-shadow:0 10px 20px rgba(0,0,0,0.6);border:2px solid #ccc;
}
.carta .fronte::after{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;border-radius:18px;
  background:linear-gradient(150deg,rgba(255,255,255,0.2),transparent);pointer-events:none;
}
.carta .fronte .top{display:flex;justify-content:space-between;align-items:center;}
.carta .fronte .cp{font-size:14px;letter-spacing:1px;margin-top:5px;font-weight:bold;}
.carta .fronte .middle{margin-top:20px;}
.carta .fronte .code{font-size:22px;letter-spacing:3px;font-weight:bold;text-shadow:0 1px 2px black;}
.carta .fronte .expire{font-size:14px;margin-top:5px;}
.carta .fronte .bottom{display:flex;justify-content:space-between;align-items:center;font-weight:bold;font-size:16px;}
.carta .fronte .italia{letter-spacing:1px;}

/* RETRO */
.carta .retro{background:#222;color:white;transform:rotateY(180deg);border-radius:18px;box-shadow:0 10px 20px rgba(0,0,0,0.6);}
.carta .retro .banda{height:50px;background:black;margin-top:15px;border-radius:4px;}
.carta .retro .cvv{margin-top:15px;font-size:14px;}
.carta .retro .logo{width:60px;margin-top:15px;}
.carta .retro .iban{margin-top:auto;font-size:12px;letter-spacing:1px;padding-bottom:5px;}

/* ===== SALDI ===== */
.saldo-box{width:380px;margin:auto;margin-top:20px;background:rgba(0,0,0,0.5);border-radius:10px;padding:15px;}
.saldo-box div{margin:5px 0;}

/* ===== OPERAZIONI ===== */
.operazioni{width:380px;margin:auto;margin-top:20px;display:flex;flex-direction:column;gap:10px;}
.operazioni input, .operazioni select{padding:8px;border-radius:6px;border:none;width:100%;}
.operazioni button{padding:8px;border:none;border-radius:6px;background:#00aa44;color:white;cursor:pointer;}
</style>
</head>
<body>

<div class="header">
    <div class="logo"><img src="assets/logo-banca.png" alt="Poste Italiane" onclick="window.location.href='home.html'"></div>
    <div class="clock" id="clock"></div>
    <div class="right-icons">
        <img src="assets/documenti.png" alt="Documenti" title="Documenti">
        <img src="assets/impostazioni.png" alt="Impostazioni" title="Impostazioni">
    </div>
</div>

<div class="card-container">
  <div class="carta" id="carta">
    <!-- FRONTE -->
    <div class="fronte">
      <div class="top">
        <div>
          <div>POSTE ITALIANE</div>
          <div class="cp">CP: <span id="cardCP">0000</span></div>
        </div>
        <img src="assets/logo-banca.png" alt="Logo" style="width:50px;">
      </div>
      <div class="middle">
        <div class="code" id="cardCode">0000 0000 0000 0000</div>
        <div class="expire" id="cardExpire">12/30</div>
      </div>
      <div class="bottom">
        <div></div>
        <div class="italia">ITALIA</div>
      </div>
    </div>
    <!-- RETRO -->
    <div class="retro">
      <div class="banda"></div>
      <div class="cvv">CVV: <span id="cardCVV">123</span></div>
      <img class="logo" src="assets/logo-banca.png" alt="Logo">
      <div class="iban" id="cardIBAN">IT00 0000 0000 0000 0000 0000</div>
    </div>
  </div>
</div>

<div class="saldo-box">
    <div>Cash: €<span id="cash">0</span></div>
    <div>Banca: €<span id="bank">0</span></div>
    <div>Totale: €<span id="totale">0</span></div>
</div>

<div class="operazioni">
    <h4>Prelievo / Deposito</h4>
    <input type="number" id="prelievoInput" placeholder="Importo da prelevare (cash)">
    <button id="prelevaBtn">Preleva</button>

    <input type="number" id="depositoInput" placeholder="Importo da depositare (bank)">
    <button id="depositaBtn">Deposita</button>

    <h4>Bonifico</h4>
    <select id="destinatario"></select>
    <input type="number" id="bonificoImporto" placeholder="Importo bonifico">
    <button id="bonificoBtn">Invia Bonifico</button>

    <h4>Prestito (max 100.000€)</h4>
    <input type="number" id="prestitoInput" placeholder="Importo prestito">
    <button id="prestitoBtn">Richiedi Prestito</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig = { apiKey:"APIKEY", authDomain:"sito-rp.firebaseapp.com", projectId:"sito-rp" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = sessionStorage.getItem("discord_uid");
if(!uid) window.location.href="index.html";

/* Orologio */
function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerText = now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0")+":"+now.getSeconds().toString().padStart(2,"0");
}
setInterval(updateClock,1000);
updateClock();

/* Carta flip */
const carta = document.getElementById("carta");
carta.onclick = ()=>carta.classList.toggle("flipped");

/* Dati utente */
let userData = {};

async function caricaUtente(){
    const userRef = doc(db,"users",uid);
    const snap = await getDoc(userRef);
    if(!snap.exists()){
        userData = {
            bank:20000, cash:0, role:"cittadino",
            cardType:"poste-classic", name:"Nome", surname:"Cognome",
            cardCode:Math.floor(Math.random()*9000000000000000+1000000000000000),
            cardCP:Math.floor(Math.random()*9000+1000),
            cardCVV:Math.floor(Math.random()*900+100),
            cardExpire:"12/30",
            iban:"IT00 0000 0000 0000 0000 0000"
        };
        await setDoc(userRef,userData);
    } else {
        userData = snap.data();
    }
    aggiornaUI();
    caricaDestinatari();
}

function aggiornaUI(){
    document.getElementById("cash").innerText = userData.cash.toLocaleString();
    document.getElementById("bank").innerText = userData.bank.toLocaleString();
    document.getElementById("totale").innerText = (userData.cash+userData.bank).toLocaleString();
    document.getElementById("cardCode").innerText = userData.cardCode.toString().match(/.{1,4}/g).join(" ");
    document.getElementById("cardExpire").innerText = userData.cardExpire;
    document.getElementById("cardCVV").innerText = userData.cardCVV;
    document.getElementById("cardIBAN").innerText = userData.iban;
    document.getElementById("cardCP").innerText = userData.cardCP;
}

/* Prelievo / Deposito */
function commissione(cartaType){
    switch(cartaType){
        case "poste-classic": return 5;
        case "revolution": return 3;
        case "grigia": return 2;
        case "italia-lp": return 0;
        default: return 5;
    }
}

document.getElementById("prelevaBtn").onclick = async ()=>{
    const val = Number(document.getElementById("prelievoInput").value);
    if(val<=0 || val>userData.bank){ alert("Importo non valido"); return;}
    const fee = commissione(userData.cardType);
    userData.bank -= val;
    userData.cash += val-fee;
    await updateDoc(doc(db,"users",uid),{bank:userData.bank,cash:userData.cash});
    aggiornaUI();
    alert(`Prelevato €${val} - commissione €${fee}`);
};

document.getElementById("depositaBtn").onclick = async ()=>{
    const val = Number(document.getElementById("depositoInput").value);
    if(val<=0 || val>userData.cash){ alert("Importo non valido"); return;}
    const fee = commissione(userData.cardType);
    userData.cash -= val;
    userData.bank += val-fee;
    await updateDoc(doc(db,"users",uid),{bank:userData.bank,cash:userData.cash});
    aggiornaUI();
    alert(`Depositato €${val} - commissione €${fee}`);
};

/* Bonifico */
async function caricaDestinatari(){
    const col = collection(db,"users");
    const snapshot = await getDocs(col);
    const select = document.getElementById("destinatario");
    select.innerHTML="";
    snapshot.forEach(docu=>{
        if(docu.id!==uid){
            const opt = document.createElement("option");
            opt.value = docu.id;
            opt.textContent = docu.data().name+" "+docu.data().surname;
            select.appendChild(opt);
        }
    });
}

document.getElementById("bonificoBtn").onclick = async ()=>{
    const destId = document.getElementById("destinatario").value;
    const val = Number(document.getElementById("bonificoImporto").value);
    if(val<=0 || val>userData.bank){ alert("Saldo insufficiente"); return;}
    userData.bank -= val;
    await updateDoc(doc(db,"users",uid),{bank:userData.bank});
    const destRef = doc(db,"users",destId);
    const snap = await getDoc(destRef);
    const destData = snap.data();
    destData.bank = (destData.bank||0)+val;
    await updateDoc(destRef,{bank:destData.bank});
    aggiornaUI();
    alert(`Bonifico di €${val} inviato a ${destData.name} ${destData.surname}`);
};

/* Prestito */
document.getElementById("prestitoBtn").onclick = async ()=>{
    const val = Number(document.getElementById("prestitoInput").value);
    if(val<=0 || val>100000){ alert("Importo prestito max 100.000€"); return;}
    const iva = Math.floor(val*0.4);
    userData.bank += val;
    userData.loans = userData.loans||[];
    userData.loans.push({amount:val,interest:iva,active:true});
    await updateDoc(doc(db,"users",uid),{bank:userData.bank,loans:userData.loans});
    aggiornaUI();
    alert(`Prestito di €${val} richiesto, commissione IVA €${iva}`);
};

caricaUtente();
</script>
</body>
</html>
