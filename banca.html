<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca - Italia RP</title><style>
body{
margin:0;
background:#1c102b;
font-family:Segoe UI;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* TOPBAR */
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:#2a1b3f;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
z-index:1000;
}

.logo{ height:40px; }

.center{
font-size:18px;
font-weight:bold;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
border:2px solid white;
}

/* MENU PROFILO */
.menu-profilo{
position:fixed;
top:70px;
right:20px;
width:220px;
background:#2a1b3f;
border-radius:12px;
padding:15px;
display:none;
flex-direction:column;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
z-index:2000;
}

.menu-avatar{
width:70px;
height:70px;
border-radius:50%;
margin-bottom:10px;
}

.menu-nome{
font-weight:bold;
margin-bottom:5px;
}

.menu-rp{
font-size:14px;
opacity:0.8;
margin-bottom:15px;
}

#logoutBtn{
background:#ff4d4d;
border:none;
padding:8px;
border-radius:8px;
color:white;
cursor:pointer;
width:100%;
}

body{ padding-top:70px; }

/* CARD */
.wrapper{ perspective:2000px; }

.card{
width:500px;
height:300px;
position:relative;
transform-style:preserve-3d;
transition:1s;
cursor:pointer;
}

.card.flipped{ transform:rotateY(180deg); }

.face{
position:absolute;
width:100%;
height:100%;
border-radius:15px;
backface-visibility:hidden;
padding:20px;
}

.front{
background:white;
color:black;
}

.back{
background:#e8f1f3;
transform:rotateY(180deg);
color:black;
}

.photo{
width:120px;
height:150px;
border:2px solid #aaa;
overflow:hidden;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
border-radius:6px;
background:#5865F2;
color:white;
cursor:pointer;
}
</style></head><body><!-- TOPBAR --><div class="topbar"><div>
<img src="assets/logo.png" class="logo">
</div><div id="orario" class="center"></div><div>
<img id="avatar" class="avatar">
</div></div><!-- MENU PROFILO --><div id="menuProfilo" class="menu-profilo"><img id="menuAvatar" class="menu-avatar"><div id="menuDiscordNome" class="menu-nome"></div><div id="menuRpNome" class="menu-rp"></div><button id="logoutBtn">Esci</button>

</div><!-- CARD --><div class="wrapper">
<div class="card" id="card"><div class="face front"><div class="photo">
<img id="foto">
</div><h3 id="nome"></h3><p>Contanti: <span id="contanti"></span></p>
<p>Banca: <span id="banca"></span></p><button onclick="deposita()">Deposita</button>
<button onclick="preleva()">Preleva</button>

</div><div class="face back"><h3>Servizi Bancari</h3><button onclick="pagaBollette()">Paga Bollette (500€)</button>
<button onclick="chiediPrestito()">Prestito</button>

<p>Debito: <span id="debito"></span></p></div></div>
</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain:"sito-rp.firebaseapp.com",
projectId:"sito-rp",
storageBucket:"sito-rp.appspot.com",
messagingSenderId:"234781749995",
appId:"1:234781749995:web:6954473363659fe38b04ae"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const uid=sessionStorage.getItem("discord_uid");
const index=parseInt(sessionStorage.getItem("personaggio_index"));

if(!uid || isNaN(index)){
alert("Errore accesso");
location.href="lista-personaggi.html";
}

let dati, personaggi;

async function carica(){

const ref=doc(db,"users",uid);
const snap=await getDoc(ref);

personaggi=snap.data().personaggi;
dati=personaggi[index];

if(!dati.debito) dati.debito=0;
if(!dati.contanti) dati.contanti=5000;
if(!dati.banca) dati.banca=20000;

aggiornaUI();
caricaProfilo();

}

carica();

function aggiornaUI(){
nome.innerText=dati.nome+" "+dati.cognome;
contanti.innerText=dati.contanti+"€";
banca.innerText=dati.banca+"€";
debito.innerText=dati.debito+"€";
foto.src=dati.foto;
}

/* BANCA */
window.deposita=()=>{
let a=parseInt(prompt("Quanto depositare?"));
if(!a || a<=0) return;

if(a>dati.contanti){
alert("Non hai abbastanza contanti");
return;
}

dati.contanti-=a;
dati.banca+=a;
salva();
};

window.preleva=()=>{
let a=parseInt(prompt("Quanto prelevare?"));
if(!a || a<=0) return;

if(a>dati.banca){
alert("Saldo insufficiente");
return;
}

dati.banca-=a;
dati.contanti+=a;
salva();
};

window.pagaBollette=()=>{
let costo=500;

if(dati.banca<costo){
alert("Non hai abbastanza soldi");
return;
}

dati.banca-=costo;
alert("Bollette pagate");
salva();
};

window.chiediPrestito=()=>{
let a=parseInt(prompt("Quanto vuoi?"));
if(!a || a<=0) return;

dati.banca+=a;
dati.debito+=Math.floor(a*1.2);

alert("Prestito accettato (+20%)");
salva();
};

async function salva(){
personaggi[index]=dati;

await updateDoc(doc(db,"users",uid),{
personaggi:personaggi
});

aggiornaUI();
}

/* FLIP */
card.onclick=()=>{
card.classList.toggle("flipped");
};

/* ORARIO */
function aggiornaOrario(){
const now=new Date();
const h=now.getHours().toString().padStart(2,"0");
const m=now.getMinutes().toString().padStart(2,"0");
const s=now.getSeconds().toString().padStart(2,"0");
orario.innerText=h+":"+m+":"+s;
}
setInterval(aggiornaOrario,1000);
aggiornaOrario();

/* PROFILO DISCORD */
function caricaProfilo(){

const avatarUrl=sessionStorage.getItem("discord_avatar");
const discordNome=sessionStorage.getItem("discord_username");

avatar.src=avatarUrl || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

menuAvatar.src=avatar.src;
menuDiscordNome.innerText=discordNome || "Utente";
menuRpNome.innerText=dati.nome+" "+dati.cognome;

}

/* MENU */
avatar.onclick=()=>{
menuProfilo.style.display =
menuProfilo.style.display==="flex" ? "none" : "flex";
};

/* LOGOUT */
logoutBtn.onclick=()=>{
sessionStorage.clear();
location.href="index.html";
};

/* CLICK FUORI */
document.addEventListener("click",(e)=>{
if(!menuProfilo.contains(e.target) && e.target !== avatar){
menuProfilo.style.display="none";
}
});

</script></body>
</html>
