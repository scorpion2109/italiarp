<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca - Italia RP</title><style>
body{
margin:0;
background:#1c102b;
font-family:Segoe UI;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* TOPBAR */
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:#2a1b3f;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
z-index:1000;
}

.logo{ height:40px; }

.center{
font-size:18px;
font-weight:bold;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
border:2px solid white;
}

body{ padding-top:70px; }

/* CARD */
.wrapper{ perspective:2000px; }

.card{
width:500px;
height:300px;
position:relative;
transform-style:preserve-3d;
transition:1s;
cursor:pointer;
}

.card.flipped{ transform:rotateY(180deg); }

.face{
position:absolute;
width:100%;
height:100%;
border-radius:15px;
backface-visibility:hidden;
padding:20px;
}

.front{
background:white;
color:black;
}

.back{
background:#e8f1f3;
transform:rotateY(180deg);
color:black;
}

.photo{
width:120px;
height:150px;
border:2px solid #aaa;
overflow:hidden;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
border-radius:6px;
background:#5865F2;
color:white;
cursor:pointer;
}
</style></head><body><!-- TOPBAR --><div class="topbar"><div class="left">
<img src="assets/logo.png" class="logo">
</div><div class="center" id="orario"></div><div class="right">
<img id="avatar" class="avatar">
</div></div><!-- CARD --><div class="wrapper">
<div class="card" id="card"><div class="face front"><div class="photo">
<img id="foto">
</div><h3 id="nome"></h3><p>Contanti: <span id="contanti"></span></p>
<p>Banca: <span id="banca"></span></p><button onclick="deposita()">Deposita</button>
<button onclick="preleva()">Preleva</button>

</div><div class="face back"><h3>Servizi Bancari</h3><button onclick="pagaBollette()">Paga Bollette (500€)</button>
<button onclick="chiediPrestito()">Prestito</button>

<p>Debito: <span id="debito"></span></p></div></div>
</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain:"sito-rp.firebaseapp.com",
projectId:"sito-rp",
storageBucket:"sito-rp.appspot.com",
messagingSenderId:"234781749995",
appId:"1:234781749995:web:6954473363659fe38b04ae"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* DATI */
const uid=sessionStorage.getItem("discord_uid");
const index=parseInt(sessionStorage.getItem("personaggio_index"));

if(!uid || isNaN(index)){
alert("Errore accesso");
location.href="lista-personaggi.html";
}

let dati, personaggi;

async function carica(){

const ref=doc(db,"users",uid);
const snap=await getDoc(ref);

personaggi=snap.data().personaggi;
dati=personaggi[index];

if(!dati.debito) dati.debito=0;
if(!dati.contanti) dati.contanti=5000;
if(!dati.banca) dati.banca=20000;

aggiornaUI();

}

carica();

/* UI */
function aggiornaUI(){

nome.innerText=dati.nome+" "+dati.cognome;
contanti.innerText=dati.contanti+"€";
banca.innerText=dati.banca+"€";
debito.innerText=dati.debito+"€";
foto.src=dati.foto;

}

/* BANCA */
window.deposita=()=>{
let a=parseInt(prompt("Quanto depositare?"));
if(!a || a<=0) return;

if(a>dati.contanti){
alert("Non hai abbastanza contanti");
return;
}

dati.contanti-=a;
dati.banca+=a;
salva();
};

window.preleva=()=>{
let a=parseInt(prompt("Quanto prelevare?"));
if(!a || a<=0) return;

if(a>dati.banca){
alert("Saldo insufficiente");
return;
}

dati.banca-=a;
dati.contanti+=a;
salva();
};

/* BOLLETTE */
window.pagaBollette=()=>{
let costo=500;

if(dati.banca<costo){
alert("Non hai abbastanza soldi");
return;
}

dati.banca-=costo;
alert("Bollette pagate");
salva();
};

/* PRESTITO */
window.chiediPrestito=()=>{
let a=parseInt(prompt("Quanto vuoi?"));
if(!a || a<=0) return;

dati.banca+=a;
dati.debito+=Math.floor(a*1.2);

alert("Prestito accettato (+20%)");
salva();
};

/* SALVA */
async function salva(){

personaggi[index]=dati;

await updateDoc(doc(db,"users",uid),{
personaggi:personaggi
});

aggiornaUI();

}

/* FLIP */
card.onclick=()=>{
card.classList.toggle("flipped");
};

/* ORARIO */
function aggiornaOrario(){
const now=new Date();
const h=now.getHours().toString().padStart(2,"0");
const m=now.getMinutes().toString().padStart(2,"0");
const s=now.getSeconds().toString().padStart(2,"0");

document.getElementById("orario").innerText=h+":"+m+":"+s;
}

setInterval(aggiornaOrario,1000);
aggiornaOrario();

/* AVATAR */
const avatarUrl=sessionStorage.getItem("discord_avatar");
const avatar=document.getElementById("avatar");

avatar.src=avatarUrl || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

/* LOGOUT */
avatar.onclick=()=>{
if(confirm("Vuoi fare logout?")){
sessionStorage.clear();
location.href="index.html";
}
};

</script></body>
  </html>
