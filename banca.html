<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca RP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#dcdcdc;
font-family:Arial;
display:flex;
justify-content:center;
}

/* CONTAINER */
.container{
width:360px;
background:linear-gradient(135deg,#000428,#1f2bff,#000428);
margin-top:20px;
border-radius:12px;
color:white;
padding-bottom:20px;
}

/* TOP */
.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

.logo{height:40px;}
.avatar{width:40px;border-radius:50%;}
.time{border:1px solid white;padding:5px 20px;}

/* CARTA */
.card-container{
display:flex;
justify-content:center;
perspective:1000px;
}

.card{
width:320px;
height:200px;
transform-style:preserve-3d;
transition:0.8s;
cursor:pointer;
position:relative;
}

.card.flip{transform:rotateY(180deg);}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:15px;
backface-visibility:hidden;
background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a);
}

.back{transform:rotateY(180deg);}

/* RETRO */
.name{
position:absolute;
top:90px;
left:20px;
color:black;
font-weight:bold;
}

/* BOX */
.box{
margin:15px;
padding:15px;
background:rgba(255,255,255,0.05);
border-radius:10px;
text-align:center;
}

/* INPUT */
input,select{
width:80%;
padding:10px;
margin:5px;
}

button{
padding:8px 20px;
border-radius:20px;
}

/* MOVIMENTI */
.mov{
display:flex;
justify-content:space-between;
margin:5px;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<!-- TOP -->
<div class="top">
<img src="assets/logo.png" class="logo">
<div id="orario" class="time"></div>
<img class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
</div>

<!-- CARTA -->
<div class="card-container">
<div class="card" onclick="this.classList.toggle('flip')">

<div class="front"></div>

<div class="back">
<div class="name">NOME</div>
</div>

</div>
</div>

<!-- CONTO -->
<div class="box">
CASH: €<span id="cash">0</span><br><br>
BANCA: €<span id="banca">0</span>
</div>

<!-- OPERAZIONI -->
<div class="box">
<select id="tipo">
<option value="deposito">Deposito</option>
<option value="prelievo">Prelievo</option>
</select>

<input id="importo" type="number" placeholder="Quantità">

<button onclick="operazione()">CONFERMA</button>
</div>

<div class="box">
<input id="destinatario" placeholder="Nome Cognome">
<input id="importoBonifico" type="number" placeholder="Quantità">

<button onclick="bonifico()">CONFERMA</button>
</div>

<!-- STORICO -->
<div class="box" id="movimenti">STORICO</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
  authDomain: "sito-rp.firebaseapp.com",
  projectId: "sito-rp",
  storageBucket: "sito-rp.firebasestorage.app",
  messagingSenderId: "234781749995",
  appId: "1:234781749995:web:6954473363659fe38b04ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DATI */
let banca = 0;
let cash = 0;

/* ORARIO */
setInterval(()=>{
orario.innerText=new Date().toLocaleTimeString().slice(0,5);
},1000);

/* CARICA DATI */
async function carica(){

  const discordId = "982317367596032010"
  const index = parseInt(localStorage.getItem("personaggioIndex"));

  if(!discordId){
    alert("Non sei loggato");
    return;
  }

  if(index === null){
    alert("Nessun personaggio selezionato");
    return;
  }

  const ref = doc(db,"users",discordId);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    alert("Utente non trovato");
    return;
  }

  let data = snap.data();

  if(!data.personaggi || !data.personaggi[index]){
    alert("Personaggio non trovato");
    return;
  }

  let p = data.personaggi[index];

  banca = p.banca || 0;
  cash = p.contanti || 0;

  document.getElementById("banca").innerText = banca;
  document.getElementById("cash").innerText = cash;

  document.querySelector(".name").innerText =
    (p.nome + " " + p.cognome).toUpperCase();
}

/* SALVA */
async function salva(){

const discordId = "982317367596032010"
  const index = parseInt(localStorage.getItem("personaggioIndex"));

  const ref = doc(db,"users",discordId);
  const snap = await getDoc(ref);

  let data = snap.data();
  let personaggi = data.personaggi;

  personaggi[index].banca = banca;
  personaggi[index].contanti = cash;

  await updateDoc(ref,{personaggi});
}

/* MOVIMENTI */
function addMov(t){
let d=document.createElement("div");
d.className="mov";
d.innerHTML=t;
movimenti.prepend(d);
}

/* OPERAZIONI */
window.operazione = async function(){
let tipo=tipo.value;
let imp=parseInt(importo.value);

if(!imp)return;

if(tipo=="deposito" && cash>=imp){
cash-=imp;
banca+=imp;
addMov("Deposito €"+imp);
}

if(tipo=="prelievo" && banca>=imp){
banca-=imp;
cash+=imp;
addMov("Prelievo €"+imp);
}

document.getElementById("banca").innerText=banca;
document.getElementById("cash").innerText=cash;

await salva();
}

/* BONIFICO */
window.bonifico = async function(){
let nome=destinatario.value;
let imp=parseInt(importoBonifico.value);

if(!nome||!imp)return;

if(banca>=imp){
banca-=imp;
addMov("Bonifico a "+nome+" €"+imp);
}

document.getElementById("banca").innerText=banca;

await salva();
}

/* INIT */
carica();

</script>

</body>
</html>
