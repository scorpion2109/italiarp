<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Banca</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#1c102b,#2a1b3f);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* CARTA */
.card-container{
  width:420px;
  max-width:90vw;
  height:260px;
  perspective:2000px;
}
.card{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
  cursor:pointer;
}
.card.flip{
  transform:rotateY(180deg);
}
.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:18px;
  backface-visibility:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.8);
}

/* FRONTE */
.front{
  background:linear-gradient(135deg,#ffd400,#f2c200);
  color:#111;
  padding:25px;
  box-sizing:border-box;
  overflow:hidden;
  font-family:'Roboto Mono', monospace;
}
.gold-bar{
  position:absolute;
  left:0;
  top:0;
  width:50px;
  height:100%;
  background:linear-gradient(#b38b00,#ffd700,#a67c00);
  border-radius:18px 0 0 18px;
}
.postepay-logo{
  position:absolute;
  top:15px;
  left:70px;
  width:120px;
}
.chip{
  margin-top:60px;
  margin-left:70px;
  width:60px;
  height:45px;
  border-radius:6px;
  background:linear-gradient(135deg,#d4af37,#f7e27b,#b8860b);
  box-shadow:inset 0 0 5px rgba(0,0,0,0.5),0 3px 5px rgba(0,0,0,0.3);
}
.contactless{
  position:absolute;
  top:75px;
  left:150px;
  font-size:18px;
  color:#333;
}
.card-number{
  margin-top:50px;
  font-size:22px;
  letter-spacing:3px;
  margin-left:70px;
  font-weight:bold;
}
.expire{
  margin-left:70px;
  margin-top:15px;
  font-size:14px;
}
.iban{
  position:absolute;
  bottom:20px;
  left:70px;
  font-size:13px;
  font-weight:bold;
  letter-spacing:1px;
}
.mastercard{
  position:absolute;
  bottom:15px;
  right:25px;
  display:flex;
  gap:-10px;
}
.mc1,.mc2{
  width:35px;
  height:35px;
  border-radius:50%;
}
.mc1{background:#eb001b;}
.mc2{background:#f79e1b;opacity:0.9;}

/* RETRO */
.back{
  background:linear-gradient(135deg,#ffd400,#f2c200);
  transform:rotateY(180deg);
  padding:20px;
  box-sizing:border-box;
  font-family:'Roboto Mono', monospace;
}
.stripe{
  background:black;
  height:50px;
  margin-top:30px;
  border-radius:4px;
}
.cvv{
  margin-top:20px;
  background:white;
  width:80px;
  padding:6px;
  text-align:right;
  font-weight:bold;
  border-radius:4px;
}
</style>
</head>
<body>

<div class="card-container">
  <div class="card" id="card">
    <div class="front">
      <div class="gold-bar"></div>
      <img src="assets/logo-postepay.png" class="postepay-logo">
      <div class="chip"></div>
      <div class="contactless">📶</div>
      <div class="card-number" id="cardNumber"></div>
      <div class="expire">VALID THRU <span id="expire"></span></div>
      <div class="iban" id="iban"></div>
      <div class="mastercard">
        <div class="mc1"></div>
        <div class="mc2"></div>
      </div>
    </div>
    <div class="back">
      <div class="stripe"></div>
      <div class="cvv">CVV <span id="cvv"></span></div>
    </div>
  </div>
</div>

<script>
// Personaggio selezionato
const personaggio = "Mario";

// Funzione hash per generare dati deterministici
function hashString(s){
  let h=0;
  for(let i=0;i<s.length;i++){
    h=(h<<5)-h+s.charCodeAt(i);
    h|=0;
  }
  return Math.abs(h);
}

function generaCarta(personaggio){
  const seed = hashString(personaggio);
  const cardNumber = String(seed).padEnd(16,'0').slice(0,16).match(/.{1,4}/g).join(" ");
  const iban = "IT60X" + String(seed).padEnd(20,'0').slice(0,20);
  const cvv = String(seed).slice(0,3).padStart(3,'0');
  const expire = "12/30";
  return {cardNumber, iban, cvv, expire};
}

const carta = generaCarta(personaggio);

// Mostra la carta
document.getElementById("cardNumber").innerText = carta.cardNumber;
document.getElementById("iban").innerText = carta.iban;
document.getElementById("cvv").innerText = carta.cvv;
document.getElementById("expire").innerText = carta.expire;

// Flip carta al click
document.getElementById("card").onclick = ()=>{
  document.getElementById("card").classList.toggle("flip");
}
</script>

</body>
</html>
