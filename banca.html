<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca - Italia RP</title><style>
body{
margin:0;
background:#1c102b;
font-family:Segoe UI;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* TOPBAR */
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:#2a1b3f;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
z-index:1000;
}

.logo{ height:40px; }

.center{
font-size:18px;
font-weight:bold;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
border:2px solid white;
}

/* MENU PROFILO */
.menu-profilo{
position:fixed;
top:70px;
right:20px;
width:220px;
background:#2a1b3f;
border-radius:12px;
padding:15px;
display:none;
flex-direction:column;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
z-index:2000;
}

.menu-avatar{
width:70px;
height:70px;
border-radius:50%;
margin-bottom:10px;
}

.menu-nome{
font-weight:bold;
margin-bottom:5px;
}

.menu-rp{
font-size:14px;
opacity:0.8;
margin-bottom:15px;
}

#logoutBtn{
background:#ff4d4d;
border:none;
padding:8px;
border-radius:8px;
color:white;
cursor:pointer;
width:100%;
}

body{ padding-top:70px; }

/* CARD */
.wrapper{ perspective:2000px; }

.card{
width:500px;
height:300px;
position:relative;
transform-style:preserve-3d;
transition:1s;
cursor:pointer;
}

.card.flipped{ transform:rotateY(180deg); }

.face{
position:absolute;
width:100%;
height:100%;
border-radius:15px;
backface-visibility:hidden;
padding:20px;
}

.front{
background:white;
color:black;
}

.back{
background:#e8f1f3;
transform:rotateY(180deg);
color:black;
}

/* FOTO */
.photo{
width:120px;
height:150px;
border:2px solid #aaa;
overflow:hidden;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

/* CARTA DI CREDITO */
.credit-card{
width:100%;
height:100%;
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
border-radius:15px;
color:white;
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.cc-number{
font-size:22px;
letter-spacing:3px;
}

.cc-row{
display:flex;
justify-content:space-between;
font-size:12px;
}

.cc-name{
font-size:16px;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
border-radius:6px;
background:#5865F2;
color:white;
cursor:pointer;
}
</style></head><body><!-- TOPBAR --><div class="topbar">
<img src="assets/logo.png" class="logo">
<div id="orario" class="center"></div>
<img id="avatar" class="avatar">
</div><!-- MENU PROFILO --><div id="menuProfilo" class="menu-profilo">
<img id="menuAvatar" class="menu-avatar">
<div id="menuDiscordNome" class="menu-nome"></div>
<div id="menuRpNome" class="menu-rp"></div>
<button id="logoutBtn">Esci</button>
</div><!-- CARD --><div class="wrapper">
<div class="card" id="card"><!-- FRONTE --><div class="face front"><div class="photo">
<img id="foto">
</div><h3 id="nome"></h3><p>Contanti: <span id="contanti"></span></p>
<p>Banca: <span id="banca"></span></p><button onclick="deposita()">Deposita</button>
<button onclick="preleva()">Preleva</button>

</div><!-- RETRO = CARTA --><div class="face back"><div class="credit-card"><div class="cc-number" id="ccNumero">----</div><div class="cc-row">
<div>
<span>Scadenza</span>
<div id="ccScadenza">--/--</div>
</div><div>
<span>CVV</span>
<div id="ccCVV">---</div>
</div>
</div><div class="cc-name" id="ccNome"></div><button onclick="generaCarta()">Genera Carta</button>

<button onclick="pagaBollette()">Bollette (500€)</button>
<button onclick="chiediPrestito()">Prestito</button>

<p>Debito: <span id="debito"></span></p></div></div></div>
</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain:"sito-rp.firebaseapp.com",
projectId:"sito-rp"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const uid=sessionStorage.getItem("discord_uid");
const index=parseInt(sessionStorage.getItem("personaggio_index"));

let dati, personaggi;

async function carica(){

const snap=await getDoc(doc(db,"users",uid));
personaggi=snap.data().personaggi;
dati=personaggi[index];

if(!dati.debito) dati.debito=0;

aggiornaUI();
aggiornaCarta();
caricaProfilo();

}

carica();

function aggiornaUI(){
nome.innerText=dati.nome+" "+dati.cognome;
contanti.innerText=dati.contanti+"€";
banca.innerText=dati.banca+"€";
debito.innerText=dati.debito+"€";
foto.src=dati.foto;
}

/* CARTA */
function generaNumeroCarta(){
return "4"+Math.random().toString().slice(2,18).padEnd(16,"0").replace(/(.{4})/g,"$1 ");
}

function generaScadenza(){
let m=Math.floor(Math.random()*12)+1;
let y=new Date().getFullYear()+3;
return m.toString().padStart(2,"0")+"/"+y.toString().slice(2);
}

function generaCVV(){
return Math.floor(100+Math.random()*900);
}

window.generaCarta=async ()=>{
if(!dati.carta){
dati.carta={
numero:generaNumeroCarta(),
scadenza:generaScadenza(),
cvv:generaCVV()
};
await salva();
}
aggiornaCarta();
};

function aggiornaCarta(){
if(!dati.carta) return;
ccNumero.innerText=dati.carta.numero;
ccScadenza.innerText=dati.carta.scadenza;
ccCVV.innerText=dati.carta.cvv;
ccNome.innerText=dati.nome+" "+dati.cognome;
}

/* BANCA */
window.deposita=()=>{
let a=parseInt(prompt("Quanto?"));
if(!a||a<=0)return;
if(a>dati.contanti)return alert("Non hai soldi");
dati.contanti-=a;
dati.banca+=a;
salva();
};

window.preleva=()=>{
let a=parseInt(prompt("Quanto?"));
if(!a||a<=0)return;
if(a>dati.banca)return alert("Saldo basso");
dati.banca-=a;
dati.contanti+=a;
salva();
};

window.pagaBollette=()=>{
if(dati.banca<500)return alert("Non hai soldi");
dati.banca-=500;
salva();
};

window.chiediPrestito=()=>{
let a=parseInt(prompt("Importo"));
if(!a)return;
dati.banca+=a;
dati.debito+=Math.floor(a*1.2);
salva();
};

async function salva(){
personaggi[index]=dati;
await updateDoc(doc(db,"users",uid),{personaggi});
aggiornaUI();
aggiornaCarta();
}

/* FLIP */
card.onclick=()=>card.classList.toggle("flipped");

/* ORARIO */
setInterval(()=>{
let d=new Date();
orario.innerText=d.toLocaleTimeString();
},1000);

/* PROFILO */
function caricaProfilo(){
let av=sessionStorage.getItem("discord_avatar");
let name=sessionStorage.getItem("discord_username");

avatar.src=av;
menuAvatar.src=av;
menuDiscordNome.innerText=name;
menuRpNome.innerText=dati.nome+" "+dati.cognome;
}

avatar.onclick=()=>{
menuProfilo.style.display=
menuProfilo.style.display==="flex"?"none":"flex";
};

logoutBtn.onclick=()=>{
sessionStorage.clear();
location.href="index.html";
};

document.addEventListener("click",(e)=>{
if(!menuProfilo.contains(e.target)&&e.target!==avatar){
menuProfilo.style.display="none";
}
});

</script></body>
  </html>
