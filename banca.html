<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca RP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:url("sfondo.webp") no-repeat center center fixed;
background-size:cover;
font-family:Arial, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
padding-top:40px;
color:white;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

}

/* -------- CARTA -------- */

.card-container{
width:420px;
height:260px;
perspective:1200px;
margin-bottom:30px;
}

.card{
width:100%;
height:100%;

transform-style:preserve-3d;
transition:transform 0.8s;

}

.card.flip{

}

.front, .back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
backface-visibility:hidden;
overflow:hidden;

0 10px 20px rgba(0,0,0,0.5),
inset 0 3px 8px rgba(255,255,255,0.25);

.front{

}

.gold-bar{

}

.postepay{

color:#ffd700;

font-size:28px;
}

.evolution{
position:absolute;
top:58px;
left:190px;
color:#ffd700;

}

.chip{
position:absolute;
top:100px;
left:75px;
width:65px;
}

.contactless{
position:absolute;
top:117px;
left:130px;

}

.posteitaliane{
position:absolute;
top:117px;
left:165px;
font-size:19px;
font-weight:900;
}

.card-number{
position:absolute;
bottom:70px;
left:75px;
font-size:20px;
letter-spacing:3px;

}

.expiry{
position:absolute;
bottom:22px;

.card-logo{

.card-logo img{width:100%;}

</head>

<body>

<!-- CARTA -->

<div class="card-container">
<div class="card" onclick="this.classList.toggle('flip')">

<div class="front">
<div class="gold-bar"></div>
<div class="postepay">POSTEPAY</div>
<div class="evolution">evolution</div>
<img src="assets/chip.png" class="chip">
<img src="assets/contactless.png" class="contactless">
<div class="posteitaliane">POSTE ITALIANE</div>
<div class="rp-box">ITALIA RP</div>
<div class="card-number">1234 5678 9012 3456</div>
<div class="expiry">12/29</div>
<div class="card-logo"><img src="assets/mastercard.png"></div>
</div>

<div class="back">
<div class="magnetic"></div>
<div class="name">NOME RP</div>
<div class="cvv-bar">123</div>
<div class="iban">IT60 X054 2811 1010 0000 0123 456</div>
</div>

</div>
</div>

<!-- SALDO -->

<div class="balance-box">
<div class="balance-row">BANCA <span id="banca" class="amount">€0</span></div>
<div class="balance-row">CASH <span id="cash" class="amount">€0</span></div>
</div>

<!-- OPERAZIONI -->

<div class="operations">

<div class="operation-box">
<select id="tipo">
<option value="deposito">Deposito</option>
<option value="prelievo">Prelievo</option>
</select>

<input id="importo1" type="number" placeholder="Quantità">

<button onclick="operazione()">Conferma</button>
</div>

<div class="operation-box">

<select id="destinatario">
<option value="">Seleziona giocatore</option>
</select>

<input id="importo2" type="number" placeholder="Quantità">

<button onclick="bonifico()">Bonifico</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain: "sito-rp.firebaseapp.com",
projectId: "sito-rp",
storageBucket: "sito-rp.firebasestorage.app",
messagingSenderId: "234781749995",
appId: "1:234781749995:web:6954473363659fe38b04ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const userId = "982317367596032010";
const userRef = doc(db,"users",userId);

let banca = 0;
let cash = 0;

async function caricaSaldo(){

const snap = await getDoc(userRef);

if(snap.exists()){

banca = snap.data().bank;
cash = snap.data().cash;

document.getElementById("banca").innerText="€"+banca;
document.getElementById("cash").innerText="€"+cash;

}

}

async function caricaNomi(){

const snapshot = await getDocs(collection(db,"users"));
const select=document.getElementById("destinatario");

snapshot.forEach(docSnap=>{

let data=docSnap.data();

if(data.personaggi){

data.personaggi.forEach(p=>{

let nome=p.nome+" "+p.cognome;

let option=document.createElement("option");
option.value=docSnap.id;
option.textContent=nome;

select.appendChild(option);

});

}

});

}

window.operazione=async function(){

let tipo=document.getElementById("tipo").value;
let importo=Number(document.getElementById("importo1").value);

if(importo<=0) return;

if(tipo==="deposito" && cash>=importo){
cash-=importo;
banca+=importo;
}

if(tipo==="prelievo" && banca>=importo){
banca-=importo;
cash+=importo;
}

await updateDoc(userRef,{bank:banca,cash:cash});

document.getElementById("banca").innerText="€"+banca;
document.getElementById("cash").innerText="€"+cash;

}

window.bonifico=async function(){

let dest=document.getElementById("destinatario").value;
let importo=Number(document.getElementById("importo2").value);

if(importo<=0) return;
if(banca<importo) return;

const destRef=doc(db,"users",dest);
const snap=await getDoc(destRef);

let destBank=snap.data().bank||0;

banca-=importo;
destBank+=importo;

await updateDoc(userRef,{bank:banca});
await updateDoc(destRef,{bank:destBank});

document.getElementById("banca").innerText="€"+banca;

}

caricaSaldo();
caricaNomi();

</script>

</body>
</html>
