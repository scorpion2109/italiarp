<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Carta Realistica</title>
<style>
body {
  margin:0;
  background:#1c102b;
  font-family:'Roboto', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.card-container {
  width:420px;
  max-width:90vw;
  height:260px;
  perspective:2000px;
}
.card {
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
  cursor:pointer;
  border-radius:18px;
}
.card.flip {
  transform:rotateY(180deg);
}
.front, .back {
  position:absolute;
  width:100%;
  height:100%;
  border-radius:18px;
  backface-visibility:hidden;
  overflow:hidden;
}
/* FRONTE */
.front {
  background-image: url('assets/postepay_front.png'); /* Immagine reale della Postepay */
  background-size: cover;
  background-position: center;
}
.front-text {
  position:absolute;
  left:70px;
  top:60px;
  color:#fff;
  font-family:'OCR A Std', monospace;
  font-size:22px;
  letter-spacing:3px;
  font-weight:bold;
}
.expire-text {
  position:absolute;
  left:70px;
  bottom:60px;
  font-size:14px;
  font-weight:bold;
}
.iban-text {
  position:absolute;
  left:70px;
  bottom:30px;
  font-size:13px;
  font-weight:bold;
}
/* RETRO */
.back {
  background-image: url('assets/postepay_back.png'); /* Retro reale */
  background-size: cover;
  background-position: center;
}
.cvv-text {
  position:absolute;
  right:50px;
  top:100px;
  font-size:14px;
  font-weight:bold;
  color:#000;
}
</style>
</head>
<body>

<div class="card-container">
  <div class="card" id="card">
    <div class="front">
      <div class="front-text" id="cardNumber"></div>
      <div class="expire-text">VALID THRU <span id="expire"></span></div>
      <div class="iban-text" id="iban"></div>
    </div>
    <div class="back">
      <div class="cvv-text">CVV <span id="cvv"></span></div>
    </div>
  </div>
</div>

<script>
// Nome del personaggio
const personaggio = "Mario";

// Funzione hash deterministica
function hashString(s){
  let h=0;
  for(let i=0;i<s.length;i++){
    h=(h<<5)-h+s.charCodeAt(i);
    h|=0;
  }
  return Math.abs(h);
}

function generaCarta(personaggio){
  const seed = hashString(personaggio);
  const cardNumber = String(seed).padEnd(16,'0').slice(0,16).match(/.{1,4}/g).join(" ");
  const iban = "IT60X" + String(seed).padEnd(20,'0').slice(0,20);
  const cvv = String(seed).slice(0,3).padStart(3,'0');
  const expire = "12/30";
  return {cardNumber, iban, cvv, expire};
}

const carta = generaCarta(personaggio);

// Mostra dati carta
document.getElementById("cardNumber").innerText = carta.cardNumber;
document.getElementById("iban").innerText = carta.iban;
document.getElementById("cvv").innerText = carta.cvv;
document.getElementById("expire").innerText = carta.expire;

// Flip carta
document.getElementById("card").onclick = ()=>{
  document.getElementById("card").classList.toggle("flip");
}
</script>

</body>
</html>
