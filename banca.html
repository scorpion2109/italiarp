<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Banca Italia RP</title>

<style>

body{
font-family:Segoe UI;
background:#121212;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{

background:#1e1e1e;
padding:30px;
border-radius:15px;
width:350px;
text-align:center;

}

h2{
margin-bottom:20px;
}

.saldo{

font-size:22px;
margin:10px 0;

}

input{

width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;

}

button{

width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}

.deposito{
background:#2ecc71;
color:white;
}

.preleva{
background:#e74c3c;
color:white;
}

.home{
background:#3498db;
color:white;
margin-top:20px;
}

</style>

</head>

<body>

<div class="box">

<h2 id="nomePersonaggio"></h2>

<div class="saldo">
🏦 Banca: <span id="saldoBanca">0</span> €
</div>

<div class="saldo">
💵 Contanti: <span id="contanti">0</span> €
</div>

<input id="importo" type="number" placeholder="Importo">

<button class="deposito" id="btnDeposita">
Deposita
</button>

<button class="preleva" id="btnPreleva">
Preleva
</button>

<button class="home" onclick="window.location.href='home.html'">
Torna alla Home
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain: "sito-rp.firebaseapp.com",
projectId: "sito-rp",
storageBucket: "sito-rp.appspot.com",
messagingSenderId: "234781749995",
appId: "1:234781749995:web:6954473363659fe38b04ae"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = sessionStorage.getItem("discord_uid");
const index = sessionStorage.getItem("personaggio_index");

if(!uid || index === null){

window.location.href="index.html";

}

const ref = doc(db,"users",uid);
const snap = await getDoc(ref);

let lista = snap.data().personaggi || [];

let p = lista[index];

/* fix vecchi personaggi */

if(p.banca === undefined) p.banca = 10000;
if(p.contanti === undefined) p.contanti = 5000;

/* aggiorna UI */

function aggiorna(){

document.getElementById("nomePersonaggio").innerText =
p.nome + " " + p.cognome;

document.getElementById("saldoBanca").innerText =
p.banca;

document.getElementById("contanti").innerText =
p.contanti;

}

aggiorna();

/* salva firebase */

async function salva(){

lista[index] = p;

await setDoc(ref,{
personaggi:lista
},{merge:true});

}

/* deposito */

document.getElementById("btnDeposita").onclick = async ()=>{

let importo = Number(document.getElementById("importo").value);

if(importo <=0) return;

if(importo > p.contanti){

alert("Non hai abbastanza contanti");
return;

}

p.contanti -= importo;
p.banca += importo;

await salva();

aggiorna();

};

/* prelievo */

document.getElementById("btnPreleva").onclick = async ()=>{

let importo = Number(document.getElementById("importo").value);

if(importo <=0) return;

if(importo > p.banca){

alert("Saldo banca insufficiente");
return;

}

p.banca -= importo;
p.contanti += importo;

await salva();

aggiorna();

};

</script>

</body>

</html>
