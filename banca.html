<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banca - Italia RP</title>

<style>
body{
    min-height:100vh;
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    display:flex;
    flex-direction:column;
    background-image:url("assets/sfondo.webp");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:-1;
}

/* HEADER */
.header{
    height:75px;
    backdrop-filter:blur(8px);
    background:rgba(15,15,15,0.95);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    border-bottom:1px solid rgba(255,255,255,0.15);
    z-index:100;
    position:relative;
}

.logo img{
    height:55px;
    cursor:pointer;
}

.clock{
    font-size:22px;
    font-weight:600;
    letter-spacing:2px;
}

.menu{
    display:flex;
    gap:20px;
    cursor:pointer;
}

/* CARTA 3D stile Postepay */
.card-container {
    width:430px;
    height:270px;
    margin:50px auto;
    perspective:2000px;
}

.card {
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition: transform 0.6s cubic-bezier(.03,.98,.52,.99);
    cursor:pointer;
    border-radius:18px;
    box-shadow:0 25px 60px rgba(0,0,0,0.7);
}

.card-container:hover .card {
    transform: rotateX(5deg) rotateY(10deg);
}

.card.flip {
    transform: rotateY(180deg);
}

.front, .back {
    position:absolute;
    width:100%;
    height:100%;
    border-radius:18px;
    backface-visibility:hidden;
    box-sizing:border-box;
    padding:28px;
}

/* FRONTE */
.front {
    background: linear-gradient(135deg, #2b2b2b, #1c1c1c);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:20px 28px;
}

.logo-italiarp {
    position:absolute;
    top:15px;
    right:20px;
    font-weight:bold;
    font-size:18px;
    color:#ffd400;
}

.chip {
    width:60px;
    height:45px;
    border-radius:6px;
    background:linear-gradient(135deg,#d4af37,#f7e27b,#b8860b);
    margin-top:40px;
}

.nfc {
    width:20px;
    height:20px;
    border-radius:50%;
    border:2px solid #ffd400;
    position:absolute;
    top:55px;
    left:100px;
}

.card-number {
    margin-top:50px;
    font-size:22px;
    letter-spacing:3px;
}

.card-name {
    margin-top:15px;
    font-size:16px;
    font-weight:bold;
}

.card-iban-front {
    font-size:12px;
    margin-top:5px;
}

/* RETRO */
.back {
    background:#2b2b2b;
    color:white;
    transform:rotateY(180deg);
    padding:28px;
}

.stripe {
    background:black;
    height:50px;
    margin-top:20px;
    border-radius:4px;
}

.cvv-box {
    background:white;
    color:black;
    width:50px;
    padding:6px;
    margin-top:20px;
    text-align:right;
    font-weight:bold;
    border-radius:4px;
}

.iban {
    position:absolute;
    bottom:15px;
    left:28px;
    font-size:12px;
}

/* BOX */
.box{width:430px;margin:20px auto;background:#1a1a1a;padding:20px;border-radius:10px}
input,select,button{width:100%;padding:10px;margin-top:10px;border-radius:6px;border:none}
button{background:#00aa44;color:white;cursor:pointer}
button:hover{opacity:0.8}
.progress{margin-top:10px;background:#333;border-radius:8px;height:20px;overflow:hidden}
.progress-bar{height:100%;width:0%;background:orange}
.trans-item{padding:8px;border-bottom:1px solid #333;font-size:14px}
</style>
</head>
<body>

<div class="header">
    <div class="logo">
        <img src="assets/logo-banca.png" alt="Logo Banca" onclick="window.location.href='home.html'">
    </div>
    <div class="clock" id="clock"></div>
    <div class="menu">
        <div onclick="window.location.href='documento.html'">Documento</div>
        <div>Impostazioni</div>
    </div>
</div>

<!-- CARTA -->
<div class="card-container">
<div class="card" id="card">
    <div class="front">
        <div class="logo-italiarp">ITALIA RP</div>
        <div class="chip"></div>
        <div class="nfc"></div>
        <div class="card-number" id="cardNumber"></div>
        <div class="card-name" id="cardName"></div>
        <div class="card-iban-front">IT60X12345678901234567890</div>
    </div>
    <div class="back">
        <div class="stripe"></div>
        <div class="cvv-box">CVV <span id="cvv"></span></div>
        <div class="iban" id="iban"></div>
    </div>
</div>
</div>

<!-- SALDO -->
<div class="box">
<h3>Saldo</h3>
<div>Bank: € <span id="bank"></span></div>
<div>Cash: € <span id="cash"></span></div>
</div>

<!-- DEPOSITA / PRELEVA -->
<div class="box">
<h3>Deposita / Preleva</h3>
<select id="azione">
<option value="deposita">Deposita</option>
<option value="preleva">Preleva</option>
</select>
<input type="number" id="quantita" placeholder="Quantità">
<button onclick="eseguiOperazione()">Conferma</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
  authDomain: "sito-rp.firebaseapp.com",
  projectId: "sito-rp",
  storageBucket: "sito-rp.firebasestorage.app",
  messagingSenderId: "234781749995",
  appId: "1:234781749995:web:6954473363659fe38b04ae",
  measurementId: "G-R23N60PBYY"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let uid = sessionStorage.getItem("discord_uid");
if(!uid) window.location.href="index.html";

let userRef = doc(db,"users",uid);
let userData;

function generaNumero(l){let r='';for(let i=0;i<l;i++)r+=Math.floor(Math.random()*10);return r;}

async function caricaUtente(){
    let snap = await getDoc(userRef);
    if(!snap.exists()){
        userData = {
            bank:20000,
            cash:0,
            name:"UTENTE ITALIA",
            cardNumber:generaNumero(16),
            cvv:generaNumero(3),
            expire:"12/30",
            iban:"IT60X"+generaNumero(20)
        };
        await setDoc(userRef,userData);
    } else {userData = snap.data();}
    aggiornaUI();
}

function aggiornaUI(){
    document.getElementById("bank").innerText = userData.bank.toLocaleString();
    document.getElementById("cash").innerText = userData.cash.toLocaleString();
    document.getElementById("cardNumber").innerText = userData.cardNumber.match(/.{1,4}/g).join(" ");
    document.getElementById("cvv").innerText = userData.cvv;
    document.getElementById("expireDate").innerText = userData.expire;
    document.getElementById("iban").innerText = userData.iban;
    document.getElementById("cardName").innerText = userData.name.toUpperCase();
}

window.eseguiOperazione = async function(){
    let tipo = document.getElementById("azione").value;
    let q = parseInt(document.getElementById("quantita").value);
    if(q <= 0) return alert("Importo non valido");

    if(tipo==="deposita"){
        if(userData.cash < q) return alert("Cash insufficiente");
        userData.cash -= q; userData.bank += q;
    } else {
        if(userData.bank < q) return alert("Bank insufficiente");
        userData.bank -= q; userData.cash += q;
    }

    await updateDoc(userRef, {bank:userData.bank, cash:userData.cash});
    aggiornaUI();
}

setInterval(()=>{
    let now = new Date();
    document.getElementById("clock").innerText =
    now.getHours().toString().padStart(2,"0")+":"+
    now.getMinutes().toString().padStart(2,"0")+":"+
    now.getSeconds().toString().padStart(2,"0");
},1000);

const card = document.getElementById("card");
card.onclick = () => card.classList.toggle("flip");

caricaUtente();
</script>
</body>
</html>
