<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca RP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
/* === TUO CSS IDENTICO (NON TOCCATO) === */
body{
margin:0;
background:#161832;
font-family:Arial, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
padding-top:40px;
color:white;
}

/* CARD */
.card-container{width:420px;height:260px;perspective:1200px;margin-bottom:30px;}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.8s;cursor:pointer;}
.card.flip{transform:rotateY(180deg);}
.front,.back{
position:absolute;width:100%;height:100%;border-radius:20px;
backface-visibility:hidden;overflow:hidden;
box-shadow:0 35px 90px rgba(0,0,0,0.85),0 10px 20px rgba(0,0,0,0.5),inset 0 3px 8px rgba(255,255,255,0.25);
}
.front{background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a,#bcbcbc,#6a6a6a);}
.back{transform:rotateY(180deg);background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a,#bcbcbc,#6a6a6a);}

/* ELEMENTI */
.gold-bar{position:absolute;left:0;top:0;height:100%;width:55px;background:linear-gradient(180deg,#7a5a00,#d4af37,#ffd700,#cfa600,#7a5a00);}
.postepay{position:absolute;top:22px;left:75px;color:#ffd700;font-weight:900;font-size:28px;}
.evolution{position:absolute;top:58px;left:190px;color:#ffd700;font-size:13px;}
.chip{position:absolute;top:100px;left:75px;width:65px;}
.contactless{position:absolute;top:117px;left:130px;width:30px;}
.posteitaliane{position:absolute;top:117px;left:165px;font-size:19px;font-weight:900;}
.card-number{position:absolute;bottom:70px;left:75px;font-size:20px;letter-spacing:3px;font-weight:700;color:#f1f1f1;}
.expiry{position:absolute;bottom:22px;right:90px;color:#e6e6e6;text-align:right;}
.card-logo{position:absolute;bottom:20px;right:20px;width:55px;}
.rp-box{position:absolute;top:22px;right:20px;padding:6px 14px;border-radius:6px;background:rgba(0,0,0,0.35);color:white;font-weight:700;font-size:12px;}
.magnetic{position:absolute;top:25px;left:0;width:100%;height:45px;background:black;}
.name{position:absolute;top:95px;left:30px;font-weight:700;font-size:16px;color:#111;}
.cvv-bar{position:absolute;top:135px;left:30px;width:220px;height:35px;background:white;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-weight:bold;}
.iban{position:absolute;bottom:20px;left:30px;font-size:14px;font-weight:bold;color:#222;}

.balance-box{width:420px;background:#1f1f1f;border-radius:14px;padding:20px;}
.balance-row{display:flex;justify-content:space-between;padding:10px 0;font-size:18px;}
.amount{color:#ffd700;font-weight:bold;}
</style></head><body><div class="card-container">
<div class="card" id="card"><div class="front">
<div class="gold-bar"></div>
<div class="postepay">POSTEPAY</div>
<div class="evolution">evolution</div>
<img src="assets/chip.png" class="chip">
<img src="assets/contactless.png" class="contactless">
<div class="posteitaliane">POSTE ITALIANE</div>
<div class="rp-box">ITALIA RP</div><div class="card-number" id="numero"></div>
<div class="expiry"><div>VALID THRU</div><div id="scadenza"></div></div>
<div class="card-logo"><img src="assets/mastercard.png"></div>
</div><div class="back">
<div class="magnetic"></div>
<div class="name" id="nome"></div>
<div class="cvv-bar" id="cvv"></div>
<div class="iban" id="iban"></div>
</div></div>
</div><div class="balance-box">
<div class="balance-row"><span>BANCA</span><span id="banca" class="amount"></span></div>
<div class="balance-row"><span>CASH</span><span id="cash" class="amount"></span></div>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain:"sito-rp.firebaseapp.com",
projectId:"sito-rp"
});

const db = getFirestore(app);

const uid = sessionStorage.getItem("discord_uid");
const index = parseInt(sessionStorage.getItem("personaggio_index"));

let dati, personaggi;

async function carica(){
const snap = await getDoc(doc(db,"users",uid));
personaggi = snap.data().personaggi;
dati = personaggi[index];

if(!dati.carta){
dati.carta = generaCarta();
await salva();
}

aggiorna();
}

function generaCarta(){
return{
numero: "4"+Math.random().toString().slice(2,18).padEnd(16,"0").replace(/(.{4})/g,"$1 "),
cvv: Math.floor(100+Math.random()*900),
scadenza: "12/29",
iban: "IT"+Math.floor(Math.random()*999999999999999999)
};
}

function aggiorna(){
nome.innerText = dati.nome+" "+dati.cognome;
numero.innerText = dati.carta.numero;
cvv.innerText = dati.carta.cvv;
scadenza.innerText = dati.carta.scadenza;
iban.innerText = dati.carta.iban;

banca.innerText = "€"+dati.banca;
cash.innerText = "€"+dati.contanti;
}

async function salva(){
personaggi[index]=dati;
await updateDoc(doc(db,"users",uid),{personaggi});
}

card.onclick=()=>card.classList.toggle("flip");

carica();
</script></body>
</html>
