<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca RP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#161832;
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding-top:80px;
}

/* TOPBAR */
.topbar{
position:fixed;
top:0;
width:100%;
height:60px;
background:#0f1125;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
}
.logo{height:40px;cursor:pointer;}
.avatar{width:40px;height:40px;border-radius:50%;border:2px solid gold;}
.time{font-weight:bold;}

/* CARD */
.card-container{width:420px;height:260px;perspective:1000px;}
.card{width:100%;height:100%;transform-style:preserve-3d;transition:0.8s;}
.card.flip{transform:rotateY(180deg);}
.front,.back{
position:absolute;width:100%;height:100%;
border-radius:20px;backface-visibility:hidden;
background:linear-gradient(#666,#aaa);
}
.back{transform:rotateY(180deg);}
.name{position:absolute;top:100px;left:30px;color:black;font-weight:bold;}

/* SALDO */
.balance{margin-top:20px;width:420px;background:#222;padding:20px;border-radius:10px;}
.row{display:flex;justify-content:space-between;margin:10px 0;}
.amount{color:gold;font-weight:bold;}
</style>
</head>

<body>

<div class="topbar">
<img src="assets/logo.png" class="logo" onclick="location.href='home.html'">
<div id="orario" class="time"></div>
<img id="avatar" class="avatar" src="">
</div>

<div class="card-container">
<div class="card" onclick="this.classList.toggle('flip')">

<div class="front"></div>

<div class="back">
<div class="name" id="nomeCarta">--</div>
</div>

</div>
</div>

<div class="balance">
<div class="row">BANCA <span id="banca" class="amount">€0</span></div>
<div class="row">CASH <span id="cash" class="amount">€0</span></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"TUA_API_KEY",
authDomain:"TUO_DOMINIO",
projectId:"TUO_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = sessionStorage.getItem("discord_uid");
let index = parseInt(sessionStorage.getItem("personaggio_index"));

/* ===== CARICA DATI ===== */
async function carica(){

const ref = doc(db,"utenti",uid);
const snap = await getDoc(ref);

if(!snap.exists()){
console.log("Utente non trovato");
return;
}

const data = snap.data();

if(!data.personaggi || data.personaggi.length === 0){
console.log("Nessun personaggio");
return;
}

/* FIX INDEX */
if(isNaN(index) || index === null){
index = 0;
}

/* PRENDE PERSONAGGIO */
const p = data.personaggi[index];

if(!p){
console.log("Personaggio non trovato");
return;
}

/* ===== FIX SOLDI ===== */
let banca = p.banca ?? 0;

/* SUPPORTA cash E contanti */
let cash = p.cash ?? p.contanti ?? 0;

/* ===== UI ===== */
document.getElementById("nomeCarta").innerText = p.nome + " " + p.cognome;
document.getElementById("banca").innerText = "€" + banca;
document.getElementById("cash").innerText = "€" + cash;

console.log("CARICATO:", p);
}

/* ORARIO */
setInterval(()=>{
document.getElementById("orario").innerText=new Date().toLocaleTimeString();
},1000);

/* AVATAR */
let av=sessionStorage.getItem("discord_avatar");
if(av) document.getElementById("avatar").src=av;

/* START */
carica();

</script>

</body>
</html>
