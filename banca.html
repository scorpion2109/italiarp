```html
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP - Banca</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
color:white;

/* STESSO SFONDO DELLA HOME */
background:url("sfondo.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* ===== HEADER ===== */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#000000cc;
backdrop-filter:blur(10px);
}

.logo{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.logo img{
height:40px;
}

.clock{
font-weight:bold;
}

.menu{
display:flex;
gap:25px;
}

.menu div{
cursor:pointer;
}

/* ===== CARD ===== */

.card-container{
width:430px;
height:260px;
margin:80px auto;
perspective:2000px;
}

.card{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:1s;
cursor:pointer;
}

.card.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:18px;
backface-visibility:hidden;
padding:25px;
box-sizing:border-box;
box-shadow:0 30px 70px rgba(0,0,0,0.8);
}

/* ===== FRONTE ===== */

.front{
background:#ffd400;
color:#111;
}

/* banda dorata */

.gold-strip{
position:absolute;
left:0;
top:0;
width:90px;
height:100%;
background:linear-gradient(45deg,#b8962e,#e6c45f,#a68020);
border-top-left-radius:18px;
border-bottom-left-radius:18px;
}

.postepay{
position:absolute;
top:20px;
left:110px;
font-weight:bold;
font-size:22px;
}

.chip{
position:absolute;
top:70px;
left:110px;
width:65px;
height:45px;
border-radius:6px;
background:linear-gradient(135deg,#d4af37,#f7e27b,#b8860b);
box-shadow:inset 0 0 5px rgba(0,0,0,0.6);
}

.contactless{
position:absolute;
top:70px;
left:190px;
font-size:22px;
transform:rotate(90deg);
}

.poste{
position:absolute;
top:120px;
left:110px;
font-size:14px;
font-weight:bold;
}

.card-number{
position:absolute;
top:160px;
left:110px;
font-size:22px;
letter-spacing:3px;
font-weight:bold;
}

.expire{
position:absolute;
top:200px;
left:200px;
font-size:13px;
}

.iban-front{
position:absolute;
bottom:15px;
left:110px;
font-size:12px;
letter-spacing:2px;
font-weight:bold;
}

.mastercard{
position:absolute;
bottom:15px;
right:25px;
width:60px;
height:40px;
}

.m1,.m2{
position:absolute;
width:35px;
height:35px;
border-radius:50%;
}

.m1{
background:#eb001b;
left:0;
}

.m2{
background:#f79e1b;
right:0;
opacity:0.9;
}

/* ===== RETRO ===== */

.back{
background:#ffd400;
transform:rotateY(180deg);
}

.stripe{
background:black;
height:50px;
margin-top:30px;
border-radius:4px;
}

.cvv-box{
background:white;
width:80px;
padding:6px;
margin-top:25px;

/* ===== BOX ===== */

.box{

padding:20px;
border-radius:10px;

input,select,button{

}

}

</style>
</head>

<body>

<div class="header">

<div class="logo" onclick="window.location.href='home.html'">
<img src="logo-banca.png">
</div>

<div class="clock" id="clock"></div>

<div class="menu">
<div onclick="window.location.href='documento.html'">Documento</div>
<div>Impostazioni</div>
</div>

</div>


<div class="card-container">

<div class="card" id="card">

<div class="front">

<div class="gold-strip"></div>

<div class="postepay">POSTEPAY</div>

<div class="chip"></div>

<div class="contactless">)))</div>

<div class="poste">POSTE ITALIANE</div>

<div class="card-number" id="cardNumber"></div>

<div class="expire">
VALID THRU <span id="expireDate"></span>
</div>

<div class="iban-front" id="iban"></div>

<div class="mastercard">
<div class="m1"></div>
<div class="m2"></div>
</div>

</div>

<div class="back">

<div class="stripe"></div>

<div class="cvv-box">
CVV <span id="cvv"></span>
</div>

</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "APIKEY",
authDomain: "sito-rp.firebaseapp.com",
projectId: "sito-rp"

};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let uid=sessionStorage.getItem("discord_uid");

let userRef=doc(db,"users",uid);

function generaNumero(l){

let r='';
for(let i=0;i<l;i++) r+=Math.floor(Math.random()*10);

return r;

}

async function caricaUtente(){

let snap=await getDoc(userRef);

let user;

if(!snap.exists()){

user={
cardNumber:generaNumero(16),
cvv:generaNumero(3),
expire:"12/30",
iban:"IT60X"+generaNumero(20)
};

await setDoc(userRef,user);

}else{

user=snap.data();

}

document.getElementById("cardNumber").innerText=
user.cardNumber.match(/.{1,4}/g).join(" ");

document.getElementById("cvv").innerText=user.cvv;
document.getElementById("expireDate").innerText=user.expire;
document.getElementById("iban").innerText=user.iban;

}

caricaUtente();

/* FLIP CARD */

document.getElementById("card").onclick=()=>{

document.getElementById("card").classList.toggle("flip");

}

/* CLOCK */

setInterval(()=>{

let now=new Date();

document.getElementById("clock").innerText=

now.getHours().toString().padStart(2,"0")+":"+
now.getMinutes().toString().padStart(2,"0")+":"+
now.getSeconds().toString().padStart(2,"0");

},1000);

</script>

</body>
</html>
