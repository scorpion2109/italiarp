<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poste Italiane - ITALIA LP</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f0f0f;
  color:white;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#111;
}

.logo{
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
}

.clock{
  font-size:18px;
  font-weight:bold;
}

.menu{
  display:flex;
  gap:20px;
}

.menu span{
  cursor:pointer;
}

/* ===== CARD ===== */
.card-container{
  width:420px;
  height:250px;
  margin:60px auto;
  perspective:2000px;
}

.card{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
  cursor:pointer;
}

.card.flip{
  transform:rotateY(180deg);
}

.front, .back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  padding:25px;
  box-sizing:border-box;
  box-shadow:0 20px 50px rgba(0,0,0,0.8);
  overflow:hidden;
}

/* FRONT BLACK METAL */
.front{
  background:linear-gradient(135deg,#0f0f0f,#1c1c1c,#0a0a0a);
  position:relative;
}

.front::after{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:60%;
  height:100%;
  background:linear-gradient(120deg,
    rgba(255,255,255,0.05),
    rgba(255,255,255,0.3),
    rgba(255,255,255,0.05));
  transform:skewX(-25deg);
  animation:shine 4s infinite;
}

@keyframes shine{
  0%{ left:-100%; }
  100%{ left:150%; }
}

/* CHIP */
.chip{
  width:60px;
  height:45px;
  background:linear-gradient(135deg,#c8a95e,#f5d67b,#b9923d);
  border-radius:8px;
  box-shadow:inset 0 0 10px rgba(0,0,0,0.6);
}

/* TOP ROW */
.top-row{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
  font-weight:bold;
  letter-spacing:1px;
}

.brand{
  font-size:14px;
  opacity:0.8;
}

.logo-rp{
  font-size:14px;
}

/* CARD NUMBER */
.card-number{
  margin-top:40px;
  font-size:22px;
  letter-spacing:4px;
  font-weight:600;
}

/* BOTTOM */
.bottom-row{
  position:absolute;
  bottom:25px;
  left:25px;
  right:25px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
}

.expire span:first-child{
  font-size:10px;
  opacity:0.6;
}

.country{
  font-weight:bold;
  letter-spacing:2px;
}

/* BACK */
.back{
  background:#111;
  transform:rotateY(180deg);
}

.stripe{
  background:black;
  height:50px;
  margin-top:20px;
}

.cvv-box{
  background:white;
  color:black;
  width:80px;
  padding:5px;
  margin-top:20px;
  text-align:right;
  font-weight:bold;
}

.iban{
  position:absolute;
  bottom:20px;
  font-size:12px;
  letter-spacing:2px;
}

/* SALDO */
.balance{
  width:420px;
  margin:30px auto;
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" onclick="window.location.href='home.html'">
    POSTE ITALIANE
  </div>
  <div class="clock" id="clock"></div>
  <div class="menu">
    <span onclick="window.location.href='documento.html'">Documento</span>
    <span>Impostazioni</span>
  </div>
</div>

<div class="card-container">
  <div class="card" id="card">

    <div class="front">
      <div class="chip"></div>

      <div class="top-row">
        <div class="brand">POSTE ITALIANE</div>
        <div class="logo-rp">ITALIA LP</div>
      </div>

      <div class="card-number" id="cardNumber"></div>

      <div class="bottom-row">
        <div class="expire">
          <span>VALID THRU</span><br>
          <span id="expireDate"></span>
        </div>
        <div class="country">ITALIA</div>
      </div>
    </div>

    <div class="back">
      <div class="stripe"></div>
      <div class="cvv-box">
        CVV <span id="cvv"></span>
      </div>
      <div class="iban" id="iban"></div>
    </div>

  </div>
</div>

<div class="balance">
  <div>Bank: € <span id="bank"></span></div>
  <div>Cash: € <span id="cash"></span></div>
</div>

<script>
/* OROLOGIO */
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.getHours().toString().padStart(2,"0") + ":" +
    now.getMinutes().toString().padStart(2,"0") + ":" +
    now.getSeconds().toString().padStart(2,"0");
}
setInterval(updateClock,1000);
updateClock();

/* GENERAZIONE DATI */
function randomNumber(length){
  let result = '';
  for(let i=0;i<length;i++){
    result += Math.floor(Math.random()*10);
  }
  return result;
}

let cardNumber = randomNumber(16).match(/.{1,4}/g).join(" ");
let cvv = randomNumber(3);
let expire = "12/30";
let iban = "IT60X" + randomNumber(20);

document.getElementById("cardNumber").innerText = cardNumber;
document.getElementById("cvv").innerText = cvv;
document.getElementById("expireDate").innerText = expire;
document.getElementById("iban").innerText = iban;

/* SALDO INIZIALE */
let bank = 20000;
let cash = 0;

document.getElementById("bank").innerText = bank.toLocaleString();
document.getElementById("cash").innerText = cash.toLocaleString();

/* FLIP CARD */
document.getElementById("card").addEventListener("click",function(){
  this.classList.toggle("flip");
});
</script>

</body>
</html>
