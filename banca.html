<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Banca Italia RP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

background:url("assets/sfondo.webp");
background-size:cover;
background-position:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;

}

.container{

background:rgba(0,0,0,0.65);
backdrop-filter:blur(8px);
padding:30px;
border-radius:20px;
width:420px;

}

/* carta */

.card{

background:linear-gradient(135deg,#1f1f1f,#343434);
border-radius:15px;
padding:20px;
margin-bottom:20px;

}

.card h2{
font-size:20px;
margin-bottom:5px;
}

.saldi{
margin-top:10px;
font-size:18px;
}

/* azioni */

.actions{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;

}

button{

padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;

}

.deposit{background:#2ecc71}
.withdraw{background:#e74c3c}
.transfer{background:#3498db}
.loan{background:#f39c12}

input{

width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;

}

.storico{

margin-top:20px;
max-height:150px;
overflow:auto;
background:rgba(0,0,0,0.4);
padding:10px;
border-radius:10px;

}

.storico div{
font-size:14px;
margin-bottom:5px;
}

.home{

margin-top:15px;
background:#5865F2;
width:100%;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2 id="nome"></h2>

<div class="saldi">
🏦 Banca: <span id="banca">0</span> €
</div>

<div class="saldi">
💵 Contanti: <span id="contanti">0</span> €
</div>

</div>

<input type="number" id="importo" placeholder="Importo">

<div class="actions">

<button class="deposit" id="deposito">Deposito</button>
<button class="withdraw" id="prelievo">Prelievo</button>

<button class="transfer" id="bonifico">Bonifico</button>
<button class="loan" id="prestito">Prestito</button>

</div>

<div class="storico" id="storico"></div>

<button class="home" onclick="window.location.href='home.html'">
Torna alla Home
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain:"sito-rp.firebaseapp.com",
projectId:"sito-rp",
storageBucket:"sito-rp.appspot.com",
messagingSenderId:"234781749995",
appId:"1:234781749995:web:6954473363659fe38b04ae"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const uid=sessionStorage.getItem("discord_uid");
const index=sessionStorage.getItem("personaggio_index");

if(!uid || index===null){

window.location.href="index.html";

}

const ref=doc(db,"users",uid);
const snap=await getDoc(ref);

let lista=snap.data().personaggi || [];
let p=lista[index];

/* fix vecchi personaggi */

if(p.banca===undefined) p.banca=10000;
if(p.contanti===undefined) p.contanti=5000;
if(!p.storico) p.storico=[];

function aggiorna(){

document.getElementById("nome").innerText=
p.nome+" "+p.cognome;

document.getElementById("banca").innerText=p.banca;
document.getElementById("contanti").innerText=p.contanti;

let storicoHTML="";

p.storico.slice().reverse().forEach(s=>{

storicoHTML+="<div>"+s+"</div>";

});

document.getElementById("storico").innerHTML=storicoHTML;

}

aggiorna();

async function salva(){

lista[index]=p;

await setDoc(ref,{
personaggi:lista
},{merge:true});

}

/* deposito */

deposito.onclick=async()=>{

let v=Number(importo.value);

if(v>p.contanti) return alert("Contanti insufficienti");

p.contanti-=v;
p.banca+=v;

p.storico.push("Deposito "+v+"€");

await salva();

aggiorna();

};

/* prelievo */

prelievo.onclick=async()=>{

let v=Number(importo.value);

if(v>p.banca) return alert("Saldo insufficiente");

p.banca-=v;
p.contanti+=v;

p.storico.push("Prelievo "+v+"€");

await salva();

aggiorna();

};

/* bonifico */

bonifico.onclick=async()=>{

let v=Number(importo.value);

if(v>p.banca) return alert("Saldo insufficiente");

p.banca-=v;

p.storico.push("Bonifico inviato "+v+"€");

await salva();

aggiorna();

};

/* prestito */

prestito.onclick=async()=>{

let v=Number(importo.value);

p.banca+=v;

p.storico.push("Prestito ricevuto "+v+"€");

await salva();

aggiorna();

};

</script>

</body>
</html>
