<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca RP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#161832;
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding-top:90px;
padding-bottom:90px;
}

/* ===== TOPBAR ===== */
.topbar{
position:fixed;
top:0;
width:100%;
height:65px;
background:#0d0f24;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
z-index:1000;
}

.logo{height:40px;cursor:pointer;}

.time{font-weight:bold;}

.avatar{
width:42px;
height:42px;
border-radius:50%;
border:2px solid gold;
}

/* ===== CARTA ===== */
.card-container{
width:420px;
height:260px;
perspective:1200px;
}

.card{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:0.8s;
cursor:pointer;
}

.card.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
backface-visibility:hidden;
box-shadow:0 35px 90px rgba(0,0,0,0.8);
}

/* FRONT */
.front{
background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a,#bcbcbc,#6a6a6a);
}

.gold-bar{
position:absolute;
left:0;
top:0;
width:55px;
height:100%;
background:linear-gradient(#7a5a00,#ffd700,#7a5a00);
}

.postepay{
position:absolute;
top:20px;
left:75px;
color:#ffd700;
font-size:28px;
font-weight:bold;
}

.card-number{
position:absolute;
bottom:70px;
left:75px;
letter-spacing:3px;
font-size:20px;
}

.expiry{
position:absolute;
bottom:20px;
right:90px;
font-size:14px;
}

.card-logo{
position:absolute;
bottom:20px;
right:20px;
width:55px;
height:35px;
}

.card-logo::before,
.card-logo::after{
content:"";
position:absolute;
width:30px;
height:30px;
border-radius:50%;
}

.card-logo::before{background:red;}
.card-logo::after{background:orange;right:0;}

/* BACK */
.back{
transform:rotateY(180deg);
background:linear-gradient(135deg,#5f5f5f,#a0a0a0);
}

.magnetic{
position:absolute;
top:25px;
width:100%;
height:40px;
background:black;
}

.name{
position:absolute;
top:100px;
left:30px;
color:black;
font-weight:bold;
}

/* ===== BOTTOM BAR ===== */
.bottombar{
position:fixed;
bottom:0;
width:100%;
height:70px;
background:#0d0f24;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 20px rgba(0,0,0,0.5);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
cursor:pointer;
color:#ccc;
}

.nav-item:hover{
color:gold;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
<img src="assets/logo.png" class="logo" onclick="location.href='home.html'">
<div id="orario" class="time"></div>
<img id="avatar" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
</div>

<!-- CARTA -->
<div class="card-container">
<div class="card" onclick="this.classList.toggle('flip')">

<div class="front">
<div class="gold-bar"></div>
<div class="postepay">POSTEPAY</div>
<div class="card-number">1234 5678 9012 3456</div>
<div class="expiry">12/29</div>
<div class="card-logo"></div>
</div>

<div class="back">
<div class="magnetic"></div>
<div class="name" id="nomeCarta">Mario Rossi</div>
</div>

</div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar">

<div class="nav-item" onclick="location.href='home.html'">
🏠
Home
</div>

<div class="nav-item">
💳
Banca
</div>

<div class="nav-item">
👤
Profilo
</div>

</div>

<script>

/* ORARIO */
setInterval(()=>{
document.getElementById("orario").innerText =
new Date().toLocaleTimeString();
},1000);

/* TEST NOME */
document.getElementById("nomeCarta").innerText = "Mario Rossi";

</script>

</body>
</html>
