<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta RP</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#1a1a2e;
font-family:sans-serif;
}

/* CARTA */

.card{

width:420px;
height:260px;
border-radius:18px;
position:relative;
overflow:hidden;

/* grigio metallico */

background:
linear-gradient(
135deg,
#5e5e5e,
#9a9a9a,
#6e6e6e,
#b3b3b3,
#5f5f5f
);

box-shadow:
0 25px 60px rgba(0,0,0,0.8),
inset 0 2px 6px rgba(255,255,255,0.2);

}

/* STRISCIA ORO SINISTRA */

.gold-bar{

position:absolute;
left:0;
top:0;
height:100%;
width:50px;

background:
linear-gradient(
180deg,
#7a5a00,
#d4af37,
#ffd700,
#cfa600,
#7a5a00
);

box-shadow:
inset -3px 0 6px rgba(0,0,0,0.4);

}

</style>
</head>

<body>

<div class="card">
<div class="gold-bar"></div>
</div>

</body>
</html>
