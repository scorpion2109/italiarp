<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca RP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
padding-top:40px;
color:white;
position:relative;
min-height:100vh;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("sfondo.webp") center/cover no-repeat;
z-index:-2;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.8));
z-index:-1;
}

/* -------- CARTA (LA TUA ORIGINALE) -------- */

.card-container{
width:420px;
height:260px;
perspective:1200px;
margin-bottom:30px;
}

.card{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 0.8s;
cursor:pointer;
}

.card.flip{
transform:rotateY(180deg);
}

.front, .back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
backface-visibility:hidden;
overflow:hidden;
box-shadow:0 35px 90px rgba(0,0,0,0.85),
0 10px 20px rgba(0,0,0,0.5),
inset 0 3px 8px rgba(255,255,255,0.25);
}

.front::after,
.back::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
120deg,
rgba(255,255,255,0.25) 0%,
rgba(255,255,255,0.05) 40%,
transparent 60%
);
pointer-events:none;
}

.front{
background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a,#bcbcbc,#6a6a6a);
}

.gold-bar{
position:absolute;
left:0;
top:0;
height:100%;
width:55px;
background:linear-gradient(180deg,#7a5a00,#d4af37,#ffd700,#cfa600,#7a5a00);
}

.postepay{
position:absolute;
top:22px;
left:75px;
color:#ffd700;
font-weight:900;
font-size:28px;
}

.evolution{
position:absolute;
top:58px;
left:190px;
color:#ffd700;
font-size:13px;
}

.chip{
position:absolute;
top:100px;
left:75px;
width:65px;
}

.contactless{
position:absolute;
top:117px;
left:130px;
width:30px;
}

.posteitaliane{
position:absolute;
top:117px;
left:165px;
font-size:19px;
font-weight:900;
}

.poste{color:#cfcfcf;}
.italiane{color:#444;}

.card-number{
position:absolute;
bottom:70px;
left:75px;
font-size:20px;
letter-spacing:3px;
font-weight:700;
color:#f1f1f1;
text-shadow:1px 1px 0 #aaa,2px 2px 2px rgba(0,0,0,0.6);
}

.expiry{
position:absolute;
bottom:22px;
right:90px;
color:#e6e6e6;
text-align:right;
}

.expiry .label{font-size:9px;}
.expiry .date{font-size:16px;font-weight:bold;}

.card-logo{
position:absolute;
bottom:20px;
right:20px;
width:55px;
}

.card-logo img{width:100%;}

.rp-box{
position:absolute;
top:22px;
right:20px;
padding:6px 14px;
border-radius:6px;
background:rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.25);
color:white;
font-weight:700;
font-size:12px;
}

.back{
transform:rotateY(180deg);
background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a,#bcbcbc,#6a6a6a);
}

.magnetic{
position:absolute;
top:25px;
left:0;
width:100%;
height:45px;
background:black;
}

.name{
position:absolute;
top:95px;
left:30px;
font-weight:700;
font-size:16px;
color:#111;
text-shadow:1px 1px 0 #bbb,2px 2px 3px rgba(0,0,0,0.5);
}

.cvv-bar{
position:absolute;
top:135px;
left:30px;
width:220px;
height:35px;
background:white;
border-radius:4px;
display:flex;
align-items:center;
justify-content:flex-end;
padding-right:10px;
font-weight:bold;
letter-spacing:2px;
}

.iban{
position:absolute;
bottom:20px;
left:30px;
font-size:14px;
font-weight:bold;
color:#222;
}

/* SALDO */

.balance-box{
width:420px;
background:rgba(0,0,0,0.6);
border-radius:14px;
padding:20px;
margin-top:20px;
}

.balance-row{
display:flex;
justify-content:space-between;
padding:10px 0;
font-size:18px;
}

.amount{color:#ffd700;font-weight:bold;}

/* OPERAZIONI */

.operations{
width:420px;
display:flex;
flex-direction:column;
gap:15px;
margin-top:20px;
}

.operation-box{
background:rgba(0,0,0,0.6);
border-radius:12px;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

input,select{
padding:8px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#ffd700;
font-weight:bold;
cursor:pointer;
}

/* LISTA GIOCATORI */

#playerList{
max-height:120px;
overflow:auto;
background:rgba(0,0,0,0.7);
border-radius:6px;
}

.playerItem{
padding:8px;
cursor:pointer;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.playerItem:hover{
background:rgba(255,255,255,0.1);
}

/* STORICO */

.history-box{
width:420px;
margin-top:20px;
background:rgba(0,0,0,0.6);
border-radius:12px;
padding:15px;
max-height:250px;
overflow:auto;
}

.transazione{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
}

</style>
</head>

<body>

<!-- CARTA -->

<div class="card-container">
<div class="card" onclick="this.classList.toggle('flip')">

<div class="front">
<div class="gold-bar"></div>
<div class="postepay">POSTEPAY</div>
<div class="evolution">evolution</div>
<img src="assets/chip.png" class="chip">
<img src="assets/contactless.png" class="contactless">
<div class="posteitaliane"><span class="poste">POSTE</span><span class="italiane">ITALIANE</span></div>
<div class="rp-box">ITALIA RP</div>
<div class="card-number">1234 5678 9012 3456</div>
<div class="expiry"><div class="label">VALID THRU</div><div class="date">12/29</div></div>
<div class="card-logo"><img src="assets/mastercard.png"></div>
</div>

<div class="back">
<div class="magnetic"></div>
<div class="name">MARIO ROSSI</div>
<div class="cvv-bar">123</div>
<div class="iban">IT60 X054 2811 1010 0000 0123 456</div>
</div>

</div>
</div>

<!-- SALDO -->

<div class="balance-box">
<div class="balance-row"><span>BANCA</span><span id="banca" class="amount">€0</span></div>
<div class="balance-row"><span>CASH</span><span id="cash" class="amount">€0</span></div>
</div>

<!-- OPERAZIONI -->

<div class="operations">

<div class="operation-box">
<select id="tipo">
<option value="deposito">Deposito</option>
<option value="prelievo">Prelievo</option>
</select>
<input id="importo1" type="number" placeholder="Quantità">
<button onclick="operazione()">Conferma</button>
</div>

<div class="operation-box">
<input id="searchPlayer" placeholder="Cerca giocatore RP">
<div id="playerList"></div>
<input id="importo2" type="number" placeholder="Quantità">
<button onclick="bonifico()">Bonifico</button>
</div>

</div>

<div class="history-box">
<h3>Storico transazioni</h3>
<div id="storico"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, updateDoc, getDoc, collection, getDocs, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain:"sito-rp.firebaseapp.com",
projectId:"sito-rp",
storageBucket:"sito-rp.firebasestorage.app",
messagingSenderId:"234781749995",
appId:"1:234781749995:web:6954473363659fe38b04ae"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const userId="982317367596032010";
const userRef=doc(db,"users",userId);

let banca=0
let cash=0
let players=[]
let selectedPlayer=null

onSnapshot(userRef,(snap)=>{

let data=snap.data()

banca=data.bank||0
cash=data.cash||0

document.getElementById("banca").innerText="€"+banca
document.getElementById("cash").innerText="€"+cash

mostraStorico(data.transactions||[])

})

async function caricaGiocatori(){

const snapshot=await getDocs(collection(db,"users"))

snapshot.forEach(docSnap=>{

let data=docSnap.data()

if(data.personaggi){

data.personaggi.forEach(p=>{

players.push({
id:docSnap.id,
nome:p.nome+" "+p.cognome
})

})

}

})

}

caricaGiocatori()

document.getElementById("searchPlayer").addEventListener("input",function(){

let query=this.value.toLowerCase()
let lista=document.getElementById("playerList")

lista.innerHTML=""

players.filter(p=>p.nome.toLowerCase().includes(query)).forEach(p=>{

let div=document.createElement("div")

div.className="playerItem"
div.innerText=p.nome

div.onclick=()=>{
selectedPlayer=p
document.getElementById("searchPlayer").value=p.nome
lista.innerHTML=""
}

lista.appendChild(div)

})

})

window.operazione=async function(){

let tipo=document.getElementById("tipo").value
let importo=Number(document.getElementById("importo1").value)

if(importo<=0)return

if(tipo==="deposito"&&cash>=importo){
cash-=importo
banca+=importo
}

if(tipo==="prelievo"&&banca>=importo){
banca-=importo
cash+=importo
}

await updateDoc(userRef,{
bank:banca,
cash:cash,
transactions:arrayUnion({
tipo:tipo,
importo:importo,
data:Date.now()
})
})

}

window.bonifico=async function(){

if(!selectedPlayer)return

let importo=Number(document.getElementById("importo2").value)

if(importo<=0)return
if(banca<importo)return

const destRef=doc(db,"users",selectedPlayer.id)
const snap=await getDoc(destRef)

let destBank=snap.data().bank||0

banca-=importo
destBank+=importo

await updateDoc(userRef,{
bank:banca,
transactions:arrayUnion({
tipo:"bonifico inviato",
importo:importo,
a:selectedPlayer.nome,
data:Date.now()
})
})

await updateDoc(destRef,{
bank:destBank,
transactions:arrayUnion({
tipo:"bonifico ricevuto",
importo:importo,
da:userId,
data:Date.now()
})
})

notifica("Bonifico inviato")

}

function mostraStorico(lista){

let storico=document.getElementById("storico")
storico.innerHTML=""

lista.slice().reverse().forEach(t=>{

let div=document.createElement("div")
div.className="transazione"
div.innerHTML=`<span>${t.tipo}</span><span>€${t.importo}</span>`

storico.appendChild(div)

})

}

function notifica(testo){

let div=document.createElement("div")

div.style.position="fixed"
div.style.top="20px"
div.style.right="20px"
div.style.background="#ffd700"
div.style.color="black"
div.style.padding="10px 20px"
div.style.borderRadius="8px"
div.style.fontWeight="bold"

div.innerText=testo

document.body.appendChild(div)

setTimeout(()=>{div.remove()},4000)

}

</script>

</body>
                                            </html>
