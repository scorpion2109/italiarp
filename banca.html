<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banca RP</title>

<style>

/* BASE */
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* CONTAINER */
.main{
max-width:1200px;
margin:auto;
padding:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

/* -------- CARTA -------- */
.card-container{
perspective:1200px;
display:flex;
justify-content:center;
}

.card{
width:420px;
height:260px;
position:relative;
transform-style:preserve-3d;
transition:0.8s;
cursor:pointer;
}

.card.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
backface-visibility:hidden;
overflow:hidden;
box-shadow:0 25px 70px rgba(0,0,0,0.8);
}

/* FRONTE */
.front{
background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a,#bcbcbc,#6a6a6a);
}

.gold-bar{
position:absolute;
left:0;
top:0;
height:100%;
width:55px;
background:linear-gradient(180deg,#7a5a00,#ffd700,#7a5a00);
}

.postepay{
position:absolute;
top:22px;
left:75px;
color:#ffd700;
font-weight:900;
font-size:28px;
}

.card-number{
position:absolute;
bottom:70px;
left:75px;
font-size:20px;
letter-spacing:3px;
}

.expiry{
position:absolute;
bottom:20px;
right:90px;
}

.card-logo{
position:absolute;
bottom:20px;
right:20px;
width:60px;
}

.card-logo img{width:100%;}

/* RETRO */
.back{
transform:rotateY(180deg);
background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a);
}

.name{
position:absolute;
top:100px;
left:30px;
color:black;
font-weight:bold;
}

/* BOX */
.box{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
}

/* SOLDI */
.soldi{
display:flex;
justify-content:space-between;
font-size:22px;
margin-bottom:10px;
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#ffd700;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#e6c200;
}

</style>
</head>

<body>

<div class="main">

<div class="grid">

<!-- CARTA -->
<div class="card-container">
<div class="card" onclick="this.classList.toggle('flip')">

<div class="front">
<div class="gold-bar"></div>
<div class="postepay">POSTEPAY</div>
<div class="card-number">1234 5678 9012 3456</div>
<div class="expiry">12/29</div>
<div class="card-logo">
<img src="assets/mastercard.png">
</div>
</div>

<div class="back">
<div class="name" id="nomeCarta">NOME</div>
</div>

</div>
</div>

<!-- OPERAZIONI -->
<div class="box">

<div class="soldi">
<span>BANCA: €<span id="banca">0</span></span>
<span>CASH: €<span id="cash">0</span></span>
</div>

<h3>Operazioni</h3>

<select id="tipo">
<option value="deposito">Deposito</option>
<option value="prelievo">Prelievo</option>
</select>

<input id="importo" type="number" placeholder="Quantità">

<button onclick="operazione()">Conferma</button>

<h3>Bonifico</h3>

<input id="destinatario" placeholder="Nome Cognome">
<input id="importoBonifico" type="number" placeholder="Quantità">

<button onclick="bonifico()">Invia</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
  authDomain: "sito-rp.firebaseapp.com",
  projectId: "sito-rp",
  storageBucket: "sito-rp.firebasestorage.app",
  messagingSenderId: "234781749995",
  appId: "1:234781749995:web:6954473363659fe38b04ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DATI */
let banca = 0;
let cash = 0;

/* CARICA */
async function carica(){

const discordId = localStorage.getItem("discordId");
const index = parseInt(localStorage.getItem("personaggioIndex"));

if(!discordId || isNaN(index)){
alert("Non loggato");
return;
}

const ref = doc(db,"users",discordId);
const snap = await getDoc(ref);

if(!snap.exists()){
alert("Utente non trovato");
return;
}

let p = snap.data().personaggi[index];

banca = p.banca || 0;
cash = p.contanti || 0;

document.getElementById("banca").innerText = banca;
document.getElementById("cash").innerText = cash;

document.getElementById("nomeCarta").innerText =
(p.nome + " " + p.cognome).toUpperCase();

}

/* SALVA */
async function salva(){

const discordId = localStorage.getItem("discordId");
const index = parseInt(localStorage.getItem("personaggioIndex"));

const ref = doc(db,"users",discordId);
const snap = await getDoc(ref);

let data = snap.data();
let personaggi = data.personaggi;

personaggi[index].banca = banca;
personaggi[index].contanti = cash;

await updateDoc(ref,{personaggi});
}

/* OPERAZIONE */
window.operazione = async function(){

let tipo = document.getElementById("tipo").value;
let imp = parseInt(document.getElementById("importo").value);

if(!imp) return;

if(tipo==="deposito" && cash>=imp){
cash-=imp;
banca+=imp;
}

if(tipo==="prelievo" && banca>=imp){
banca-=imp;
cash+=imp;
}

document.getElementById("banca").innerText=banca;
document.getElementById("cash").innerText=cash;

await salva();

}

/* BONIFICO */
window.bonifico = async function(){

let nome = document.getElementById("destinatario").value;
let imp = parseInt(document.getElementById("importoBonifico").value);

if(!nome || !imp) return;

if(banca>=imp){
banca-=imp;
alert("Bonifico inviato a "+nome);
}

document.getElementById("banca").innerText=banca;

await salva();

}

/* INIT */
carica();

</script>

</body>
</html>
