<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca RP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:url("assets/sfondo.webp") center/cover no-repeat fixed;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
padding-top:40px;
color:white;
}

/* -------- CARTA -------- */

.card-container{
width:420px;
height:260px;
perspective:1200px;
margin-bottom:30px;
}

.card{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 0.8s;
cursor:pointer;
}

.card.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
backface-visibility:hidden;
overflow:hidden;
box-shadow:0 35px 90px rgba(0,0,0,0.85);
}

.front{
background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a,#bcbcbc,#6a6a6a);
}

.back{
transform:rotateY(180deg);
background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a,#bcbcbc,#6a6a6a);
}

.gold-bar{
position:absolute;
left:0;
top:0;
height:100%;
width:55px;
background:linear-gradient(180deg,#7a5a00,#d4af37,#ffd700,#cfa600,#7a5a00);
}

.postepay{
position:absolute;
top:22px;
left:75px;
color:#ffd700;
font-weight:900;
font-size:28px;
}

.evolution{
position:absolute;
top:58px;
left:190px;
color:#ffd700;
font-size:13px;
}

.chip{
position:absolute;
top:100px;
left:75px;
width:65px;
}

.contactless{
position:absolute;
top:117px;
left:130px;
width:30px;
}

.posteitaliane{
position:absolute;
top:117px;
left:165px;
font-size:19px;
font-weight:900;
}

.poste{color:#cfcfcf;}
.italiane{color:#444;}

.card-number{
position:absolute;
bottom:70px;
left:75px;
font-size:20px;
letter-spacing:3px;
font-weight:700;
color:#f1f1f1;
}

.expiry{
position:absolute;
bottom:22px;
right:90px;
color:#e6e6e6;
text-align:right;
}

.card-logo{
position:absolute;
bottom:20px;
right:20px;
width:55px;
}

.rp-box{
position:absolute;
top:22px;
right:20px;
padding:6px 14px;
border-radius:6px;
background:rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.25);
}

/* -------- SALDO -------- */

.balance-box{
width:420px;
background:#1f1f1f;
border-radius:14px;
padding:20px;
margin-top:20px;
}

.balance-row{
display:flex;
justify-content:space-between;
padding:10px 0;
font-size:18px;
}

.amount{
color:#ffd700;
font-weight:bold;
}

/* OPERAZIONI */

.operations{
width:420px;
display:flex;
gap:20px;
margin-top:20px;
}

.operation-box{
flex:1;
background:#222;
border-radius:12px;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

input,select{
padding:8px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#ffd700;
font-weight:bold;
cursor:pointer;
}

/* storico */

#storico div{
padding:6px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* fatture */

.fattura-item{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

#risultati{
background:#111;
max-height:120px;
overflow:auto;
}

.player{
padding:6px;
cursor:pointer;
}

.player:hover{
background:#333;
}

</style>
</head>

<body>

<!-- CARTA -->

<div class="card-container">
<div class="card" onclick="this.classList.toggle('flip')">

<div class="front">

<div class="gold-bar"></div>
<div class="postepay">POSTEPAY</div>
<div class="evolution">evolution</div>

<img src="assets/chip.png" class="chip">
<img src="assets/contactless.png" class="contactless">

<div class="posteitaliane">
<span class="poste">POSTE</span>
<span class="italiane">ITALIANE</span>
</div>

<div class="rp-box">ITALIA RP</div>

<div class="card-number">1234 5678 9012 3456</div>

<div class="expiry">
<div>VALID THRU</div>
<div>12/29</div>
</div>

<div class="card-logo">
<img src="assets/mastercard.png">
</div>

</div>

<div class="back">

<div class="magnetic"></div>

<div class="name" id="nomeCarta">Nome Cognome</div>

<div class="cvv-bar">123</div>

<div class="iban">IT60 RP00 0000 0000 0000</div>

</div>

</div>
</div>

<!-- SALDO -->

<div class="balance-box">

<div class="balance-row">
BANCA <span id="banca" class="amount">€0</span>
</div>

<div class="balance-row">
CASH <span id="cash" class="amount">€0</span>
</div>

</div>

<!-- OPERAZIONI -->

<div class="operations">

<div class="operation-box">

<select id="tipo">
<option value="deposito">Deposito</option>
<option value="prelievo">Prelievo</option>
</select>

<input id="importo1" type="number" placeholder="Quantità">

<button onclick="operazione()">Conferma</button>

</div>

<div class="operation-box">

<input id="ricerca" placeholder="Nome giocatore">

<div id="risultati"></div>

<input id="importoBonifico" type="number" placeholder="Quantità">

<button onclick="bonifico()">Conferma</button>

</div>

</div>

<!-- STORICO -->

<div class="balance-box">
<h3>Storico</h3>
<div id="storico"></div>
</div>

<!-- FATTURE -->

<div class="balance-box">
<h3>Fatture</h3>
<div id="fatture"></div>
</div>

<!-- MULTE -->

<div class="balance-box">
<h3>Multe</h3>
<div id="multe"></div>
</div>
