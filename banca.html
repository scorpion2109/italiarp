<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca RP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:url("sfondo.webp") center/cover no-repeat fixed;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
padding-top:40px;
color:white;
}

/* CARTA */

.card-container{
width:420px;
height:260px;
perspective:1200px;
margin-bottom:30px;
}

.card{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 0.8s;
cursor:pointer;
}

.card.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
backface-visibility:hidden;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.7);
}

.front{
background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a);
}

.back{
transform:rotateY(180deg);
background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a);
}

.name{
position:absolute;
top:95px;
left:30px;
font-weight:bold;
font-size:16px;
color:black;
}

.magnetic{
position:absolute;
top:25px;
left:0;
width:100%;
height:45px;
background:black;
}

/* SALDO */

.balance-box{
width:420px;
background:#1f1f1f;
border-radius:14px;
padding:20px;
margin-top:20px;
}

.balance-row{
display:flex;
justify-content:space-between;
padding:10px 0;
font-size:18px;
}

.amount{
color:#ffd700;
font-weight:bold;
}

/* OPERAZIONI */

.operations{
width:420px;
display:flex;
gap:20px;
margin-top:20px;
}

.operation-box{
flex:1;
background:#222;
border-radius:12px;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

input,select{
padding:8px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#ffd700;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#e6c200;
}

/* RISULTATI RICERCA */

#risultati{
max-height:120px;
overflow:auto;
background:#111;
border-radius:6px;
}

.player{
padding:6px;
cursor:pointer;
}

.player:hover{
background:#333;
}

/* STORICO */

#storico div{
padding:6px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* FATTURE */

.fattura-item{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

</style>
</head>

<body>

<!-- CARTA -->
<div class="card-container">
<div class="card" onclick="this.classList.toggle('flip')">

<div class="front">
<div class="name" id="nomeCarta">Nome</div>
</div>

<div class="back">
<div class="magnetic"></div>
</div>

</div>
</div>

<!-- SALDO -->

<div class="balance-box">
<div class="balance-row">BANCA <span id="banca" class="amount">€0</span></div>
<div class="balance-row">CASH <span id="cash" class="amount">€0</span></div>
</div>

<!-- OPERAZIONI -->

<div class="operations">

<div class="operation-box">

<select id="tipo">
<option value="deposito">Deposito</option>
<option value="prelievo">Prelievo</option>
</select>

<input id="importo1" type="number" placeholder="Quantità">

<button onclick="operazione()">Conferma</button>

</div>

<div class="operation-box">

<input id="ricerca" placeholder="Nome giocatore">

<div id="risultati"></div>

<input id="importoBonifico" type="number" placeholder="Quantità">

<button onclick="bonifico()">Conferma</button>

</div>

</div>

<!-- STORICO -->

<div class="balance-box">
<h3>Storico</h3>
<div id="storico"></div>
</div>

<!-- FATTURE -->

<div class="balance-box">
<h3>Fatture</h3>
<div id="fatture"></div>
</div>

<!-- MULTE -->

<div class="balance-box">
<h3>Multe</h3>
<div id="multe"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore,doc,getDoc,setDoc,getDocs,collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
  authDomain: "sito-rp.firebaseapp.com",
  projectId: "sito-rp",
  storageBucket: "sito-rp.firebasestorage.app",
  messagingSenderId: "234781749995",
  appId: "1:234781749995:web:6954473363659fe38b04ae",
  measurementId: "G-R23N60PBYY"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

/* caricamento personaggio */

let uid = localStorage.getItem("uid")
let index = localStorage.getItem("personaggio")

let p = {}
let userRef

async function carica(){

userRef = doc(db,"users",uid)

const snap = await getDoc(userRef)

let data = snap.data()

p = data.personaggi[index]

if(!p.storico) p.storico=[]
if(!p.fatture) p.fatture=[]
if(!p.multe) p.multe=[]
if(!p.ultimaTassa) p.ultimaTassa=0
if(!p.ultimoStipendio) p.ultimoStipendio=0

aggiorna()

tassaGiornaliera()
stipendioAutomatico()

}

function aggiorna(){

nomeCarta.innerText = p.nome+" "+p.cognome

banca.innerText = "€"+p.banca
cash.innerText = "€"+p.contanti

/* storico */

let h=""
p.storico.slice().reverse().forEach(s=>{
h+="<div>"+s+"</div>"
})
storico.innerHTML=h

/* fatture */

let f=""
p.fatture.forEach((x,i)=>{
f+=`<div class="fattura-item">${x.nome} €${x.importo}
<button onclick="pagaFattura(${i})">PAGA</button></div>`
})
fatture.innerHTML=f

/* multe */

let m=""
p.multe.forEach((x,i)=>{
m+=`<div class="fattura-item">${x.nome} €${x.importo}
<button onclick="pagaMulta(${i})">PAGA</button></div>`
})
multe.innerHTML=m

}

/* salva firebase */

async function salva(){

const snap = await getDoc(userRef)

let data = snap.data()

data.personaggi[index] = p

await setDoc(userRef,data)

}

/* deposito / prelievo */

window.operazione = async function(){

let tipo = tipo.value
let importo = Number(importo1.value)

if(tipo==="deposito" && p.contanti>=importo){

p.contanti -= importo
p.banca += importo
p.storico.push("💰 Deposito +"+importo+"€")

}

if(tipo==="prelievo" && p.banca>=importo){

p.banca -= importo
p.contanti += importo
p.storico.push("💵 Prelievo -"+importo+"€")

}

await salva()
aggiorna()

}

/* bonifico ricerca */

ricerca.oninput = async function(){

let testo = this.value.toLowerCase()

const query = await getDocs(collection(db,"users"))

let html=""

query.forEach(d=>{

let lista = d.data().personaggi||[]

lista.forEach((pers,i)=>{

let nome=(pers.nome+" "+pers.cognome).toLowerCase()

if(nome.includes(testo)){

html+=`<div class="player"
onclick="seleziona('${d.id}',${i},'${pers.nome} ${pers.cognome}')">
${pers.nome} ${pers.cognome}
</div>`

}

})

})

risultati.innerHTML=html

}

let destUID=null
let destIndex=null

window.seleziona=function(uid2,i,n){

destUID=uid2
destIndex=i

ricerca.value=n
risultati.innerHTML=""

}

/* bonifico */

window.bonifico = async function(){

let importo = Number(importoBonifico.value)

if(importo>p.banca) return alert("Saldo insufficiente")

p.banca -= importo
p.storico.push("🔁 Bonifico inviato -"+importo+"€")

await salva()

let ref = doc(db,"users",destUID)

let snap = await getDoc(ref)

let lista = snap.data().personaggi

lista[destIndex].banca += importo

if(!lista[destIndex].storico) lista[destIndex].storico=[]

lista[destIndex].storico.push("📥 Bonifico ricevuto +"+importo+"€")

await setDoc(ref,{personaggi:lista})

aggiorna()

}

/* fatture */

window.pagaFattura = async function(i){

let f = p.fatture[i]

if(p.banca < f.importo) return alert("Saldo insufficiente")

p.banca -= f.importo

p.storico.push("🧾 Fattura pagata -"+f.importo+"€")

p.fatture.splice(i,1)

await salva()
aggiorna()

}

/* multe */

window.pagaMulta = async function(i){

let m = p.multe[i]

if(p.banca < m.importo) return alert("Saldo insufficiente")

p.banca -= m.importo

p.storico.push("🚓 Multa pagata -"+m.importo+"€")

p.multe.splice(i,1)

await salva()
aggiorna()

}

/* tasse */

function percentuale(saldo){

if(saldo<5000) return 0
if(saldo<20000) return 0.01
if(saldo<50000) return 0.02
if(saldo<100000) return 0.03

return 0.05

}

async function tassaGiornaliera(){

let now = Date.now()

if(now-p.ultimaTassa < 86400000) return

let perc = percentuale(p.banca)

let tassa = Math.floor(p.banca*perc)

if(tassa>0){

p.banca -= tassa

p.storico.push("🧾 Tassa giornaliera -"+tassa+"€")

}

p.ultimaTassa = now

await salva()

}

/* stipendio */

async function stipendioAutomatico(){

let now = Date.now()

if(now-p.ultimoStipendio < 7200000) return

let lavoro = p.lavoro || "cittadino"

let stipendio = lavoro==="cittadino" ? 500 : 5000

p.banca += stipendio

p.storico.push("💼 Stipendio +"+stipendio+"€ ("+lavoro+")")

p.ultimoStipendio = now

await salva()

aggiorna()

}

carica()

</script>

</body>
</html>
