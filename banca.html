<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poste Italiane - Italia RP</title>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#111;color:white;display:flex;flex-direction:column;align-items:center;}

/* ===== HEADER ===== */
.header{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:10px 20px;background:rgba(20,20,20,0.6);backdrop-filter:blur(8px);
}
.header .logo img{width:50px;cursor:pointer;}
.header .clock{font-weight:bold;font-size:18px;}
.header .right-icons{display:flex;gap:15px;}
.header .right-icons img{width:35px;cursor:pointer;}

/* ===== CARTA ULTRA REALISTICA ===== */
.card-container{width:400px;margin:30px auto;perspective:2000px;}
.carta{width:100%;height:220px;border-radius:18px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:1s;}
.carta.flipped{transform:rotateY(180deg);}
.carta .fronte,.carta .retro{
  position:absolute;width:100%;height:100%;border-radius:18px;backface-visibility:hidden;padding:20px;box-sizing:border-box;
  font-family:'Arial',sans-serif;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

/* EFFETTO SHINE ANIMATO */
.carta .shine{
  position:absolute;width:50%;height:100%;top:0;left:-50%;
  background:linear-gradient(120deg,rgba(255,255,255,0.1),rgba(255,255,255,0.5),rgba(255,255,255,0.1));
  transform:skewX(-25deg);
  animation: shine 2s infinite;
}
@keyframes shine{
  0%{left:-50%;}
  100%{left:150%;}
}

/* FRONTE */
.carta .fronte{
  background:linear-gradient(135deg,#0073cf,#004a9f);
  color:white;display:flex;flex-direction:column;justify-content:space-between;
  position:relative;
}
.carta .fronte .top{display:flex;justify-content:space-between;align-items:center;}
.carta .fronte .cp{font-size:14px;color:gold;letter-spacing:1px;margin-top:5px;font-weight:bold;}
.carta .fronte .middle{margin-top:25px;}
.carta .fronte .code{font-size:22px;letter-spacing:3px;font-weight:bold;text-shadow:0 2px 3px black;}
.carta .fronte .expire{font-size:14px;margin-top:5px;}
.carta .fronte .bottom{display:flex;justify-content:space-between;align-items:center;font-weight:bold;font-size:16px;}
.carta .fronte .italia{letter-spacing:1px;}

/* RETRO */
.carta .retro{
  background:#222;color:white;transform:rotateY(180deg);border-radius:18px;
}
.carta .retro .banda{height:50px;background:black;margin-top:15px;border-radius:4px;}
.carta .retro .cvv{margin-top:15px;font-size:14px;}
.carta .retro .logo{width:60px;margin-top:15px;}
.carta .retro .iban{margin-top:auto;font-size:12px;letter-spacing:1px;padding-bottom:5px;}

/* SALDI E OPERAZIONI */
.saldo-box{width:400px;margin:auto;margin-top:20px;background:rgba(0,0,0,0.5);border-radius:10px;padding:15px;}
.saldo-box div{margin:5px 0;}
.operazioni{width:400px;margin:auto;margin-top:20px;display:flex;flex-direction:column;gap:10px;}
.operazioni input, .operazioni select{padding:8px;border-radius:6px;border:none;width:100%;}
.operazioni button{padding:8px;border:none;border-radius:6px;background:#00aa44;color:white;cursor:pointer;}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><img src="assets/logo-banca.png" alt="Poste Italiane" onclick="window.location.href='home.html'"></div>
  <div class="clock" id="clock"></div>
  <div class="right-icons">
      <img src="assets/documenti.png" alt="Documenti" title="Documenti">
      <img src="assets/impostazioni.png" alt="Impostazioni" title="Impostazioni">
  </div>
</div>

<div class="card-container">
  <div class="carta" id="carta">
    <div class="shine"></div>
    <!-- FRONTE -->
    <div class="fronte">
      <div class="top">
        <div>
          <div>POSTE ITALIANE</div>
          <div class="cp">CP: <span id="cardCP">5678</span></div>
        </div>
        <img src="assets/logo-banca.png" alt="Logo" style="width:50px;">
      </div>
      <div class="middle">
        <div class="code" id="cardCode">1234 5678 9012 3456</div>
        <div class="expire" id="cardExpire">12/30</div>
      </div>
      <div class="bottom">
        <div></div>
        <div class="italia">ITALIA</div>
      </div>
    </div>
    <!-- RETRO -->
    <div class="retro">
      <div class="banda"></div>
      <div class="cvv">CVV: <span id="cardCVV">123</span></div>
      <img class="logo" src="assets/logo-banca.png" alt="Logo">
      <div class="iban" id="cardIBAN">IT00 0000 0000 0000 0000 0000</div>
    </div>
  </div>
</div>

<div class="saldo-box">
  <div>Cash: €<span id="cash">0</span></div>
  <div>Banca: €<span id="bank">0</span></div>
  <div>Totale: €<span id="totale">0</span></div>
</div>

<div class="operazioni">
  <h4>Prelievo / Deposito</h4>
  <input type="number" id="prelievoInput" placeholder="Importo da prelevare (cash)">
  <button id="prelevaBtn">Preleva</button>

  <input type="number" id="depositoInput" placeholder="Importo da depositare (bank)">
  <button id="depositaBtn">Deposita</button>

  <h4>Bonifico</h4>
  <select id="destinatario"></select>
  <input type="number" id="bonificoImporto" placeholder="Importo bonifico">
  <button id="bonificoBtn">Invia Bonifico</button>

  <h4>Prestito (max 100.000€)</h4>
  <input type="number" id="prestitoInput" placeholder="Importo prestito">
  <button id="prestitoBtn">Richiedi Prestito</button>
</div>

<script type="module">
// Firebase e dati utente simile alla versione precedente
</script>

<script>
// Flip carta
const carta = document.getElementById("carta");
carta.onclick = ()=>carta.classList.toggle("flipped");

// Orologio
function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerText = now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0")+":"+now.getSeconds().toString().padStart(2,"0");
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
