<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Carta RP Banca</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#161832;
font-family:Arial, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
padding-top:80px;
color:white;
}

/* ===== TOPBAR ===== */
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:#0f1125;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
box-shadow:0 5px 20px rgba(0,0,0,0.6);
z-index:999;
}
.logo{height:40px;cursor:pointer;}
.time{font-size:18px;font-weight:bold;}
.avatar{width:40px;height:40px;border-radius:50%;border:2px solid #ffd700;cursor:pointer;}

/* ===== CARTA ===== */
.card-container{width:420px;height:260px;perspective:1200px;margin-bottom:30px;}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:0.8s;cursor:pointer;}
.card.flip{transform:rotateY(180deg);}
.front,.back{
position:absolute;width:100%;height:100%;
border-radius:20px;backface-visibility:hidden;
box-shadow:0 35px 90px rgba(0,0,0,0.85);
overflow:hidden;
}
.front{background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a,#bcbcbc,#6a6a6a);}
.back{transform:rotateY(180deg);background:linear-gradient(135deg,#5f5f5f,#a0a0a0,#7a7a7a,#bcbcbc,#6a6a6a);}

.gold-bar{position:absolute;left:0;top:0;width:55px;height:100%;background:linear-gradient(#7a5a00,#ffd700);}
.postepay{position:absolute;top:22px;left:75px;color:#ffd700;font-size:28px;font-weight:900;}
.chip{position:absolute;top:100px;left:75px;width:65px;}
.card-number{position:absolute;bottom:70px;left:75px;color:#fff;font-size:20px;}
.card-logo{position:absolute;bottom:20px;right:20px;width:55px;}

.name{position:absolute;top:95px;left:30px;font-weight:700;color:#111;}
.iban{position:absolute;bottom:20px;left:30px;color:#222;}

/* ===== SALDO ===== */
.balance-box{width:420px;background:#1f1f1f;border-radius:14px;padding:20px;}
.balance-row{display:flex;justify-content:space-between;padding:10px 0;}
.amount{color:#ffd700;font-weight:bold;}

/* ===== OPERAZIONI ===== */
.operations{width:420px;display:flex;gap:20px;margin-top:20px;}
.operation-box{flex:1;background:#222;padding:15px;border-radius:12px;display:flex;flex-direction:column;gap:10px;}
button{background:#ffd700;border:none;padding:10px;border-radius:6px;cursor:pointer;}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
<img src="assets/logo.png" class="logo" onclick="window.location.href='home.html'">
<div id="orario" class="time"></div>
<img id="avatar" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
</div>

<!-- CARTA -->
<div class="card-container">
<div class="card" onclick="this.classList.toggle('flip')">

<div class="front">
<div class="gold-bar"></div>
<div class="postepay">POSTEPAY</div>
<img src="assets/chip.png" class="chip">
<div class="card-number">1234 5678 9012 3456</div>
<div class="card-logo"><img src="assets/mastercard.png"></div>
</div>

<div class="back">
<div class="name" id="nomeCarta">--</div>
<div class="iban">IT60 X054 2811 1010</div>
</div>

</div>
</div>

<!-- SALDO -->
<div class="balance-box">
<div class="balance-row">BANCA <span id="banca" class="amount">€0</span></div>
<div class="balance-row">CASH <span id="cash" class="amount">€0</span></div>
</div>

<!-- OPERAZIONI -->
<div class="operations">

<div class="operation-box">
<select id="tipo">
<option value="deposito">Deposito</option>
<option value="prelievo">Prelievo</option>
</select>
<input id="importo1" type="number" placeholder="Importo">
<button onclick="operazione()">OK</button>
</div>

<div class="operation-box">
<select id="destinatario"></select>
<input id="importo2" type="number" placeholder="Importo">
<button onclick="bonifico()">INVIA</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
  authDomain: "sito-rp.firebaseapp.com",
  projectId: "sito-rp",
  storageBucket: "sito-rp.firebasestorage.app",
  messagingSenderId: "234781749995",
  appId: "1:234781749995:web:6954473363659fe38b04ae",
  measurementId: "G-R23N60PBYY"
};https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = sessionStorage.getItem("discord_uid");
const index = parseInt(sessionStorage.getItem("personaggio_index"));

let banca=0;
let cash=0;

/* CARICA DATI REALI */
async function carica(){

const ref=doc(db,"utenti",uid);
const snap=await getDoc(ref);

if(!snap.exists()) return;

const data=snap.data();
const p=data.personaggi[index];

banca = p.banca ?? 20000;
cash = p.cash ?? 5000;

/* NOME CARTA */
document.getElementById("nomeCarta").innerText = p.nome + " " + p.cognome;

/* UI */
document.getElementById("banca").innerText="€"+banca;
document.getElementById("cash").innerText="€"+cash;

}

/* SALVA */
async function salva(){
const ref=doc(db,"utenti",uid);
const snap=await getDoc(ref);
let data=snap.data();

data.personaggi[index].banca=banca;
data.personaggi[index].cash=cash;

await updateDoc(ref,{personaggi:data.personaggi});
}

/* DEPOSITO / PRELIEVO */
window.operazione=async function(){
let tipo=document.getElementById("tipo").value;
let imp=parseInt(document.getElementById("importo1").value);
if(!imp) return;

if(tipo==="deposito" && cash>=imp){cash-=imp;banca+=imp;}
if(tipo==="prelievo" && banca>=imp){banca-=imp;cash+=imp;}

await salva();
carica();
}

/* BONIFICO REALE */
window.bonifico=async function(){
let v=document.getElementById("destinatario").value;
let imp=parseInt(document.getElementById("importo2").value);
if(!v||!imp||banca<imp)return;

const [u,i]=v.split("|");

const refM=doc(db,"utenti",uid);
const refD=doc(db,"utenti",u);

let m=(await getDoc(refM)).data();
let d=(await getDoc(refD)).data();

m.personaggi[index].banca-=imp;
d.personaggi[i].banca=(d.personaggi[i].banca||0)+imp;

await updateDoc(refM,{personaggi:m.personaggi});
await updateDoc(refD,{personaggi:d.personaggi});

alert("Bonifico inviato!");
carica();
}

/* UTENTI LIVE */
function utenti(){
onSnapshot(collection(db,"utenti"),snap=>{
const sel=document.getElementById("destinatario");
sel.innerHTML="";
snap.forEach(docu=>{
docu.data().personaggi.forEach((p,i)=>{
if(docu.id===uid && i===index) return;
let o=document.createElement("option");
o.value=docu.id+"|"+i;
o.textContent=p.nome+" "+p.cognome;
sel.appendChild(o);
});
});
});
}

/* ORARIO */
setInterval(()=>{
document.getElementById("orario").innerText=new Date().toLocaleTimeString();
},1000);

/* AVATAR */
let av=sessionStorage.getItem("discord_avatar");
if(av) document.getElementById("avatar").src=av;

carica();
utenti();

</script>

</body>
</html>
