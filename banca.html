<!-- 🔽 LASCIA TUTTO IL TUO HTML/CSS UGUALE FINO A <script> --><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDgNJwxV81Q9qgTjRKODsBGis1tBvy3RMM",
authDomain:"sito-rp.firebaseapp.com",
projectId:"sito-rp"
});

const db = getFirestore(app);

const uid = sessionStorage.getItem("discord_uid");
const index = parseInt(sessionStorage.getItem("personaggio_index"));

let dati, personaggi;

/* ===== CARICA DATI ===== */
async function carica(){

const snap = await getDoc(doc(db,"users",uid));

if(!snap.exists()){
alert("Errore utente");
return;
}

personaggi = snap.data().personaggi;
dati = personaggi[index];

/* CREA CARTA SE NON ESISTE */
if(!dati.carta){
dati.carta = {
numero: generaNumero(),
cvv: generaCVV(),
scadenza: generaScadenza(),
iban: generaIBAN()
};
await salva();
}

/* AGGIORNA UI */
document.querySelector(".card-number").innerText = dati.carta.numero;
document.querySelector(".date").innerText = dati.carta.scadenza;
document.querySelector(".name").innerText = dati.nome + " " + dati.cognome;
document.querySelector(".cvv-bar").innerText = dati.carta.cvv;
document.querySelector(".iban").innerText = dati.carta.iban;

document.getElementById("banca").innerText = "€" + dati.banca;
document.getElementById("cash").innerText = "€" + dati.contanti;

}

carica();

/* ===== GENERATORI ===== */

function generaNumero(){
let n="";
for(let i=0;i<16;i++){
n+=Math.floor(Math.random()*10);
if((i+1)%4===0 && i!==15) n+=" ";
}
return n;
}

function generaCVV(){
return Math.floor(100+Math.random()*900);
}

function generaScadenza(){
let m = Math.floor(Math.random()*12)+1;
let y = new Date().getFullYear()+3;
return m.toString().padStart(2,"0")+"/"+y.toString().slice(2);
}

function generaIBAN(){
return "IT"+Math.floor(Math.random()*999999999999999999);
}

/* ===== SALVA ===== */

async function salva(){
personaggi[index] = dati;
await updateDoc(doc(db,"users",uid),{
personaggi:personaggi
});
}

/* ===== OPERAZIONE ===== */

window.operazione = async ()=>{

let tipo = document.getElementById("tipo").value;
let importo = parseInt(document.getElementById("importo1").value);

if(!importo || importo <= 0) return;

if(tipo==="deposito"){
if(importo > dati.contanti) return alert("Non hai contanti");
dati.contanti -= importo;
dati.banca += importo;
}

if(tipo==="prelievo"){
if(importo > dati.banca) return alert("Saldo insufficiente");
dati.banca -= importo;
dati.contanti += importo;
}

await salva();
carica();

};

/* ===== FLIP CARTA ===== */
document.querySelector(".card").onclick = function(){
this.classList.toggle("flip");
};

    </script>
