<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca - Italia RP</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("sfondo.jpg");
background-size:cover;
color:white;
}

/* NAVBAR */

.navbar{
background:#0a0a0a;
padding:15px 30px;
display:flex;
align-items:center;
}

.logo{
width:160px;
height:40px;
background:#222;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
font-weight:bold;
}

/* CONTENUTO */

.container{
display:flex;
justify-content:center;
margin-top:80px;
}

/* CARTA */

.card{
width:420px;
height:250px;
border-radius:18px;
padding:25px;
background:linear-gradient(135deg,#1f1f1f,#0d0d0d);
box-shadow:0 10px 30px rgba(0,0,0,0.8);
position:relative;
}

/* CHIP */

.chip{
width:60px;
height:45px;
background:linear-gradient(145deg,#d4af37,#b8962e);
border-radius:8px;
margin-top:20px;
box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
position:relative;
}

.chip:before,
.chip:after{
content:"";
position:absolute;
background:#a8892b;
}

.chip:before{
width:100%;
height:2px;
top:50%;
}

.chip:after{
height:100%;
width:2px;
left:50%;
}

/* LOGO BANCA */

.bank{
position:absolute;
top:20px;
right:25px;
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

/* NOME */

.name{
position:absolute;
top:80px;
left:25px;
font-size:18px;
letter-spacing:2px;
}

/* IBAN */

.iban{
position:absolute;
bottom:20px;
left:25px;
font-size:16px;
letter-spacing:2px;
}

/* RETRO */

.card-back{
width:420px;
height:250px;
border-radius:18px;
background:#eaeaea;
margin-left:40px;
position:relative;
overflow:hidden;
}

.black-strip{
height:50px;
background:black;
margin-top:20px;
}

.cvv-box{
background:white;
width:90%;
height:40px;
margin:40px auto;
display:flex;
align-items:center;
justify-content:flex-end;
padding-right:20px;
font-size:18px;
letter-spacing:3px;
}

.exp{
position:absolute;
bottom:25px;
right:30px;
font-size:16px;
color:black;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">LOGO BANCA</div>
</div>

<div class="container">

<!-- FRONTE -->

<div class="card">

<div class="bank">ITALIA RP</div>

<div class="chip"></div>

<div class="name" id="nomeCarta">
Mario Rossi
</div>

<div class="iban">
IT60 X054 2811 1010 0000 0123 456
</div>

</div>

<!-- RETRO -->

<div class="card-back">

<div class="black-strip"></div>

<div class="cvv-box">
123
</div>

<div class="exp">
12/30
</div>

</div>

</div>

</body>
</html>
