<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta RP</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#1a1a2e;
font-family:Arial, sans-serif;
}

/* CARTA */

.card{
width:420px;
height:260px;
border-radius:18px;
position:relative;
overflow:hidden;

background:
linear-gradient(
135deg,
#5e5e5e,
#9a9a9a,
#6e6e6e,
#b3b3b3,
#5f5f5f
);

box-shadow:
0 25px 60px rgba(0,0,0,0.8),
inset 0 2px 6px rgba(255,255,255,0.2);
}

/* BARRA ORO */

.gold-bar{
position:absolute;
left:0;
top:0;
height:100%;
width:50px;

background:
linear-gradient(
180deg,
#7a5a00,
#d4af37,
#ffd700,
#cfa600,
#7a5a00
);

box-shadow:
inset -3px 0 6px rgba(0,0,0,0.4);
}

/* POSTEPAY */

.postepay{
position:absolute;
top:20px;
left:70px;
color:#ffd700;
font-weight:800;
font-size:26px;
letter-spacing:1px;
}

.evolution{
position:absolute;
top:50px;
left:72px;
color:#ffd700;
font-size:12px;
letter-spacing:1px;
}

/* CHIP */

.chip{
position:absolute;
top:90px;
left:70px;

width:60px;
height:42px;
border-radius:6px;

background:
linear-gradient(
135deg,
#d4af37,
#f7e27b,
#b8860b
);

box-shadow:
inset 0 0 6px rgba(0,0,0,0.6),
0 3px 6px rgba(0,0,0,0.4);
}

/* CONTACTLESS */

.contactless{
position:absolute;
top:100px;
left:150px;
font-size:28px;
color:#ffffff;
opacity:0.9;
}

/* BOX ITALIA RP */

.rp-box{
position:absolute;
top:18px;
right:20px;
padding:6px 14px;
border-radius:6px;

background:rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.25);

color:white;
font-weight:700;
font-size:12px;
letter-spacing:1px;
}

</style>
</head>

<body>

<div class="card">

<div class="gold-bar"></div>

<div class="postepay">POSTEPAY</div>
<div class="evolution">evolution</div>

<div class="chip"></div>

<div class="contactless">)))</div>

<div class="rp-box">ITALIA RP</div>

</div>

</body>
</html>
