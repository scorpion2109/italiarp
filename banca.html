```html
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Banca - Italia RP</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("sfondo.jpg");
background-size:cover;
color:white;
}

/* NAVBAR */

.navbar{
background:#0b0b0b;
padding:15px 30px;
display:flex;
align-items:center;
}

.logo{
width:160px;
height:40px;
background:#222;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
font-weight:bold;
}

/* CONTENITORE */

.container{
display:flex;
justify-content:center;
margin-top:100px;
}

/* CARTA */

.card-container{
width:420px;
height:260px;
perspective:1000px;
cursor:pointer;
}

.card{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 0.8s;
}

.card.flipped{
transform:rotateY(180deg);
}

/* LATO CARTA */

.card-face{
position:absolute;
width:100%;
height:100%;
border-radius:18px;
backface-visibility:hidden;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

/* FRONTE */

.card-front{
background:linear-gradient(135deg,#2b2b2b,#0f0f0f);
padding:25px;
position:relative;
}

/* CHIP REALISTICO */

.chip{
width:65px;
height:45px;
background:linear-gradient(145deg,#d4af37,#b8962e);
border-radius:8px;
margin-top:20px;
position:relative;
box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

.chip:before{
content:"";
position:absolute;
width:100%;
height:2px;
top:50%;
background:#9c7c1f;
}

.chip:after{
content:"";
position:absolute;
height:100%;
width:2px;
left:50%;
background:#9c7c1f;
}

/* LOGO */

.bank{
position:absolute;
top:20px;
right:25px;
font-size:22px;
font-weight:bold;
letter-spacing:3px;
}

/* NOME */

.name{
position:absolute;
top:100px;
left:25px;
font-size:20px;
letter-spacing:2px;
}

/* IBAN */

.iban{
position:absolute;
bottom:20px;
left:25px;
font-size:16px;
letter-spacing:2px;
}

/* RETRO */

.card-back{
background:#f1f1f1;
transform:rotateY(180deg);
color:black;
}

/* STRISCIA NERA */

.black-strip{
height:60px;
background:black;
margin-top:20px;
}

/* AREA FIRMA */

.signature{
background:white;
width:85%;
height:40px;
margin:30px auto;
display:flex;
align-items:center;
justify-content:flex-end;
padding-right:20px;
font-size:18px;
letter-spacing:3px;
}

/* SCADENZA */

.exp{
position:absolute;
bottom:20px;
right:30px;
font-size:16px;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">LOGO BANCA</div>
</div>

<div class="container">

<div class="card-container" onclick="flipCard()">

<div class="card" id="card">

<!-- FRONTE -->

<div class="card-face card-front">

<div class="bank">ITALIA RP</div>

<div class="chip"></div>

<div class="name">
Mario Rossi
</div>

<div class="iban">
IT60 X054 2811 1010 0000 0123 456
</div>

</div>

<!-- RETRO -->

<div class="card-face card-back">

<div class="black-strip"></div>

<div class="signature">
123
</div>

<div class="exp">
12/30
</div>

</div>

</div>
</div>

</div>

<script>

function flipCard(){
document.getElementById("card").classList.toggle("flipped");
}

</script>

</body>
</html>
```
