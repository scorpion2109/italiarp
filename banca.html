<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta RP</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#161832;
font-family:Arial, sans-serif;
}

.card{
width:420px;
height:260px;
border-radius:20px;
position:relative;
overflow:hidden;

background:linear-gradient(
135deg,
#5f5f5f,
#a0a0a0,
#7a7a7a,
#bcbcbc,
#6a6a6a
);

box-shadow:
0 30px 80px rgba(0,0,0,0.8),
inset 0 2px 6px rgba(255,255,255,0.2);
}

/* barra oro */
.gold-bar{
position:absolute;
left:0;
top:0;
height:100%;
width:55px;

background:linear-gradient(
180deg,
#7a5a00,
#d4af37,
#ffd700,
#cfa600,
#7a5a00
);
}

/* POSTEPAY */
.postepay{
position:absolute;
top:22px;
left:75px;
color:#ffd700;
font-weight:900;
font-size:28px;
letter-spacing:1px;
}

/* evolution */
.evolution{
position:absolute;
top:58px;
left:190px;
color:#ffd700;
font-size:13px;
letter-spacing:1px;
}

/* chip */
.chip{
position:absolute;
top:100px;
left:75px;
width:65px;
}

/* contactless */
.contactless{
position:absolute;
top:117px;
left:130px;
width:30px;
}

/* POSTEITALIANE */
.posteitaliane{
position:absolute;
top:117px;
left:165px;
font-size:19px;
font-weight:900;
letter-spacing:1px;
}

.posteitaliane .poste{
color:#cfcfcf;
}

.posteitaliane .italiane{
color:#444;
}

/* NUMERO CARTA */
.card-number{
position:absolute;
bottom:60px;
left:75px;
font-size:20px;
letter-spacing:3px;
font-weight:bold;
color:#e6e6e6;
}

/* LOGO CARTA */
.card-logo{
position:absolute;
bottom:20px;
right:20px;
width:55px;
}

.card-logo img{
width:100%;
}

/* ITALIA RP */
.rp-box{
position:absolute;
top:22px;
right:20px;
padding:6px 14px;
border-radius:6px;

background:rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.25);

color:white;
font-weight:700;
font-size:12px;
letter-spacing:1px;
}

</style>
</head>

<body>

<div class="card">

<div class="gold-bar"></div>

<div class="postepay">POSTEPAY</div>
<div class="evolution">evolution</div>

<img src="assets/chip.png" class="chip">
<img src="assets/contactless.png" class="contactless">

<div class="posteitaliane">
<span class="poste">POSTE</span><span class="italiane">ITALIANE</span>
</div>

<div class="rp-box">ITALIA RP</div>

<!-- NUMERO CARTA -->
<div class="card-number">
1234 5678 9012 3456
</div>

<!-- LOGO CARTA -->
<div class="card-logo">
<img src="assets/mastercard.png">
</div>

</div>

</body>
</html>
