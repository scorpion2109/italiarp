<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Avatar</title>

<style>
body{
margin:0;
background:#0c0c0f;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

.top{
height:60px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
}

iframe{
flex:1;
border:none;
}

button{
padding:12px;
background:#00ffd5;
border:none;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="top">
<button onclick="salvaAvatar()">Salva Avatar</button>
</div>

<!-- CREATOR 3D -->
<iframe id="frame"
src="https://demo.readyplayer.me/avatar?frameApi"></iframe>

<script>

/* RICEVE AVATAR */
window.addEventListener("message",(event)=>{

if(event.data?.source !== "readyplayerme") return;

if(event.data.eventName === "v1.avatar.exported"){

const url = event.data.data.url;

console.log("Avatar creato:", url);

/* SALVA */
sessionStorage.setItem("avatar_url", url);

/* TORNA ALLA HOME */
alert("Avatar salvato!");

window.location.href="home.html";

}

});

/* SALVA MANUALE */
function salvaAvatar(){
alert("Finisci di creare avatar prima!");
}

</script>

</body>
</html>
