<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator RP</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0c0c0f;
color:white;
display:flex;
height:100vh;
}

/* SINISTRA */
.left{
width:40%;
padding:20px;
background:#121217;
overflow-y:auto;
}

/* DESTRA */
.right{
flex:1;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle,#1a1a1f,#000);
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#1a1a1f;
color:white;
}

/* AVATAR */
.avatar{
width:250px;
height:350px;
position:relative;
transition:0.3s;
}

/* TESTA */
.head{
width:200px;
height:200px;
border-radius:50%;
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
background:#f1c27d;
}

/* OCCHI */
.eye{
width:20px;
height:20px;
border-radius:50%;
position:absolute;
top:80px;
background:black;
}

.eye.left{left:60px;}
.eye.right{right:60px;}

/* CAPELLI */
.hair{
position:absolute;
top:-20px;
width:100%;
height:120px;
border-radius:50%;
background:black;
}

/* BARBA */
.beard{
position:absolute;
bottom:-10px;
width:100%;
height:80px;
border-radius:50%;
background:black;
display:none;
}

/* CORPO */
.body{
position:absolute;
bottom:0;
width:120px;
height:150px;
background:#333;
left:50%;
transform:translateX(-50%);
border-radius:20px;
}

/* LABEL */
h2{margin-bottom:10px;}

button{
padding:12px;
border:none;
border-radius:10px;
background:#00ffd5;
color:black;
font-weight:bold;
cursor:pointer;
width:100%;
}

</style>
</head>

<body>

<!-- SINISTRA -->
<div class="left">

<h2>Creator Personaggio</h2>

<input id="nome" placeholder="Nome">
<input id="cognome" placeholder="Cognome">

<input id="comando" placeholder="Scrivi... es: capelli blu, occhi verdi, alto 1.70, barba">

<button onclick="salva()">Salva Personaggio</button>

</div>

<!-- DESTRA -->
<div class="right">

<div class="avatar" id="avatar">

<div class="head" id="head">

<div class="hair" id="hair"></div>

<div class="eye left" id="eyeL"></div>
<div class="eye right" id="eyeR"></div>

<div class="beard" id="beard"></div>

</div>

<div class="body"></div>

</div>

</div>

<script>

/* COLORI ITALIANO */
const colori = {
"blu":"blue",
"rosso":"red",
"verde":"green",
"nero":"black",
"bianco":"white",
"giallo":"yellow",
"viola":"purple",
"rosa":"pink",
"marrone":"brown"
};

/* INPUT INTELLIGENTE */
document.getElementById("comando").addEventListener("input", (e)=>{

let t = e.target.value.toLowerCase();

/* CAPELLI */
if(t.includes("capelli")){
for(let c in colori){
if(t.includes(c)){
document.getElementById("hair").style.background = colori[c];
}
}
}

/* OCCHI */
if(t.includes("occhi")){
for(let c in colori){
if(t.includes(c)){
document.getElementById("eyeL").style.background = colori[c];
document.getElementById("eyeR").style.background = colori[c];
}
}
}

/* PELLE */
if(t.includes("pelle")){
for(let c in colori){
if(t.includes(c)){
document.getElementById("head").style.background = colori[c];
}
}
}

/* BARBA */
if(t.includes("barba")){
document.getElementById("beard").style.display = "block";
}

/* ALTEZZA */
let match = t.match(/(\d\.\d{2})/);

if(t.includes("alto") && match){

let h = parseFloat(match[1]);

let scale = h / 1.70; // base 1.70

document.getElementById("avatar").style.transform = `scale(${scale})`;

}

/* TAGLIO */
if(t.includes("corto")){
document.getElementById("hair").style.height="80px";
}
if(t.includes("lungo")){
document.getElementById("hair").style.height="160px";
}

});

/* SALVA */
function salva(){

let personaggio = {

nome: document.getElementById("nome").value,
cognome: document.getElementById("cognome").value,

aspetto:{
capelli: document.getElementById("hair").style.background,
occhi: document.getElementById("eyeL").style.background,
pelle: document.getElementById("head").style.background,
barba: document.getElementById("beard").style.display === "block",
altezza: document.getElementById("avatar").style.transform
}

};

console.log(personaggio);

/* QUI DOPO LO COLLEGHIAMO A FIREBASE */
alert("Personaggio creato!");

}

</script>

</body>
  </html>
