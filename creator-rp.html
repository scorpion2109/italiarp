<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator RP PRO</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0a0a0d,#111);
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
.left{
width:340px;
padding:20px;
background:rgba(20,20,25,0.9);
backdrop-filter:blur(20px);
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.1);
}

/* AREA AVATAR */
.right{
flex:1;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle,#1a1a22,#000);
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#1a1a22;
color:white;
}

/* SLIDER */
input[type=range]{
accent-color:#00ffd5;
}

/* AVATAR */
.avatar{
width:280px;
height:420px;
position:relative;
transition:0.3s;
}

/* TESTA */
.head{
width:200px;
height:240px;
border-radius:100px;
background:#f1c27d;
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
box-shadow:inset 0 -15px 40px rgba(0,0,0,0.4);
}

/* CAPELLI */
.hair{
position:absolute;
top:-30px;
width:100%;
height:130px;
background:black;
border-radius:100px;
}

/* OCCHI */
.eye{
width:28px;
height:18px;
background:white;
border-radius:50%;
position:absolute;
top:100px;
overflow:hidden;
}

.eye.left{left:45px;}
.eye.right{right:45px;}

.pupil{
width:12px;
height:12px;
background:black;
border-radius:50%;
position:absolute;
top:3px;
left:7px;
}

/* NASO */
.nose{
width:16px;
height:28px;
background:rgba(0,0,0,0.2);
border-radius:50%;
position:absolute;
top:130px;
left:50%;
transform:translateX(-50%);
}

/* BOCCA */
.mouth{
width:70px;
height:25px;
background:#7a3b3b;
border-radius:0 0 50px 50px;
position:absolute;
bottom:55px;
left:50%;
transform:translateX(-50%);
}

/* BARBA */
.beard{
position:absolute;
bottom:-10px;
width:100%;
height:80px;
background:black;
border-radius:80px;
display:none;
}

/* CORPO */
.body{
position:absolute;
bottom:0;
width:150px;
height:180px;
background:linear-gradient(#333,#111);
left:50%;
transform:translateX(-50%);
border-radius:20px;
}

/* BUTTON */
button{
padding:12px;
border:none;
border-radius:10px;
background:#00ffd5;
color:black;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:10px;
}

h3{margin-top:20px;}

</style>
</head>

<body>

<div class="left">

<h2>Creator PRO</h2>

<input id="nome" placeholder="Nome">
<input id="cognome" placeholder="Cognome">

<input id="comando" placeholder="es: capelli neri lunghi, occhi verdi, naso grande, alto 1.80">

<h3>Modifica Volto</h3>

<label>Naso</label>
<input type="range" min="10" max="30" id="naso">

<label>Bocca</label>
<input type="range" min="40" max="100" id="bocca">

<label>Viso</label>
<input type="range" min="180" max="240" id="viso">

<label>Occhi distanza</label>
<input type="range" min="30" max="80" id="occhiDist">

<button onclick="salva()">Salva</button>

</div>

<div class="right">

<div class="avatar" id="avatar">

<div class="head" id="head">

<div class="hair" id="hair"></div>

<div class="eye left">
<div class="pupil" id="eyeL"></div>
</div>

<div class="eye right">
<div class="pupil" id="eyeR"></div>
</div>

<div class="nose" id="nose"></div>
<div class="mouth" id="mouth"></div>
<div class="beard" id="beard"></div>

</div>

<div class="body"></div>

</div>

</div>

<script>

/* COLORI */
const colori={
blu:"blue",rosso:"red",verde:"green",
nero:"black",bianco:"white",giallo:"yellow",
marrone:"brown"
};

/* INPUT INTELLIGENTE */
document.getElementById("comando").addEventListener("input",(e)=>{

let t=e.target.value.toLowerCase();

/* CAPELLI */
for(let c in colori){
if(t.includes("capelli") && t.includes(c)){
hair.style.background=colori[c];
}
}

/* OCCHI */
for(let c in colori){
if(t.includes("occhi") && t.includes(c)){
eyeL.style.background=colori[c];
eyeR.style.background=colori[c];
}
}

/* BARBA */
if(t.includes("barba")){
beard.style.display="block";
}

/* ALTEZZA */
let m=t.match(/(\d\.\d{2})/);
if(t.includes("alto") && m){
avatar.style.transform=`scale(${parseFloat(m[1])/1.75})`;
}

});

/* SLIDER */
naso.oninput=e=>{
nose.style.width=e.target.value+"px";
};

bocca.oninput=e=>{
mouth.style.width=e.target.value+"px";
};

viso.oninput=e=>{
head.style.width=e.target.value+"px";
};

occhiDist.oninput=e=>{
document.querySelector(".eye.left").style.left=e.target.value+"px";
document.querySelector(".eye.right").style.right=e.target.value+"px";
};

/* SALVA */
function salva(){

let p={
nome:nome.value,
cognome:cognome.value
};

console.log(p);
alert("Salvato!");

}

</script>

</body>
</html>
