<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italia RP Creator</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#0f0f18,#050507);
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
.left{
width:360px;
padding:25px;
background:rgba(20,20,30,0.7);
backdrop-filter:blur(25px);
border-right:1px solid rgba(255,255,255,0.08);
overflow-y:auto;
}

/* TITOLI */
h2{
margin-bottom:15px;
font-weight:600;
letter-spacing:1px;
}

/* INPUT */
input,select{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.05);
color:white;
outline:none;
transition:0.2s;
}

input:focus{
background:rgba(255,255,255,0.08);
box-shadow:0 0 10px rgba(0,255,200,0.4);
}

/* SLIDER */
input[type=range]{
accent-color:#00ffd5;
}

/* AVATAR AREA */
.right{
flex:1;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* GLOW BACKGROUND */
.right::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,#00ffd530,transparent);
filter:blur(120px);
}

/* AVATAR */
.avatar{
width:300px;
height:460px;
position:relative;
transition:0.3s;
}

/* TESTA */
.head{
width:210px;
height:250px;
border-radius:100px;
background:#f1c27d;
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
box-shadow:
inset 0 -20px 40px rgba(0,0,0,0.4),
0 20px 40px rgba(0,0,0,0.6);
}

/* CAPELLI */
.hair{
position:absolute;
top:-35px;
width:100%;
height:140px;
background:black;
border-radius:120px 120px 80px 80px;
box-shadow:0 10px 20px rgba(0,0,0,0.8);
}

/* OCCHI */
.eye{
width:30px;
height:20px;
background:white;
border-radius:50%;
position:absolute;
top:110px;
overflow:hidden;
}

.eye.left{left:50px;}
.eye.right{right:50px;}

.pupil{
width:14px;
height:14px;
background:black;
border-radius:50%;
position:absolute;
top:3px;
left:8px;
}

/* NASO */
.nose{
width:18px;
height:32px;
background:rgba(0,0,0,0.15);
border-radius:50%;
position:absolute;
top:145px;
left:50%;
transform:translateX(-50%);
filter:blur(0.3px);
}

/* BOCCA */
.mouth{
width:80px;
height:28px;
background:#8b3a3a;
border-radius:0 0 60px 60px;
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
box-shadow:inset 0 -5px 10px rgba(0,0,0,0.5);
}

/* BARBA */
.beard{
position:absolute;
bottom:-15px;
width:100%;
height:90px;
background:black;
border-radius:90px;
display:none;
opacity:0.95;
}

/* CORPO */
.body{
position:absolute;
bottom:0;
width:170px;
height:200px;
background:linear-gradient(#2b2b2f,#111);
left:50%;
transform:translateX(-50%);
border-radius:25px;
box-shadow:0 15px 30px rgba(0,0,0,0.7);
}

/* BUTTON */
button{
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#00ffd5,#00ffaa);
color:black;
font-weight:bold;
cursor:pointer;
width:100%;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffd5;
}

</style>
</head>

<body>

<div class="left">

<h2>Creator Italia RP</h2>

<input id="nome" placeholder="Nome">
<input id="cognome" placeholder="Cognome">

<input id="comando" placeholder="es: capelli neri lunghi, occhi verdi, naso grande, alto 1.80, barba">

<h2>Modifica Volto</h2>

<label>Naso</label>
<input type="range" min="10" max="35" id="naso">

<label>Bocca</label>
<input type="range" min="40" max="110" id="bocca">

<label>Viso</label>
<input type="range" min="180" max="260" id="viso">

<label>Occhi distanza</label>
<input type="range" min="30" max="90" id="occhiDist">

<button onclick="salva()">Salva Personaggio</button>

</div>

<div class="right">

<div class="avatar" id="avatar">

<div class="head" id="head">

<div class="hair" id="hair"></div>

<div class="eye left"><div class="pupil" id="eyeL"></div></div>
<div class="eye right"><div class="pupil" id="eyeR"></div></div>

<div class="nose" id="nose"></div>
<div class="mouth" id="mouth"></div>
<div class="beard" id="beard"></div>

</div>

<div class="body"></div>

</div>

</div>

<script>

/* COLORI */
const colori={
blu:"blue",rosso:"red",verde:"green",
nero:"black",bianco:"white",giallo:"yellow",
marrone:"brown"
};

/* INPUT INTELLIGENTE */
comando.oninput=(e)=>{

let t=e.target.value.toLowerCase();

/* CAPELLI */
for(let c in colori){
if(t.includes("capelli") && t.includes(c)){
hair.style.background=colori[c];
}
}

/* OCCHI */
for(let c in colori){
if(t.includes("occhi") && t.includes(c)){
eyeL.style.background=colori[c];
eyeR.style.background=colori[c];
}
}

/* BARBA */
if(t.includes("barba")){
beard.style.display="block";
}

/* NASO */
if(t.includes("naso grande")){
nose.style.width="30px";
}

/* BOCCA */
if(t.includes("sorriso")){
mouth.style.borderRadius="0 0 80px 80px";
}

/* ALTEZZA */
let m=t.match(/(\d\.\d{2})/);
if(t.includes("alto") && m){
avatar.style.transform=`scale(${parseFloat(m[1])/1.75})`;
}

};

/* SLIDER */
naso.oninput=e=>{nose.style.width=e.target.value+"px";}
bocca.oninput=e=>{mouth.style.width=e.target.value+"px";}
viso.oninput=e=>{head.style.width=e.target.value+"px";}
occhiDist.oninput=e=>{
document.querySelector(".eye.left").style.left=e.target.value+"px";
document.querySelector(".eye.right").style.right=e.target.value+"px";
};

/* SALVA */
function salva(){
alert("Personaggio salvato!");
}

</script>

</body>
  </html>
